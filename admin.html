<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>客服管理 - ProMax版</title>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            /* 禁止长按弹出菜单，增加App感 */
            -webkit-touch-callout: none; 
        }
        
        body { 
            margin: 0; 
            padding: 0;
            height: 100dvh; /* 使用动态视口高度 */
            width: 100vw;
            display: flex; 
            background: #ededed; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
            position: fixed; /* 彻底锁定背景不滚动 */
        }

        /* --- 左侧列表宽度优化 --- */
        #side-panel { 
            width: 85px; 
            background: #2e2e2e; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            padding-top: env(safe-area-inset-top); /* 避开灵动岛 */
        }
        .side-header { height: 44px; color: #777; font-size: 11px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #262626; }
        
        #u-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .u-item { 
            padding: 15px 4px; text-align: center; color: #ccc; cursor: pointer; 
            font-size: 12px; position: relative; border-bottom: 1px solid #3d3d3d; 
            word-break: break-all;
        }
        .u-item.active { background: #3a3a3a; color: #07c160; }
        .badge { 
            position: absolute; top: 4px; right: 4px; background: #fa5151; color: white; 
            border-radius: 10px; min-width: 16px; height: 16px; line-height: 16px; 
            font-size: 10px; padding: 0 4px; 
        }

        /* --- 右侧聊天区 --- */
        #main-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #ededed; 
            position: relative;
            padding-top: env(safe-area-inset-top); 
        }
        #chat-header { height: 44px; background: #ededed; border-bottom: 1px solid #dcdcdc; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; }
        
        #box { flex: 1; overflow-y: auto; padding: 15px 10px; -webkit-overflow-scrolling: touch; }

        /* 气泡样式保持微信风 */
        .msg-row { display: flex; margin-bottom: 16px; align-items: flex-start; }
        .msg-row.admin { flex-direction: row-reverse; }
        .avatar { width: 38px; height: 38px; border-radius: 4px; background: #fff; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .bubble-txt { 
            position: relative; max-width: 65%; padding: 10px 12px; font-size: 16px; line-height: 1.4; border-radius: 6px; 
            margin: 0 10px; min-height: 38px; word-wrap: break-word;
        }
        .visitor .bubble-txt { background: #fff; color: #000; }
        .visitor .bubble-txt::before { content: ""; position: absolute; left: -9px; top: 12px; border: 5px solid transparent; border-right-color: #fff; }
        .admin .bubble-txt { background: #95ec69; }
        .admin .bubble-txt::before { content: ""; position: absolute; right: -9px; top: 12px; border: 5px solid transparent; border-left-color: #95ec69; }

        .bubble-img { max-width: 160px; border-radius: 4px; margin: 0 10px; border: 1px solid #dcdcdc; }

        /* --- 底部栏：上移适配 --- */
        #footer { 
            background: #f7f7f7; 
            border-top: 1px solid #dcdcdc; 
            /* 关键修改：增加底部间距，让输入栏避开底部条并上移一点 */
            padding: 10px 10px calc(25px + env(safe-area-inset-bottom)); 
            flex-shrink: 0;
        }
        #input-row { display: flex; align-items: center; gap: 8px; }
        #ipt { 
            flex: 1; border: none; background: #fff; border-radius: 6px; 
            padding: 10px; font-size: 16px; outline: none; 
            min-height: 40px; max-height: 100px; resize: none;
            /* 解决iOS输入框内阴影 */
            -webkit-appearance: none;
        }
        .icon-btn { width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn { 
            height: 38px; padding: 0 15px; background: #07c160; color: #fff; 
            border: none; border-radius: 4px; font-weight: bold; 
        }

        /* 大图查看器 */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; align-items: center; justify-content: center; z-index: 100; }
        #viewer img { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

<div id="side-panel">
    <div class="side-header">访客管理</div>
    <div id="u-list"></div>
</div>

<div id="main-panel">
    <div id="chat-header"><span id="cur-user">等待接入</span></div>
    <div id="box"></div>
    
    <div id="footer">
        <div id="input-row">
            <label class="icon-btn">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="#555"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <input type="file" id="file-ipt" accept="image/*" style="display:none" onchange="adminSendImg(this)">
            </label>
            <textarea id="ipt" rows="1" disabled placeholder="回复访客..."></textarea>
            <button class="send-btn" onclick="sendText()">发送</button>
        </div>
    </div>
</div>

<div id="viewer" onclick="this.style.display='none'"><img id="viewer-img"></div>

<script>
    let activeId = "", allMsgs = [], unreadCount = {}, ws;

    function connect() {
        // 请确保此链接为你的 Render 实时地址
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const msgs = res.type === "history" ? res.data : [res.data];
            msgs.forEach(m => {
                allMsgs.push(m);
                const from = String(m.from).toLowerCase();
                if (from !== 'admin' && from !== activeId && res.type !== "history") {
                    unreadCount[from] = (unreadCount[from] || 0) + 1;
                }
            });
            renderAll();
        };
        ws.onclose = () => setTimeout(connect, 3000);
    }

    function renderAll() {
        const users = [...new Set(allMsgs.map(m => m.from === 'admin' ? m.to : m.from))].filter(u => u !== 'admin');
        const listDiv = document.getElementById('u-list');
        listDiv.innerHTML = users.map(u => `
            <div class="u-item ${u === activeId ? 'active' : ''}" onclick="selectUser('${u}')">
                ${u.substr(0, 6)}
                ${unreadCount[u] ? `<div class="badge">${unreadCount[u]}</div>` : ''}
            </div>
        `).join("");

        if (!activeId) return;
        document.getElementById('cur-user').innerText = activeId;
        document.getElementById('ipt').disabled = false;

        const box = document.getElementById('box');
        box.innerHTML = allMsgs.filter(m => m.from === activeId || m.to === activeId).map(m => {
            const isAdmin = m.from === 'admin';
            const avatar = isAdmin ? 'https://dummyimage.com/100/95ec69/fff&text=我' : 'https://dummyimage.com/100/ccc/333&text=访';
            let content = m.type === 'img' ? `<img src="${m.text}" class="bubble-img" onclick="viewImg('${m.text}')">` : `<div class="bubble-txt">${m.text}</div>`;
            return `<div class="msg-row ${isAdmin ? 'admin' : 'visitor'}"><div class="avatar"><img src="${avatar}"></div>${content}</div>`;
        }).join("");
        box.scrollTop = box.scrollHeight;
    }

    function selectUser(id) {
        activeId = id.toLowerCase();
        unreadCount[id] = 0;
        renderAll();
    }

    function sendText() {
        const ipt = document.getElementById('ipt');
        if (!activeId || !ipt.value.trim()) return;
        ws.send(JSON.stringify({ from: 'admin', to: activeId, text: ipt.value, type: 'text' }));
        ipt.value = '';
        ipt.style.height = '40px';
        // 发送后不blur，保持焦点方便连续回复，但禁止缩放已生效
    }

    function adminSendImg(el) {
        const file = el.files[0];
        if (!file || !activeId) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            ws.send(JSON.stringify({ from: 'admin', to: activeId, text: e.target.result, type: 'img' }));
            el.value = '';
        };
        reader.readAsDataURL(file);
    }

    function viewImg(src) {
        document.getElementById('viewer-img').src = src;
        document.getElementById('viewer').style.display = 'flex';
    }

    document.getElementById('ipt').oninput = function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    };

    connect();
</script>
</body>
</html>
