<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服调试</title>
    <style>
        body { display:flex; height:100vh; margin:0; }
        #side { width:120px; background:#222; color:#fff; padding:10px; font-size:12px; }
        #main { flex:1; display:flex; flex-direction:column; }
        #box { flex:1; overflow-y:auto; padding:10px; background:#f9f9f9; }
        .admin-msg { text-align:right; color: blue; }
    </style>
</head>
<body>
    <div id="side">用户列表:<br></div>
    <div id="main">
        <div id="box"></div>
        <div style="padding:10px; display:flex; border-top:1px solid #ddd;">
            <input id="to" style="width:80px" placeholder="发送给ID">
            <input id="ipt" style="flex:1" placeholder="消息内容">
            <button onclick="send()">回信</button>
        </div>
    </div>
<script>
    let ws = new WebSocket('wss://page-c4hm.onrender.com');
    const box = document.getElementById('box');
    const side = document.getElementById('side');
    const users = new Set();

    ws.onmessage = (e) => {
        const res = JSON.parse(e.data);
        const data = res.type === "history" ? res.data : [res.data];
        
        data.forEach(m => {
            if(m.from !== 'admin') {
                users.add(m.from);
                updateSide();
            }
            const div = document.createElement('div');
            div.style.borderBottom = "1px solid #eee";
            div.innerHTML = `<b>${m.from}</b> -> <b>${m.to}</b>: ${m.text}`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    };

    function updateSide() {
        side.innerHTML = "用户列表:<br>" + Array.from(users).join("<br>");
    }

    function send() {
        const to = document.getElementById('to').value;
        const ipt = document.getElementById('ipt').value;
        if(!to || !ipt) return alert("请填写ID和内容");
        ws.send(JSON.stringify({ from: 'admin', to: to, text: ipt }));
        document.getElementById('ipt').value = '';
    }
</script>
</body>
</html>
