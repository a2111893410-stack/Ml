<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客服管理后台</title>
<style>
    body { display: flex; height: 100vh; margin: 0; font-family: -apple-system; background: #f0f0f0; }
    /* 左侧列表 */
    #sidebar { width: 200px; background: #2e2e2e; color: #fff; display: flex; flex-direction: column; }
    #sidebar-head { padding: 20px 15px; font-size: 16px; font-weight: bold; border-bottom: 1px solid #333; }
    #user-list { flex: 1; overflow-y: auto; }
    .user-card { padding: 15px; border-bottom: 1px solid #383838; cursor: pointer; transition: 0.3s; font-size: 14px; }
    .user-card:hover { background: #3d3d3d; }
    .user-card.active { background: #07c160; }

    /* 右侧窗口 */
    #chat-area { flex: 1; display: flex; flex-direction: column; background: #ededed; }
    #chat-header { height: 50px; background: #fff; display: flex; align-items: center; padding: 0 20px; font-weight: bold; border-bottom: 1px solid #ddd; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; }
    
    /* 气泡 */
    .row { display: flex; margin-bottom: 15px; }
    .left { justify-content: flex-start; }
    .right { justify-content: flex-end; }
    .bubble { max-width: 70%; padding: 10px 15px; border-radius: 8px; font-size: 15px; line-height: 1.4; }
    .left .bubble { background: #fff; border: 1px solid #ddd; }
    .right .bubble { background: #95ec69; }

    /* 输入栏 */
    #input-bar { height: 80px; background: #fff; border-top: 1px solid #ddd; display: flex; padding: 15px; }
    #text-input { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 10px; outline: none; font-size: 14px; resize: none; }
    #send-btn { margin-left: 10px; background: #07c160; color: #fff; border: none; padding: 0 20px; border-radius: 4px; cursor: pointer; }
    #send-btn:disabled { background: #ccc; }
</style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-head">会话列表</div>
    <div id="user-list"></div>
</div>

<div id="chat-area">
    <div id="chat-header">请选择一个访客开始交流</div>
    <div id="messages"></div>
    <div id="input-bar">
        <textarea id="text-input" placeholder="输入回复内容..." disabled></textarea>
        <button id="send-btn" onclick="handleSend()" disabled>发送</button>
    </div>
</div>

<script>
    let activeUserId = "";
    let messageStore = {}; // 结构: { '访客ID': [消息列表] }
    
    const socket = new WebSocket('wss://page-c4hm.onrender.com');

    socket.onopen = () => {
        socket.send(JSON.stringify({ type: "init", userId: "admin" }));
    };

    socket.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const { from, to, text, type } = data;

        // 确定这条消息属于哪个用户会话
        const talker = (from === "admin") ? to : from;

        // 初始化会话存储
        if (!messageStore[talker]) {
            messageStore[talker] = [];
            updateUserListUI();
        }

        // 存入消息
        messageStore[talker].push(data);

        // 如果是当前选中的用户，渲染聊天墙
        if (talker === activeUserId) {
            renderMessages();
        }
    };

    function updateUserListUI() {
        const listDOM = document.getElementById("user-list");
        listDOM.innerHTML = "";
        Object.keys(messageStore).forEach(uid => {
            const item = document.createElement("div");
            item.className = "user-card" + (uid === activeUserId ? " active" : "");
            item.innerText = uid;
            item.onclick = () => switchUser(uid);
            listDOM.appendChild(item);
        });
    }

    function switchUser(uid) {
        activeUserId = uid;
        document.getElementById("chat-header").innerText = "正在对话: " + uid;
        document.getElementById("text-input").disabled = false;
        document.getElementById("send-btn").disabled = false;
        updateUserListUI();
        renderMessages();
    }

    function renderMessages() {
        const box = document.getElementById("messages");
        box.innerHTML = "";
        const msgs = messageStore[activeUserId] || [];
        msgs.forEach(m => {
            const isMe = m.from === "admin";
            const row = document.createElement("div");
            row.className = "row " + (isMe ? "right" : "left");
            row.innerHTML = `<div class="bubble">${m.text}</div>`;
            box.appendChild(row);
        });
        box.scrollTop = box.scrollHeight;
    }

    function handleSend() {
        const input = document.getElementById("text-input");
        if (!input.value.trim() || !activeUserId) return;

        const payload = {
            from: "admin",
            to: activeUserId,
            type: "msg",
            text: input.value
        };
        socket.send(JSON.stringify(payload));
        input.value = "";
    }
</script>
</body>
</html>
