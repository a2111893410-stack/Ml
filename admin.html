<!DOCTYPE html>  
<html lang="zh">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>客服后台</title>  
  
<style>  
body{  
  margin:0;  
  font-family:-apple-system;  
  display:flex;  
  height:100vh;  
}  
  
/* 左边用户 */  
#users{  
  width:30%;  
  border-right:1px solid #ddd;  
  overflow-y:auto;  
}  
  
.user{  
  padding:15px;  
  border-bottom:1px solid #eee;  
  cursor:pointer;  
}  
  
.user.active{  
  background:#f0f0f0;  
}  
  
/* 右边聊天 */  
#chatBox{  
  flex:1;  
  display:flex;  
  flex-direction:column;  
}  
  
#chat{  
  flex:1;  
  overflow-y:auto;  
  padding:10px;  
}  
  
.msg{  
  margin:8px 0;  
}  
  
.left{ text-align:left; }  
.right{ text-align:right; }  
  
#inputBar{  
  display:flex;  
  padding:10px;  
  border-top:1px solid #ddd;  
}  
  
#inputBar input{  
  flex:1;  
  padding:8px;  
}  
  
button{  
  margin-left:5px;  
}  
</style>  
</head>  
  
<body>  
  
<div id="users"></div>  
  
<div id="chatBox">  
  <div id="chat"></div>  
  
  <div id="inputBar">  
    <input id="text" placeholder="输入消息">  
    <button onclick="send()">发送</button>  
  </div>  
</div>  
  
<script>  
const socket = new WebSocket("[wss://page-c4hm.onrender.com](wss://page-c4hm.onrender.com).onrender.com");  
  
let currentRoom = null;  
let users = {};  
  
const userList = document.getElementById("users");  
const chat = document.getElementById("chat");  
  
/* ===== 连接 ===== */  
socket.onopen = ()=>{  
  socket.send(JSON.stringify({  
    type:"admin"  
  }));  
};  
  
/* ===== 收消息 ===== */  
socket.onmessage = (e)=>{  
  const data = JSON.parse(e.data);  
  
  /* 新用户出现 */  
  if(data.type==="user_list"){  
    renderUsers(data.list);  
  }  
  
  /* 收到消息 */  
  if(data.type==="msg" || data.type==="img"){  
    const room = data.roomId;  
  
    if(!users[room]){  
      users[room] = [];  
      renderUsers(Object.keys(users));  
    }  
  
    users[room].push(data);  
  
    if(room === currentRoom){  
      renderMsg(data);  
    }  
  }  
  
  /* 历史 */  
  if(data.type==="history"){  
    chat.innerHTML="";  
    data.list.forEach(renderMsg);  
  }  
};  
  
/* ===== 渲染用户 ===== */  
function renderUsers(list){  
  userList.innerHTML="";  
  list.forEach(room=>{  
    const div=document.createElement("div");  
    div.className="user";  
    div.innerText=room.replace("room_","");  
  
    div.onclick=()=>{  
      currentRoom = room;  
  
      document.querySelectorAll(".user").forEach(u=>u.classList.remove("active"));  
      div.classList.add("active");  
  
      socket.send(JSON.stringify({  
        type:"history",  
        roomId:room  
      }));  
    };  
  
    userList.appendChild(div);  
  });  
}  
  
/* ===== 渲染消息 ===== */  
function renderMsg(m){  
  const div=document.createElement("div");  
  div.className="msg "+(m.from==="admin"?"right":"left");  
  
  if(m.type==="msg"){  
    div.innerText = m.text;  
  }  
  
  if(m.type==="img"){  
    const img=document.createElement("img");  
    img.src=m.src;  
    img.style.maxWidth="120px";  
    div.appendChild(img);  
  }  
  
  chat.appendChild(div);  
  chat.scrollTop = chat.scrollHeight;  
}  
  
/* ===== 发送 ===== */  
function send(){  
  const input=document.getElementById("text");  
  const v=input.value.trim();  
  if(!v || !currentRoom) return;  
  
  socket.send(JSON.stringify({  
    type:"msg",  
    from:"admin",  
    roomId:currentRoom,  
    text:v,  
    time:Date.now()  
  }));  
  
  input.value="";  
}  
</script>  
  
</body>  
</html>
