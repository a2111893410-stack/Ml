<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>客服管理</title>
<style>
/* 左右分栏，右侧复用第一版 CSS */
body { display: flex; height: 100vh; margin: 0; background: #ededed; }
#user-list { width: 120px; background: #333; color: #fff; overflow-y: auto; flex-shrink: 0; font-size: 13px; }
.u-item { padding: 12px 8px; border-bottom: 1px solid #444; text-align: center; cursor: pointer; word-break: break-all; }
.u-item.active { background: #07c160; }

#main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
#chat { flex: 1; overflow-y: auto; padding: 10px; }
.row { display: flex; margin: 10px 0; align-items: flex-start; }
.left { justify-content: flex-start; }
.right { justify-content: flex-end; }
.avatar { width: 38px; height: 38px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.bubble { max-width: 70%; padding: 8px 10px; border-radius: 8px; font-size: 14px; margin: 0 6px; }
.left .bubble { background: #fff; }
.right .bubble { background: #95ec69; }
#bar { height: 55px; background: #f7f7f7; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid #ddd; }
#text { flex: 1; height: 34px; border: 1px solid #ddd; border-radius: 4px; padding: 0 8px; outline: none; }
button { margin-left: 5px; background: #07c160; color: #fff; border: none; padding: 7px 12px; border-radius: 4px; }
</style>
</head>
<body>
<div id="user-list"><div id="users"></div></div>
<div id="main">
    <div id="chat"></div>
    <div id="bar">
        <input id="text" placeholder="选择用户进行回复...">
        <button onclick="send()">发送</button>
    </div>
</div>

<script>
let targetId = ""; 
let allMsg = [];
let users = new Set();
const socket = new WebSocket('wss://page-c4hm.onrender.com');

socket.onopen = () => socket.send(JSON.stringify({ type: "init", userId: "admin" }));

socket.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.type === "msg" || data.type === "img") {
        allMsg.push(data);
        const other = data.from === "admin" ? data.to : data.from;
        if(!users.has(other)) {
            users.add(other);
            renderUsers();
        }
        if(other === targetId) renderChat();
    }
};

function renderUsers() {
    const box = document.getElementById("users");
    box.innerHTML = "";
    users.forEach(u => {
        const d = document.createElement("div");
        d.className = "u-item " + (u === targetId ? "active" : "");
        d.innerText = u;
        d.onclick = () => { targetId = u; renderUsers(); renderChat(); };
        box.appendChild(d);
    });
}

function renderChat() {
    const box = document.getElementById("chat");
    box.innerHTML = "";
    allMsg.filter(m => m.from === targetId || m.to === targetId).forEach(m => {
        const isMe = m.from === "admin";
        const row = document.createElement("div");
        row.className = "row " + (isMe ? "right" : "left");
        row.innerHTML = `<div class="bubble">${m.text || "[图片]"}</div>`;
        box.appendChild(row);
    });
    box.scrollTop = box.scrollHeight;
}

function send() {
    const t = document.getElementById("text");
    if(!t.value.trim() || !targetId) return;
    socket.send(JSON.stringify({ from: "admin", to: targetId, type: "msg", text: t.value }));
    t.value = "";
}
</script>
</body>
</html>
