<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服端</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #side { width: 150px; background: #222; color: #fff; overflow-y: auto; }
        .u { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; font-size: 12px; }
        .u.active { background: #07c160; }
        #main { flex: 1; display: flex; flex-direction: column; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; background: #f5f5f5; }
        #bar { padding: 10px; display: flex; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <div id="side"></div>
    <div id="main">
        <div id="msgs"></div>
        <div id="bar"><input id="ipt" style="flex:1"><button onclick="send()">回信</button></div>
    </div>
<script>
    let activeId = "", db = {}, shownIds = new Set(), socket;

    function connect() {
        socket = new WebSocket('wss://page-c4hm.onrender.com');
        socket.onopen = () => socket.send(JSON.stringify({ type: "init", userId: "admin" }));
        socket.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                res.list.forEach(m => store(m));
            } else if (res.type === "msg") {
                store(res);
            }
            render();
        };
        socket.onclose = () => setTimeout(connect, 2000);
    }

    function store(m) {
        if (shownIds.has(m.msgId)) return;
        shownIds.add(m.msgId);
        const talker = m.from === "admin" ? m.to : m.from;
        if (!db[talker]) db[talker] = [];
        db[talker].push(m);
    }

    function render() {
        const side = document.getElementById('side');
        side.innerHTML = Object.keys(db).map(uid => 
            `<div class="u ${uid === activeId ? 'active' : ''}" onclick="activeId='${uid}';render()">${uid}</div>`
        ).join("");

        const box = document.getElementById('msgs');
        box.innerHTML = (db[activeId] || []).map(m => `
            <div style="display:flex;margin-bottom:8px;justify-content:${m.from==='admin'?'flex-end':'flex-start'}">
                <div style="background:${m.from==='admin'?'#95ec69':'#fff'};padding:8px;border-radius:5px;">${m.text}</div>
            </div>
        `).join("");
        box.scrollTop = box.scrollHeight;
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim() || !activeId) return;
        socket.send(JSON.stringify({ from: "admin", to: activeId, text: i.value, type: "msg" }));
        i.value = "";
    }
    connect();
</script>
</body>
</html>
