    #header { height: 44px; background: #ededed; border-bottom: 1px solid #dcdcdc; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; font-size: 17px; font-weight: 500; padding-top: env(safe-area-inset-top); }
    
    #container { flex: 1; display: flex; overflow: hidden; }
    
    #side-list { width: 85px; background: #ededed; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; border-right: 1px solid #dcdcdc; }

    .u-item.active { background: #e2e2e2; font-weight: bold; }

    .offline { background: #b2b2b2; }
    .badge { position: absolute; top: 2px; right: 2px; background: #fa5151; color: white; border-radius: 10px; min-width: 16px; height: 16px; line-height: 16px; font-size: 10px; padding: 0 4px; }

    .msg-row { display: flex; margin-bottom: 16px; align-items: flex-start; }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .bubble-txt { position: relative; max-width: 70%; padding: 10px 12px; font-size: 16px; line-height: 1.4; border-radius: 6px; margin: 0 10px; min-height: 38px; word-wrap: break-word; }
    .visitor .bubble-txt { background: #fff; }
    .visitor .bubble-txt::before { content: ""; position: absolute; left: -9px; top: 12px; border: 5px solid transparent; border-right-color: #fff; }
    .admin .bubble-txt { background: #95ec69; }
    .admin .bubble-txt::before { content: ""; position: absolute; right: -9px; top: 12px; border: 5px solid transparent; border-left-color: #95ec69; }
    
    .bubble-img { max-width: 160px; border-radius: 4px; margin: 0 10px; border: 1px solid #dcdcdc; display: block; cursor: pointer; }

    #toast { position: fixed; top: calc(54px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.72); color: #fff; padding: 7px 18px; border-radius: 20px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }

    .icon-btn { width: 32px; height: 32px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    #empty-tip { flex: 1; display: flex; align-items: center; justify-content: center; color: #b2b2b2; font-size: 15px; }

</head>
<body>

<div id="header">
    <span style="visibility: hidden;">‹</span>
    <span id="title-name">WePro 客户管理</span>
    <span style="font-size: 20px;">···</span>
</div>

<div id="container">
    <div id="side-list"></div>
    <div id="chat-area">
        <div id="empty-tip">← 选择一位用户开始对话</div>
        <div id="box" style="display:none" onclick="dismissKeyboard()"></div>
    </div>
</div>

<div id="footer">
    <div id="input-row">
        <label class="icon-btn">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="#555"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <input type="file" id="file-ipt" accept="image/*" style="display:none" onchange="directSendImg(this)">
        </label>
        <textarea id="ipt" rows="1" placeholder="发送..." disabled onkeydown="handleKeyDown(event)"></textarea>
        <button id="send-btn" class="send-btn" onclick="sendText()">发送</button>
    </div>
</div>

<div id="toast"></div>
<div id="viewer" onclick="this.style.display='none'"><img id="viewer-img"></div>

<script>
    // ── 持久化已读时间戳 ──────────────────────────────────────
    let lastReadMap = JSON.parse(localStorage.getItem('wepro_lastread') || '{}');

    // ── 状态 ─────────────────────────────────────────────────
    let activeId = "";
    // allMsgs 用 Map<msgKey, msg> 去重，防止重连后重复
    let msgMap = new Map();
    let ws;
    // unreadMap 不在重连时清空，只在选中用户时归零
    let unreadMap = {};
    // onlineStatus + 超时离线
    let onlineStatus = {};
    let onlineTimer = {};
    const ONLINE_TIMEOUT = 5 * 60 * 1000; // 5分钟无消息视为离线

    const ipt = document.getElementById('ipt');
    const box = document.getElementById('box');
    const emptyTip = document.getElementById('empty-tip');

    // ── Toast ─────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ── 判断 WebSocket 是否可用 ───────────────────────────────
    function isConnected() {
        return ws && ws.readyState === WebSocket.OPEN;
    }

    // ── 用户昵称 ──────────────────────────────────────────────
    function getShortName(id) {
        let num = id.replace(/[^0-9]/g, "").slice(-1) || "1";
        const names = ["访客", "用户", "客户", "咨询", "买家"];
        return names[id.length % names.length] + num;
    }

    // ── 生成消息唯一 key（去重用） ────────────────────────────
    function msgKey(m) {
        // 用发送方+接收方+内容前20字符+时间戳 组成唯一 key
        return `${m.from}_${m.to}_${(m.text || '').slice(0, 20)}_${m.time || ''}`;
    }

    // ── 标记用户在线，并启动超时离线计时 ─────────────────────
    function markOnline(uid) {
        onlineStatus[uid] = true;
        if (onlineTimer[uid]) clearTimeout(onlineTimer[uid]);
        onlineTimer[uid] = setTimeout(() => {
            onlineStatus[uid] = false;
            renderSideList(); // 只刷侧边栏，不重绘聊天
        }, ONLINE_TIMEOUT);
    }

    // ── WebSocket 连接 ────────────────────────────────────────
    function connect() {
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const msgs = res.type === "history" ? res.data : [res.data];

            // history 时：清空 msgMap 重建（保留 unreadMap，不清零）
            if (res.type === "history") {
                msgMap = new Map();
            }

            msgs.forEach(m => {
                const k = msgKey(m);
                if (msgMap.has(k)) return; // 去重
                msgMap.set(k, m);

                const uid = String(m.from === 'admin' ? m.to : m.from).toLowerCase();

                if (m.from !== 'admin') {
                    markOnline(uid);
                    const lastRead = lastReadMap[uid] || 0;
                    const msgTime = m.time || 0;
                    if (uid !== activeId && msgTime > lastRead) {
                        unreadMap[uid] = (unreadMap[uid] || 0) + 1;
                    }
                }
            });

            renderSideList();
            if (activeId) renderChat();
        };

        ws.onclose = () => { setTimeout(connect, 3000); };
    }

    // ── 【修复6】侧边栏和聊天区分开渲染，不再全量重绘 ────────

    function renderSideList() {
        const users = [...new Set([...msgMap.values()].map(m => m.from === 'admin' ? m.to : m.from))].filter(u => u !== 'admin');
        document.getElementById('side-list').innerHTML = users.map(u => `
            <div class="u-item ${u === activeId ? 'active' : ''}" onclick="selectUser('${u}')">
                <span class="status-dot ${onlineStatus[u] ? 'online' : 'offline'}"></span>
                <span>${getShortName(u)}</span>
                ${unreadMap[u] ? `<div class="badge">${unreadMap[u]}</div>` : ''}
            </div>
        `).join("");
    }

    // ── 【修复2】renderChat：增量追加，不重建 DOM，图片 onload 只挂一次 ──
    let renderedKeys = new Set(); // 已渲染过的消息 key

    function renderChat() {
        if (!activeId) return;

        const msgs = [...msgMap.values()].filter(m => m.from === activeId || m.to === activeId);

        msgs.forEach(m => {
            const k = msgKey(m);
            if (renderedKeys.has(k)) return; // 已渲染，跳过
            renderedKeys.add(k);

            const isAdmin = m.from === 'admin';
            const avatar = isAdmin
                ? 'https://dummyimage.com/100/95ec69/fff&text=客服'
                : 'https://dummyimage.com/100/ccc/333&text=访';

            const row = document.createElement('div');
            row.className = `msg-row ${isAdmin ? 'admin' : 'visitor'}`;

            const ava = document.createElement('div');
            ava.className = 'avatar';
            ava.innerHTML = `<img src="${avatar}">`;
            row.appendChild(ava);

            if (m.type === 'img') {
                const img = document.createElement('img');
                img.className = 'bubble-img';
                img.src = m.text;
                // 【修复2】onload 只在创建时挂载一次
                img.onload = () => scrollToBottom();
                img.onclick = () => viewImg(m.text);
                row.appendChild(img);
            } else {
                const bbl = document.createElement('div');
                bbl.className = 'bubble-txt';
                bbl.textContent = m.text;
                row.appendChild(bbl);
            }

            box.appendChild(row);
            scrollToBottom();
        });
    }

    // ── 【修复2】scrollToBottom：不再重复挂载 img.onload ─────
    function scrollToBottom() {
        if (!box) return;
        box.scrollTop = box.scrollHeight;
        setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);
    }

    // ── 选中用户 ──────────────────────────────────────────────
    function selectUser(id) {
        activeId = id.toLowerCase();
        lastReadMap[activeId] = Date.now();
        localStorage.setItem('wepro_lastread', JSON.stringify(lastReadMap));
        unreadMap[activeId] = 0;
        renderedKeys = new Set(); // 切换用户时重置已渲染集合

        ipt.disabled = false;
        document.getElementById('title-name').innerText = getShortName(activeId);

        // 显示聊天区，隐藏空提示
        emptyTip.style.display = 'none';
        box.style.display = 'block';
        box.innerHTML = '';

        renderSideList();
        renderChat();
        setTimeout(() => ipt.focus(), 100);
    }

    function dismissKeyboard() { ipt.blur(); }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
    }

    // ── 【修复1】sendText：检查连接状态，捕获异常 ────────────
    function sendText() {
        const val = ipt.value.trim();
        if (!activeId || !val) return;

        if (!isConnected()) {
            showToast('发送失败，网络未连接');
            return;
        }

        try {
            ws.send(JSON.stringify({ from: 'admin', to: activeId, text: val, type: 'text' }));
            ipt.value = '';
            ipt.style.height = '40px';
            lastReadMap[activeId] = Date.now();
            localStorage.setItem('wepro_lastread', JSON.stringify(lastReadMap));
            scrollToBottom();
        } catch (err) {
            showToast('发送失败，请重试');
        }
    }

    // ── 【修复1】directSendImg：两处检查连接状态 ─────────────
    function directSendImg(el) {
        const file = el.files[0];
        if (!file || !activeId) return;

        if (!isConnected()) {
            showToast('发送失败，网络未连接');
            el.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const maxWidth = 1000;
                let width = img.width, height = img.height;
                if (width > maxWidth) { height = (maxWidth / width) * height; width = maxWidth; }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const b64 = canvas.toDataURL('image/jpeg', 0.7);

                if (isConnected()) {
                    try {
                        ws.send(JSON.stringify({ from: 'admin', to: activeId, text: b64, type: 'img' }));
                        lastReadMap[activeId] = Date.now();
                        localStorage.setItem('wepro_lastread', JSON.stringify(lastReadMap));
                    } catch (err) {
                        showToast('图片发送失败，请重试');
                    }
                } else {
                    showToast('发送失败，网络已断开');
                }
                el.value = '';
            };
        };
        reader.readAsDataURL(file);
    }

    function viewImg(src) {
        document.getElementById('viewer-img').src = src;
        document.getElementById('viewer').style.display = 'flex';
    }

    ipt.oninput = function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        scrollToBottom();
    };

    connect();
</script>

</body>
</html>
