<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服管理</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #side { width: 180px; background: #2c2c2c; color: #fff; overflow-y: auto; }
        .u { padding: 15px; border-bottom: 1px solid #3d3d3d; cursor: pointer; opacity: 0.7; }
        .u.active { background: #07c160; opacity: 1; font-weight: bold; }
        #main { flex: 1; display: flex; flex-direction: column; background: #eee; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; }
        #bar { padding: 15px; background: #fff; display: flex; border-top: 1px solid #ddd; }
        textarea { flex: 1; height: 40px; }
    </style>
</head>
<body>
    <div id="side"></div>
    <div id="main">
        <div id="msgs"></div>
        <div id="bar"><textarea id="ipt" placeholder="选择用户回复"></textarea><button onclick="send()" style="width:70px;margin-left:10px;background:#07c160;color:#fff;border:none">发送</button></div>
    </div>

<script>
    let activeId = "", db = {}, shownIds = new Set(), socket;

    function connect() {
        socket = new WebSocket('wss://page-c4hm.onrender.com');
        socket.onopen = () => socket.send(JSON.stringify({ type: "init", userId: "admin" }));
        socket.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                res.list.forEach(m => store(m));
            } else {
                store(res);
            }
            renderUI();
        };
        socket.onclose = () => setTimeout(connect, 2000);
    }

    function store(m) {
        if (shownIds.has(m.msgId)) return;
        shownIds.add(m.msgId);
        const talker = m.from === "admin" ? m.to : m.from;
        if (!db[talker]) db[talker] = [];
        db[talker].push(m);
    }

    function renderUI() {
        const side = document.getElementById('side');
        side.innerHTML = Object.keys(db).map(uid => 
            `<div class="u ${uid === activeId ? 'active' : ''}" onclick="changeUser('${uid}')">${uid}</div>`
        ).join("");

        const box = document.getElementById('msgs');
        box.innerHTML = (db[activeId] || []).map(m => `
            <div style="display:flex;margin-bottom:10px;justify-content:${m.from==='admin'?'flex-end':'flex-start'}">
                <div style="background:${m.from==='admin'?'#95ec69':'#fff'};padding:8px;border-radius:5px;max-width:70%">${m.text}</div>
            </div>
        `).join("");
        box.scrollTop = box.scrollHeight;
    }

    function changeUser(uid) {
        activeId = uid;
        renderUI();
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim() || !activeId) return;
        const msg = { from: "admin", to: activeId, text: i.value, type: "msg" };
        socket.send(JSON.stringify(msg));
        i.value = "";
    }
    connect();
</script>
</body>
</html>
