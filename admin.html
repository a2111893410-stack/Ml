<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服后台</title>
    <style>
        body { display:flex; height:100vh; margin:0; font-family:sans-serif; }
        #side { width:180px; background:#2c2c2c; color:#fff; overflow-y:auto; }
        .u-item { padding:15px; border-bottom:1px solid #3d3d3d; cursor:pointer; }
        .u-item.active { background:#07c160; }
        #main { flex:1; display:flex; flex-direction:column; background:#eee; }
        #box { flex:1; overflow-y:auto; padding:20px; }
        .admin-row { display:flex; justify-content:flex-end; margin-bottom:10px; }
        .user-row { display:flex; justify-content:flex-start; margin-bottom:10px; }
        .bubble { padding:8px 12px; background:#fff; border-radius:5px; max-width:70%; }
        .admin-row .bubble { background:#95ec69; }
    </style>
</head>
<body>
    <div id="side"></div>
    <div id="main">
        <div id="box"></div>
        <div style="padding:15px; background:#fff; display:flex;">
            <input id="ipt" style="flex:1; padding:10px;" placeholder="回复选中的访客...">
            <button onclick="send()" style="width:80px; margin-left:10px; background:#07c160; color:#fff; border:none; border-radius:4px;">发送</button>
        </div>
    </div>

<script>
    let activeId = "", allMsgs = [], ws;

    function start() {
        ws = new WebSocket('wss://page-c4hm.onrender.com');
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") allMsgs = res.data;
            else allMsgs.push(res.data);
            refresh();
        };
        ws.onclose = () => setTimeout(start, 2000);
    }

    function refresh() {
        const users = [...new Set(allMsgs.map(m => {
            const f = String(m.from).toLowerCase();
            const t = String(m.to).toLowerCase();
            return f === 'admin' ? t : f;
        }))].filter(u => u !== 'admin');

        document.getElementById('side').innerHTML = users.map(u => `
            <div class="u-item ${u===activeId?'active':''}" onclick="activeId='${u}';refresh()">${u}</div>
        `).join("");

        if (!activeId) return;
        document.getElementById('box').innerHTML = allMsgs.filter(m => {
            const f = String(m.from).toLowerCase();
            const t = String(m.to).toLowerCase();
            return f === activeId || t === activeId;
        }).map(m => `
            <div class="${String(m.from).toLowerCase()==='admin'?'admin-row':'user-row'}">
                <div class="bubble">${m.text}</div>
            </div>
        `).join("");
        const box = document.getElementById('box');
        box.scrollTop = box.scrollHeight;
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!activeId || !i.value.trim()) return;
        // 关键：发送时确保 to 也是小写
        ws.send(JSON.stringify({ from: 'admin', to: activeId.toLowerCase(), text: i.value }));
        i.value = '';
    }
    start();
</script>
</body>
</html>
