<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服管理系统</title>
    <style>
        body { display:flex; height:100vh; margin:0; font-family:sans-serif; }
        #side { width:180px; background:#2c2c2c; color:#fff; overflow-y:auto; border-right:1px solid #111; }
        .user-item { padding:15px; border-bottom:1px solid #3d3d3d; cursor:pointer; transition:0.2s; font-size:13px; }
        .user-item:hover { background:#3d3d3d; }
        .user-item.active { background:#07c160; color:#fff; font-weight:bold; }
        #main { flex:1; display:flex; flex-direction:column; background:#eee; }
        #box { flex:1; overflow-y:auto; padding:20px; }
        .line { display:flex; margin-bottom:10px; }
        .line.admin { justify-content:flex-end; }
        .bubble { padding:8px 12px; background:#fff; border-radius:6px; max-width:70%; box-shadow:0 1px 2px rgba(0,0,0,0.1); }
        .admin .bubble { background:#95ec69; }
    </style>
</head>
<body>
    <div id="side"><div style="padding:15px;color:#888">访客列表</div><div id="u-list"></div></div>
    <div id="main">
        <div id="box">请选择用户开始对话</div>
        <div style="padding:15px; background:#fff; display:flex; border-top:1px solid #ddd;">
            <input id="ipt" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:4px; outline:none;" placeholder="输入回复内容...">
            <button onclick="send()" style="width:80px; margin-left:10px; background:#07c160; color:#fff; border:none; border-radius:4px; cursor:pointer;">发送</button>
        </div>
    </div>

<script>
    let activeId = "", allMsgs = [], ws;

    function start() {
        ws = new WebSocket('wss://page-c4hm.onrender.com');
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") allMsgs = res.data;
            else allMsgs.push(res.data);
            refresh();
        };
        ws.onclose = () => setTimeout(start, 2000);
    }

    function refresh() {
        // 1. 动态生成唯一访客列表
        const users = [...new Set(allMsgs.map(m => m.from === 'admin' ? m.to : m.from))].filter(u => u !== 'admin');
        const listDiv = document.getElementById('u-list');
        listDiv.innerHTML = users.map(u => `
            <div class="user-item ${u===activeId?'active':''}" onclick="selectUser('${u}')">
                访客: ${u}
            </div>
        `).join("");

        // 2. 渲染当前选中的聊天
        const box = document.getElementById('box');
        if (!activeId) return;
        
        box.innerHTML = allMsgs.filter(m => (m.from === activeId || m.to === activeId))
            .map(m => `
                <div class="line ${m.from==='admin'?'admin':'user'}">
                    <div class="bubble">${m.text}</div>
                </div>
            `).join("");
        box.scrollTop = box.scrollHeight;
    }

    function selectUser(id) {
        activeId = id;
        refresh();
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!activeId || !i.value.trim()) return;
        ws.send(JSON.stringify({ from: 'admin', to: activeId, text: i.value }));
        i.value = '';
    }

    start();
</script>
</body>
</html>
