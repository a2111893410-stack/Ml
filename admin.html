<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服管理后台</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; background: #f0f0f0; }
        #side { width: 200px; background: #2c2c2c; color: #fff; overflow-y: auto; }
        .u-item { padding: 15px; border-bottom: 1px solid #3d3d3d; cursor: pointer; transition: 0.2s; }
        .u-item:hover { background: #3d3d3d; }
        .u-item.active { background: #07c160; font-weight: bold; }
        #main { flex: 1; display: flex; flex-direction: column; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        #bar { padding: 15px; background: #fff; display: flex; border-top: 1px solid #ddd; }
        textarea { flex: 1; height: 50px; border: 1px solid #ddd; padding: 10px; resize: none; }
        button { width: 80px; margin-left: 10px; background: #07c160; color: #fff; border: none; cursor: pointer; }
        .row { display: flex; margin-bottom: 10px; width: 100%; }
        .left { justify-content: flex-start; }
        .right { justify-content: flex-end; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 5px; font-size: 14px; background: #fff; }
        .right .bubble { background: #95ec69; }
    </style>
</head>
<body>
    <div id="side"></div>
    <div id="main">
        <div id="msgs"></div>
        <div id="bar">
            <textarea id="ipt" placeholder="点击左侧用户开始回复..."></textarea>
            <button onclick="send()">发送</button>
        </div>
    </div>

<script>
    let activeId = "";
    let messageDb = {}; 
    let shownIds = new Set();
    let socket;

    function connect() {
        socket = new WebSocket('wss://page-c4hm.onrender.com');

        socket.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                res.list.forEach(m => store(m));
            } else {
                store(res);
            }
            renderSide();
            renderChat();
        };
        socket.onclose = () => setTimeout(connect, 2000);
    }

    function store(m) {
        if (shownIds.has(m.msgId)) return;
        shownIds.add(m.msgId);

        // 客服端逻辑：识别会话对象
        // 如果消息跟 ADMIN 有关，则提取对方的 ID
        const talker = (m.from === "ADMIN") ? m.to : m.from;
        if (talker && talker !== "ADMIN") {
            if (!messageDb[talker]) messageDb[talker] = [];
            messageDb[talker].push(m);
        }
    }

    function renderSide() {
        const side = document.getElementById('side');
        const users = Object.keys(messageDb);
        side.innerHTML = users.map(uid => 
            `<div class="u-item ${uid === activeId ? 'active' : ''}" onclick="selectUser('${uid}')">${uid}</div>`
        ).join("");
    }

    function selectUser(uid) {
        activeId = uid;
        renderSide();
        renderChat();
    }

    function renderChat() {
        const box = document.getElementById('msgs');
        if (!activeId) { box.innerHTML = "请选择会话"; return; }
        
        box.innerHTML = (messageDb[activeId] || []).map(m => `
            <div class="row ${m.from === 'ADMIN' ? 'right' : 'left'}">
                <div class="bubble">${m.text}</div>
            </div>
        `).join("");
        box.scrollTop = box.scrollHeight;
    }

    function send() {
        const ipt = document.getElementById('ipt');
        if (!ipt.value.trim() || !activeId) return;

        socket.send(JSON.stringify({
            from: "ADMIN",
            to: activeId,
            text: ipt.value,
            type: "msg"
        }));
        ipt.value = "";
    }

    connect();
</script>
</body>
</html>
