<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服管理</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #side { width: 180px; background: #2c2c2c; color: #fff; overflow-y: auto; }
        .u { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; font-size: 13px; }
        .u.active { background: #07c160; }
        #main { flex: 1; display: flex; flex-direction: column; background: #eee; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; }
        #bar { padding: 15px; background: #fff; display: flex; }
        textarea { flex: 1; height: 40px; }
        button { width: 70px; margin-left: 10px; background: #07c160; color: #fff; border: none; }
        .row { display: flex; margin-bottom: 10px; }
        .right { justify-content: flex-end; }
        .bubble { max-width: 70%; padding: 8px 12px; border-radius: 5px; background: #fff; }
        .right .bubble { background: #95ec69; }
    </style>
</head>
<body>
    <div id="side"></div>
    <div id="main">
        <div id="msgs"></div>
        <div id="bar">
            <textarea id="ipt"></textarea>
            <button onclick="send()">发送</button>
        </div>
    </div>
    <script>
        let activeId = "", db = {}, socket, shownIds = new Set();

        function connect() {
            socket = new WebSocket('wss://page-c4hm.onrender.com');
            socket.onopen = () => socket.send(JSON.stringify({type:"init", userId:"admin"}));
            socket.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if(res.type === "ping") return;
                if(res.type === "history") {
                    res.list.forEach(m => store(m));
                } else {
                    store(res);
                }
                render();
            };
            socket.onclose = () => setTimeout(connect, 2000);
        }

        function store(m) {
            if(shownIds.has(m.id)) return; // 核心：排重
            shownIds.add(m.id);
            const talker = m.from === "admin" ? m.to : m.from;
            if(!db[talker]) db[talker] = [];
            db[talker].push(m);
        }

        function render() {
            const side = document.getElementById('side');
            side.innerHTML = Object.keys(db).map(id => 
                `<div class="u ${id===activeId?'active':''}" onclick="activeId='${id}';render()">${id}</div>`
            ).join("");

            const msgs = document.getElementById('msgs');
            msgs.innerHTML = (db[activeId] || []).map(m => 
                `<div class="row ${m.from==='admin'?'right':'left'}"><div class="bubble">${m.text}</div></div>`
            ).join("");
            msgs.scrollTop = msgs.scrollHeight;
        }

        function send() {
            const i = document.getElementById('ipt');
            if(!i.value.trim() || !activeId) return;
            socket.send(JSON.stringify({from:"admin", to:activeId, text:i.value, type:"msg"}));
            i.value = "";
        }
        connect();
    </script>
</body>
</html>
