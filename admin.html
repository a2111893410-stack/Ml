<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服管理后台</title>
    <style>
        /* 页面布局 */
        body { margin: 0; display: flex; height: 100vh; font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; }
        
        /* 左侧访客列表样式 */
        #sidebar { width: 220px; background: #2c3e50; color: white; display: flex; flex-direction: column; border-right: 1px solid #1a252f; }
        .sidebar-header { padding: 20px; font-size: 16px; font-weight: bold; background: #1a252f; text-align: center; }
        #user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #34495e; transition: 0.3s; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: #3d566e; }
        .user-item.active { background: #1abc9c; color: white; font-weight: bold; }
        .user-item .unread-dot { width: 8px; height: 8px; background: #e74c3c; border-radius: 50%; display: none; } /* 预留红点 */

        /* 右侧聊天主区域 */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: #ebebed; }
        #chat-title { padding: 15px 25px; background: white; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 16px; color: #333; }
        #message-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* 气泡样式 */
        .msg-row { margin-bottom: 15px; display: flex; flex-direction: column; }
        .msg-row.admin { align-items: flex-end; }
        .msg-row.visitor { align-items: flex-start; }
        .bubble { max-width: 70%; padding: 10px 14px; border-radius: 8px; font-size: 15px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .visitor .bubble { background: white; color: #333; }
        .admin .bubble { background: #95ec69; color: #000; }

        /* 输入框区域 */
        #input-area { padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; font-size: 14px; }
        button { padding: 0 25px; background: #07c160; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #06ad56; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">访客在线列表</div>
        <div id="user-list">
            </div>
    </div>

    <div id="main-chat">
        <div id="chat-title">请选择访客进行交流</div>
        <div id="message-box"></div>
        <div id="input-area">
            <input id="msg-input" placeholder="输入回复内容..." autocomplete="off">
            <button id="send-btn" onclick="sendReply()" disabled>发送</button>
        </div>
    </div>

<script>
    let activeVisitorId = ""; // 当前选中的访客
    let allMessages = [];    // 存储所有收到的消息记录
    let ws;

    // 连接 WebSocket
    function init() {
        // 替换为你自己的 Render 地址
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onmessage = (event) => {
            const res = JSON.parse(event.data);
            
            // 如果是历史记录，覆盖旧数据；如果是新消息，追加
            if (res.type === "history") {
                allMessages = res.data;
            } else {
                allMessages.push(res.data);
            }

            refreshUI();
        };

        ws.onclose = () => {
            console.log("连接断开，重连中...");
            setTimeout(init, 2000);
        };
    }

    // 核心功能：刷新列表和聊天内容
    function refreshUI() {
        const listContainer = document.getElementById('user-list');
        const chatTitle = document.getElementById('chat-title');
        const box = document.getElementById('message-box');

        // 1. 提取所有不重复的访客 ID (只要不是 admin 的都算访客)
        const visitors = [...new Set(allMessages.map(m => {
            const f = String(m.from).toLowerCase().trim();
            const t = String(m.to).toLowerCase().trim();
            return f === 'admin' ? t : f;
        }))].filter(id => id !== 'admin' && id !== 'undefined');

        // 2. 渲染左侧列表
        listContainer.innerHTML = visitors.map(id => `
            <div class="user-item ${id === activeVisitorId ? 'active' : ''}" onclick="switchUser('${id}')">
                <span>访客: ${id}</span>
                <div class="unread-dot"></div>
            </div>
        `).join("");

        // 3. 如果没选人，显示提示
        if (!activeVisitorId) {
            box.innerHTML = '<div style="color:#999; text-align:center; margin-top:50px;">点击左侧列表，开始 1 对 1 对话</div>';
            return;
        }

        // 4. 渲染右侧选中的聊天记录
        chatTitle.innerText = "正在与 [" + activeVisitorId + "] 对话";
        document.getElementById('send-btn').disabled = false;

        const filtered = allMessages.filter(m => {
            const f = String(m.from).toLowerCase().trim();
            const t = String(m.to).toLowerCase().trim();
            return f === activeVisitorId || t === activeVisitorId;
        });

        box.innerHTML = filtered.map(m => {
            const isAdmin = String(m.from).toLowerCase().trim() === 'admin';
            return `
                <div class="msg-row ${isAdmin ? 'admin' : 'visitor'}">
                    <div class="bubble">${m.text}</div>
                </div>
            `;
        }).join("");

        // 滚动到底部
        box.scrollTop = box.scrollHeight;
    }

    // 切换用户
    function switchUser(id) {
        activeVisitorId = id;
        refreshUI();
    }

    // 发送回复
    function sendReply() {
        const ipt = document.getElementById('msg-input');
        const text = ipt.value.trim();
        if (!activeVisitorId || !text) return;

        const payload = {
            from: 'admin',
            to: activeVisitorId, // 关键：精准发送给当前选中的访客
            text: text
        };

        ws.send(JSON.stringify(payload));
        ipt.value = "";
    }

    // 绑定回车键
    document.getElementById('msg-input').onkeydown = (e) => {
        if (e.key === 'Enter') sendReply();
    };

    init();
</script>
</body>
</html>
