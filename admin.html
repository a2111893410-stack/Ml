<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>客服管理系统</title>
    <style>
        /* 客服端专用布局：分左右两栏 */
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #user-list { width: 200px; background: #2e2e2e; color: #fff; overflow-y: auto; flex-shrink: 0; }
        .user-item { padding: 15px; border-bottom: 1px solid #444; cursor: pointer; font-size: 14px; }
        .user-item:hover { background: #3e3e3e; }
        .user-item.active { background: #07c160; }
        
        #main { flex: 1; display: flex; flex-direction: column; background: #ededed; position: relative; }
        #chat-header { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #ddd; font-weight: bold; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* 气泡样式复用 */
        .row { display: flex; margin: 10px 0; }
        .left { justify-content: flex-start; }
        .right { justify-content: flex-end; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 8px; margin: 0 10px; background: #fff; }
        .right .bubble { background: #95ec69; }
        
        #input-area { height: 60px; background: #f7f7f7; display: flex; align-items: center; padding: 0 15px; border-top: 1px solid #ddd; }
        #text { flex: 1; height: 36px; border-radius: 4px; border: 1px solid #ddd; padding: 0 10px; }
        button { margin-left: 10px; background: #07c160; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="user-list">
        <div style="padding:15px; font-weight:bold; color:#888;">访客列表</div>
        <div id="users"></div>
    </div>
    <div id="main">
        <div id="chat-header">请选择访客</div>
        <div id="chat-window"></div>
        <div id="input-area">
            <input id="text" placeholder="回复访客...">
            <button onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const myId = "admin";
        let targetId = ""; 
        let allMessages = []; 
        let userSet = new Set();

        const socket = new WebSocket('wss://page-c4hm.onrender.com');

        socket.onopen = () => {
            socket.send(JSON.stringify({ type: "init", userId: myId }));
        };

        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === "msg" || data.type === "img") {
                allMessages.push(data);
                // 发现新用户，添加到列表
                const otherUser = data.from === "admin" ? data.to : data.from;
                if (!userSet.has(otherUser)) {
                    userSet.add(otherUser);
                    updateUserList();
                }
                if (otherUser === targetId) renderChat();
            }
        };

        function updateUserList() {
            const container = document.getElementById("users");
            container.innerHTML = "";
            userSet.forEach(uid => {
                const div = document.createElement("div");
                div.className = "user-item" + (uid === targetId ? " active" : "");
                div.innerText = uid;
                div.onclick = () => {
                    targetId = uid;
                    document.getElementById("chat-header").innerText = "正在回复: " + uid;
                    updateUserList();
                    renderChat();
                };
                container.appendChild(div);
            });
        }

        function renderChat() {
            const win = document.getElementById("chat-window");
            win.innerHTML = "";
            const filtered = allMessages.filter(m => m.from === targetId || m.to === targetId);
            filtered.forEach(m => {
                const isMe = m.from === "admin";
                const row = document.createElement("div");
                row.className = "row " + (isMe ? "right" : "left");
                row.innerHTML = `<div class="bubble">${m.text || "[图片]"}</div>`;
                win.appendChild(row);
            });
            win.scrollTop = win.scrollHeight;
        }

        function send() {
            const input = document.getElementById("text");
            if (!input.value.trim() || !targetId) return;
            const msg = { from: "admin", to: targetId, type: "msg", text: input.value };
            socket.send(JSON.stringify(msg));
            input.value = "";
        }
    </script>
</body>
</html>
