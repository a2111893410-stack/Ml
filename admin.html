<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>客服管理系统 - 增强版</title>
<style>
    body { display: flex; height: 100vh; margin: 0; background: #ededed; font-family: -apple-system, BlinkMacSystemFont; }
    /* 左侧访客列表 */
    #user-list { width: 140px; background: #2c2c2c; color: #fff; overflow-y: auto; flex-shrink: 0; }
    .list-title { padding: 15px 10px; font-size: 12px; color: #888; border-bottom: 1px solid #3d3d3d; }
    .u-item { padding: 15px 10px; border-bottom: 1px solid #3d3d3d; cursor: pointer; font-size: 13px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .u-item:hover { background: #3d3d3d; }
    .u-item.active { background: #07c160; color: #fff; }

    /* 右侧主界面 */
    #main { flex: 1; display: flex; flex-direction: column; position: relative; }
    #chat-header { height: 44px; background: #ededed; display: flex; align-items: center; justify-content: center; border-bottom: 0.5px solid rgba(0,0,0,0.1); font-size: 15px; font-weight: 500; }
    
    #chat { flex: 1; overflow-y: auto; padding: 10px; background: #ededed; }
    
    /* 气泡样式 (完美复刻客户端) */
    .row { display: flex; margin: 12px 0; align-items: flex-start; }
    .left { justify-content: flex-start; }
    .right { justify-content: flex-end; }
    .bubble { max-width: 75%; padding: 10px 12px; border-radius: 8px; font-size: 15px; line-height: 1.4; word-break: break-all; position: relative; }
    .left .bubble { background: #fff; margin-left: 8px; }
    .right .bubble { background: #95ec69; margin-right: 8px; }

    /* 底部工具栏 */
    #bar { height: 56px; background: #f7f7f7; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid rgba(0,0,0,0.1); }
    #text { flex: 1; height: 36px; border: 1px solid #ddd; border-radius: 4px; padding: 0 10px; font-size: 15px; outline: none; }
    #text:disabled { background: #eee; cursor: not-allowed; }
    button { margin-left: 8px; background: #07c160; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:disabled { background: #ccc; }
</style>
</head>
<body>

<div id="user-list">
    <div class="list-title">访客在线列表</div>
    <div id="users"></div>
</div>

<div id="main">
    <div id="chat-header">请在左侧选择访客</div>
    <div id="chat"></div>
    <div id="bar">
        <input id="text" placeholder="输入回复内容..." autocomplete="off" disabled>
        <button id="sendBtn" onclick="send()" disabled>发送</button>
    </div>
</div>

<script>
    let targetId = ""; 
    let allMsg = [];
    let userSet = new Set();
    
    // 连接后端
    const socket = new WebSocket('wss://page-c4hm.onrender.com');

    socket.onopen = () => {
        console.log("客服端已连接");
        socket.send(JSON.stringify({ type: "init", userId: "admin" }));
    };

    socket.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if(data.type === "msg" || data.type === "img") {
            allMsg.push(data);
            
            // 自动发现新用户
            const otherSide = data.from === "admin" ? data.to : data.from;
            if(!userSet.has(otherSide)) {
                userSet.add(otherSide);
                renderUserList();
            }

            // 如果当前没选人，自动选第一个发消息的人
            if(!targetId && data.from !== "admin") {
                selectUser(data.from);
            }

            // 如果消息属于当前对话，立即刷屏
            if(otherSide === targetId) {
                renderChat();
            }
        }
    };

    function renderUserList() {
        const box = document.getElementById("users");
        box.innerHTML = "";
        userSet.forEach(u => {
            const div = document.createElement("div");
            div.className = "u-item " + (u === targetId ? "active" : "");
            div.innerText = u;
            div.onclick = () => selectUser(u);
            box.appendChild(div);
        });
    }

    function selectUser(uid) {
        targetId = uid;
        document.getElementById("chat-header").innerText = "正在对话: " + uid;
        document.getElementById("text").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("text").placeholder = "回复 " + uid + "...";
        renderUserList();
        renderChat();
    }

    function renderChat() {
        const chatBox = document.getElementById("chat");
        chatBox.innerHTML = "";
        
        // 只显示与当前 targetId 相关的对话
        const filtered = allMsg.filter(m => m.from === targetId || m.to === targetId);
        
        filtered.forEach(m => {
            const isMe = m.from === "admin";
            const row = document.createElement("div");
            row.className = "row " + (isMe ? "right" : "left");
            
            if(m.type === "msg") {
                row.innerHTML = `<div class="bubble">${m.text}</div>`;
            } else {
                row.innerHTML = `<div class="bubble" style="background:none;padding:0"><img src="${m.src}" style="max-width:150px;border-radius:8px;"></div>`;
            }
            chatBox.appendChild(row);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function send() {
        const input = document.getElementById("text");
        const val = input.value.trim();
        if(!val || !targetId) return;

        const payload = {
            from: "admin",
            to: targetId,
            type: "msg",
            text: val
        };
        
        socket.send(JSON.stringify(payload));
        input.value = "";
    }

    // 监听回车发送
    document.getElementById("text").onkeydown = (e) => {
        if(e.key === "Enter") send();
    };
</script>
</body>
</html>
