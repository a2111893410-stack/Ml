<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服后台</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #side { width: 160px; background: #2c2c2c; color: #fff; overflow-y: auto; }
        .utab { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; font-size: 13px; }
        .utab.active { background: #07c160; }
        #main { flex: 1; display: flex; flex-direction: column; background: #eee; }
        #box { flex: 1; overflow-y: auto; padding: 20px; }
        .row { display: flex; margin-bottom: 10px; }
        .row.admin { justify-content: flex-end; }
        .bubble { padding: 8px 12px; border-radius: 5px; background: #fff; max-width: 70%; }
        .admin .bubble { background: #95ec69; }
    </style>
</head>
<body>
    <div id="side"></div>
    <div id="main">
        <div id="box"></div>
        <div style="padding:15px; background:#fff; display:flex;">
            <input id="ipt" style="flex:1; padding:10px;" placeholder="输入消息...">
            <button onclick="send()" style="width:80px; margin-left:10px; background:#07c160; border:none; color:#fff;">回信</button>
        </div>
    </div>
<script>
    let activeId = "", msgList = [], ws;

    function connect() {
        ws = new WebSocket('wss://page-c4hm.onrender.com');
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") { msgList = res.data; }
            else if (res.type === "new_msg") { msgList.push(res.data); }
            render();
        };
        ws.onclose = () => setTimeout(connect, 3000);
    }

    function render() {
        const users = [...new Set(msgList.map(m => m.from === 'admin' ? m.to : m.from))].filter(u => u !== 'admin');
        document.getElementById('side').innerHTML = users.map(u => 
            `<div class="utab ${u===activeId?'active':''}" onclick="activeId='${u}';render()">${u}</div>`
        ).join("");

        if (!activeId) return;
        document.getElementById('box').innerHTML = msgList.filter(m => m.from === activeId || m.to === activeId).map(m => `
            <div class="row ${m.from==='admin'?'admin':'user'}">
                <div class="bubble">${m.text}</div>
            </div>
        `).join("");
        const box = document.getElementById('box');
        box.scrollTop = box.scrollHeight;
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim() || !activeId) return;
        ws.send(JSON.stringify({ type: 'msg', from: 'admin', to: activeId, text: i.value }));
        i.value = '';
    }
    connect();
</script>
</body>
</html>
