<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>客服管理</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #side { width: 180px; background: #2c2c2c; color: #ccc; overflow-y: auto; }
        .u { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .u.active { background: #07c160; color: #fff; }
        #main { flex: 1; display: flex; flex-direction: column; background: #eee; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; }
        #bar { padding: 15px; background: #fff; display: flex; }
        textarea { flex: 1; height: 50px; resize: none; border: 1px solid #ddd; padding: 10px; }
        button { width: 80px; margin-left: 10px; background: #07c160; color: #fff; border: none; }
        .row { display: flex; margin-bottom: 10px; }
        .right { justify-content: flex-end; }
        .bubble { max-width: 70%; padding: 8px 12px; border-radius: 5px; background: #fff; }
        .right .bubble { background: #95ec69; }
    </style>
</head>
<body>
    <div id="side"></div>
    <div id="main">
        <div id="msgs"></div>
        <div id="bar">
            <textarea id="ipt" placeholder="选择左侧用户回信..."></textarea>
            <button onclick="send()">发送</button>
        </div>
    </div>

    <script>
        let activeId = "";
        let db = {}; 
        let socket;

        function connect() {
            socket = new WebSocket('wss://page-c4hm.onrender.com');
            socket.onopen = () => socket.send(JSON.stringify({type: "init", userId: "admin"}));
            socket.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if (res.type === "history") {
                    res.list.forEach(m => store(m));
                } else {
                    store(res);
                }
                render();
            };
            socket.onclose = () => setTimeout(connect, 3000);
        }

        function store(m) {
            const talker = m.from === "admin" ? m.to : m.from;
            if (!db[talker]) db[talker] = [];
            // 简单排重逻辑
            const isDup = db[talker].some(old => old.time === m.time && old.text === m.text);
            if (!isDup) db[talker].push(m);
        }

        function render() {
            const side = document.getElementById('side');
            side.innerHTML = Object.keys(db).map(id => 
                `<div class="u ${id===activeId?'active':''}" onclick="activeId='${id}';render()">${id}</div>`
            ).join("");

            const msgs = document.getElementById('msgs');
            msgs.innerHTML = (db[activeId] || []).map(m => 
                `<div class="row ${m.from==='admin'?'right':'left'}"><div class="bubble">${m.text}</div></div>`
            ).join("");
            msgs.scrollTop = msgs.scrollHeight;
        }

        function send() {
            const ipt = document.getElementById('ipt');
            if (!ipt.value.trim() || !activeId) return;
            socket.send(JSON.stringify({from: "admin", to: activeId, text: ipt.value, type: "msg"}));
            ipt.value = "";
        }

        connect();
    </script>
</body>
</html>
