<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服端</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; }
        #list { width: 150px; background: #333; color: #fff; cursor: pointer; }
        #main { flex: 1; display: flex; flex-direction: column; background: #f9f9f9; }
        #box { flex: 1; overflow-y: auto; padding: 15px; }
        .active { background: #07c160; }
    </style>
</head>
<body>
    <div id="list"></div>
    <div id="main">
        <div id="box"></div>
        <div style="padding:10px; display:flex;">
            <input id="ipt" style="flex:1">
            <button onclick="send()">回信</button>
        </div>
    </div>
<script>
    let activeId = '', msgs = [], ws;

    function start() {
        const wsUrl = window.location.origin.replace(/^http/, 'ws');
        // const wsUrl = 'wss://page-c4hm.onrender.com';
        ws = new WebSocket(wsUrl);

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                msgs = res.data;
            } else {
                msgs.push(res);
            }
            render();
        };
        ws.onclose = () => setTimeout(start, 2000);
    }

    function render() {
        const users = [...new Set(msgs.map(m => m.from === 'admin' ? m.to : m.from))];
        document.getElementById('list').innerHTML = users.map(u => 
            `<div style="padding:10px" class="${u===activeId?'active':''}" onclick="activeId='${u}';render()">${u}</div>`
        ).join('');

        document.getElementById('box').innerHTML = msgs.filter(m => (m.from===activeId || m.to===activeId)).map(m => `
            <div style="text-align:${m.from==='admin'?'right':'left'}; margin:5px;">
                <span style="background:${m.from==='admin'?'#95ec69':'#fff'}; padding:5px; border-radius:3px;">${m.text}</span>
            </div>
        `).join('');
    }

    function send() {
        const ipt = document.getElementById('ipt');
        if (!activeId || !ipt.value) return;
        ws.send(JSON.stringify({ type: 'msg', from: 'admin', to: activeId, text: ipt.value }));
        ipt.value = '';
    }

    start();
</script>
</body>
</html>
