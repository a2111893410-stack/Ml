<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服进阶版</title>
    <style>
        body { display:flex; height:100vh; margin:0; font-family:sans-serif; background:#f0f2f5; }
        #sidebar { width:220px; background:#2c3e50; color:#fff; overflow-y:auto; }
        .u-item { padding:15px; border-bottom:1px solid #34495e; cursor:pointer; position:relative; }
        .u-item.active { background:#1abc9c; }
        .dot { position:absolute; right:15px; top:18px; width:8px; height:8px; background:#ff4d4f; border-radius:50%; }
        #main { flex:1; display:flex; flex-direction:column; }
        #box { flex:1; overflow-y:auto; padding:20px; background:#ebebed; }
        .row { display:flex; margin-bottom:10px; }
        .row.admin { justify-content:flex-end; }
        .bubble { max-width:70%; padding:8px 12px; background:#fff; border-radius:5px; font-size:14px; }
        .admin .bubble { background:#95ec69; }
        .bubble img { max-width:200px; display:block; border-radius:4px; }
        #bar { padding:15px; background:#fff; display:flex; gap:10px; }
    </style>
</head>
<body>
    <div id="sidebar"></div>
    <div id="main">
        <div id="box"></div>
        <div id="bar">
            <input id="ipt" style="flex:1; padding:10px; border:1px solid #ddd;" placeholder="输入回复...">
            <button onclick="send()">发送</button>
        </div>
    </div>

<script>
    let activeId = "", allMsgs = [], unread = {}, ws;
    // 准备一个提示音
    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    function start() {
        ws = new WebSocket('wss://page-c4hm.onrender.com');
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const msgs = res.type === "history" ? res.data : [res.data];
            
            msgs.forEach(m => {
                const from = m.from.toLowerCase();
                if(from !== 'admin' && from !== activeId && res.type !== "history") {
                    unread[from] = true;
                    audio.play().catch(()=>{}); // 播放声音
                }
                allMsgs.push(m);
            });
            refresh();
        };
        ws.onclose = () => setTimeout(start, 2000);
    }

    function refresh() {
        const users = [...new Set(allMsgs.map(m => m.from === 'admin' ? m.to : m.from))].filter(u => u !== 'admin');
        
        document.getElementById('sidebar').innerHTML = users.map(u => `
            <div class="u-item ${u===activeId?'active':''}" onclick="select('${u}')">
                ${u} ${unread[u] ? '<span class="dot"></span>' : ''}
            </div>
        `).join("");

        if (!activeId) return;
        document.getElementById('box').innerHTML = allMsgs.filter(m => (m.from === activeId || m.to === activeId))
            .map(m => `
                <div class="row ${m.from==='admin'?'admin':''}">
                    <div class="bubble">${m.type==='img' ? '<img src="'+m.text+'">' : m.text}</div>
                </div>
            `).join("");
        const box = document.getElementById('box');
        box.scrollTop = box.scrollHeight;
    }

    function select(id) {
        activeId = id;
        unread[id] = false; // 清除红点
        refresh();
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!activeId || !i.value) return;
        ws.send(JSON.stringify({ from: 'admin', to: activeId, text: i.value, type: 'text' }));
        i.value = '';
    }
    start();
</script>
</body>
</html>
