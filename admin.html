<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>WeChat客服 - 专家管理端</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; height: 100dvh; width: 100vw; display: flex; flex-direction: column; background: #ededed; font-family: -apple-system, sans-serif; overflow: hidden; position: fixed; top: 0; left: 0; }

```
    /* ── 顶部栏（与客户端一致）── */
    #header-wrapper { background: #ededed; border-bottom: 1px solid #dcdcdc; padding-top: env(safe-area-inset-top); flex-shrink: 0; z-index: 10; }
    #header { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 17px; font-weight: 500; }
    .head-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    #status-bar { width: 100%; text-align: center; color: #b2b2b2; font-size: 12px; padding: 2px 0; }

    #container { flex: 1; display: flex; overflow: hidden; }

    #side-list { width: 85px; background: #ededed; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; border-right: 1px solid #dcdcdc; }
    .u-item { padding: 12px 2px; text-align: center; color: #333; cursor: pointer; font-size: 13px; position: relative; border-bottom: 1px solid #e0e0e0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .u-item.active { background: #e2e2e2; font-weight: bold; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; transition: background 0.3s; }
    .online { background: #07c160; box-shadow: 0 0 4px #07c160; }
    .offline { background: #b2b2b2; }
    .badge { position: absolute; top: 2px; right: 2px; background: #fa5151; color: white; border-radius: 10px; min-width: 16px; height: 16px; line-height: 16px; font-size: 10px; padding: 0 4px; }

    #chat-area { flex: 1; background: #ededed; display: flex; flex-direction: column; overflow: hidden; }
    #box { flex: 1; overflow-y: auto; padding: 15px 10px; -webkit-overflow-scrolling: touch; }

    .msg-row { display: flex; margin-bottom: 16px; align-items: flex-start; }
    .msg-row.admin { flex-direction: row-reverse; }
    .avatar { width: 38px; height: 38px; border-radius: 4px; background: #fff; flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .bubble-txt { position: relative; max-width: 70%; padding: 10px 12px; font-size: 16px; line-height: 1.4; border-radius: 6px; margin: 0 10px; min-height: 38px; word-wrap: break-word; }
    .visitor .bubble-txt { background: #fff; }
    .visitor .bubble-txt::before { content: ""; position: absolute; left: -9px; top: 12px; border: 5px solid transparent; border-right-color: #fff; }
    .admin .bubble-txt { background: #95ec69; }
    .admin .bubble-txt::before { content: ""; position: absolute; right: -9px; top: 12px; border: 5px solid transparent; border-left-color: #95ec69; }

    .bubble-img { max-width: 160px; border-radius: 4px; margin: 0 10px; border: 1px solid #dcdcdc; display: block; cursor: pointer; }

    /* Toast */
    #toast { position: fixed; top: calc(60px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.72); color: #fff; padding: 7px 18px; border-radius: 20px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; }

    #footer { background: #f7f7f7; border-top: 1px solid #dcdcdc; padding: 8px 12px calc(8px + env(safe-area-inset-bottom)); flex-shrink: 0; z-index: 10; }
    #input-row { display: flex; align-items: flex-end; gap: 10px; }
    /* 修复：用 div 替代 label，JS 手动触发 click，避免移动端 label 事件冒泡失效 */
    .btn-plus { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-bottom: 2px; }
    #ipt { flex: 1; min-height: 38px; max-height: 120px; border: none; background: #fff; border-radius: 6px; padding: 8px 12px; font-size: 16px; outline: none; resize: none; -webkit-appearance: none; caret-color: #07c160; }
    .send-btn { background: #07c160; color: #fff; border: none; border-radius: 4px; padding: 0 15px; height: 36px; font-size: 15px; cursor: pointer; flex-shrink: 0; margin-bottom: 1px; }

    #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; align-items: center; justify-content: center; z-index: 100; }
    #viewer img { max-width: 100%; max-height: 100%; }

    #empty-tip { flex: 1; display: flex; align-items: center; justify-content: center; color: #b2b2b2; font-size: 15px; }
</style>

</head>
<body>

<!-- 顶部栏：与客户端完全一致 -->

<div id="header-wrapper">
    <div id="header">
        <div class="head-icon" onclick="history.back()">
            <svg viewBox="0 0 24 24" width="22" height="22" stroke="#111" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </div>
        <span id="title-name">WePro 客户管理</span>
        <div class="head-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="#111"><circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle></svg>
        </div>
    </div>
    <div id="status-bar">正在连接...</div>
</div>

<div id="container">
    <div id="side-list"></div>
    <div id="chat-area">
        <div id="empty-tip">← 选择一位用户开始对话</div>
        <div id="box" style="display:none" onclick="dismissKeyboard()"></div>
    </div>
</div>

<div id="footer">
    <div id="input-row">
        <!-- div + onclick 手动触发 input，彻底绕开 label 冒泡问题 -->
        <div class="btn-plus" onclick="document.getElementById('file-ipt').click()">
            <svg viewBox="0 0 24 24" width="30" height="30" stroke="#333" stroke-width="1.2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        </div>
        <!-- input 独立存在，不嵌套在 label 里 -->
        <input type="file" id="file-ipt" accept="image/*" style="display:none">
        <textarea id="ipt" rows="1" placeholder="发送消息..." disabled onkeydown="handleKeyDown(event)"></textarea>
        <button class="send-btn" onclick="sendText()">发送</button>
    </div>
</div>

<div id="toast"></div>
<div id="viewer" onclick="this.style.display='none'"><img id="viewer-img"></div>

<script>
    // ── 持久化已读时间戳 ─────────────────────────────────────
    let lastReadMap = JSON.parse(localStorage.getItem('wepro_lastread') || '{}');

    // ── 状态 ────────────────────────────────────────────────
    let activeId = "";
    let msgMap = new Map();
    let ws;
    let unreadMap = {};
    let onlineStatus = {};
    let onlineTimer = {};
    let renderedKeys = new Set();
    const ONLINE_TIMEOUT = 5 * 60 * 1000;

    const ipt = document.getElementById('ipt');
    const box = document.getElementById('box');
    const emptyTip = document.getElementById('empty-tip');
    const fileIpt = document.getElementById('file-ipt');

    // ── 修复核心①：用 addEventListener 绑定 change 事件 ─────
    // 比 onchange 属性更可靠，移动端不会丢失事件
    fileIpt.addEventListener('change', function () {
        directSendImg(this);
    });

    // ── Toast ────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function isConnected() {
        return ws && ws.readyState === WebSocket.OPEN;
    }

    function getShortName(id) {
        const num = id.replace(/[^0-9]/g, "").slice(-1) || "1";
        const names = ["访客", "用户", "客户", "咨询", "买家"];
        return names[id.length % names.length] + num;
    }

    function msgKey(m) {
        const txt = m.text || '';
        // 图片是 base64，开头都一样（/9j/4AAQ...），必须用末尾字符区分
        const sample = m.type === 'img'
            ? txt.slice(-20)
            : txt.slice(0, 20);
        return `${m.from}_${m.to}_${m.type}_${sample}_${m.time || ''}`;
    }

    function markOnline(uid) {
        onlineStatus[uid] = true;
        if (onlineTimer[uid]) clearTimeout(onlineTimer[uid]);
        onlineTimer[uid] = setTimeout(() => {
            onlineStatus[uid] = false;
            renderSideList();
        }, ONLINE_TIMEOUT);
    }

    // ── WebSocket ────────────────────────────────────────────
    function connect() {
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onopen = () => {
            document.getElementById('status-bar').innerText = "已连接";
        };

        ws.onclose = () => {
            document.getElementById('status-bar').innerText = "重连中...";
            setTimeout(connect, 3000);
        };

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const msgs = res.type === "history" ? res.data : [res.data];

            if (res.type === "history") {
                msgMap = new Map();
                renderedKeys = new Set();
                if (activeId) box.innerHTML = '';
            }

            msgs.forEach(m => {
                const k = msgKey(m);
                if (msgMap.has(k)) return;
                msgMap.set(k, m);

                const uid = String(m.from === 'admin' ? m.to : m.from).toLowerCase();
                if (m.from !== 'admin') {
                    markOnline(uid);
                    const lastRead = lastReadMap[uid] || 0;
                    const msgTime = m.time || 0;
                    if (uid !== activeId && msgTime > lastRead) {
                        unreadMap[uid] = (unreadMap[uid] || 0) + 1;
                    }
                }
            });

            renderSideList();
            if (activeId) renderChat();
        };
    }

    // ── 侧边栏渲染 ───────────────────────────────────────────
    function renderSideList() {
        const users = [...new Set([...msgMap.values()].map(m => m.from === 'admin' ? m.to : m.from))].filter(u => u !== 'admin');
        document.getElementById('side-list').innerHTML = users.map(u => `
            <div class="u-item ${u === activeId ? 'active' : ''}" onclick="selectUser('${u}')">
                <span class="status-dot ${onlineStatus[u] ? 'online' : 'offline'}"></span>
                <span>${getShortName(u)}</span>
                ${unreadMap[u] ? `<div class="badge">${unreadMap[u]}</div>` : ''}
            </div>
        `).join("");
    }

    // ── 聊天区增量渲染 ───────────────────────────────────────
    function renderChat() {
        if (!activeId) return;
        const msgs = [...msgMap.values()].filter(m => m.from === activeId || m.to === activeId);

        msgs.forEach(m => {
            const k = msgKey(m);
            if (renderedKeys.has(k)) return;
            renderedKeys.add(k);

            const isAdmin = m.from === 'admin';
            const avatar = isAdmin
                ? 'https://dummyimage.com/100/95ec69/fff&text=客服'
                : 'https://dummyimage.com/100/ccc/333&text=访';

            const row = document.createElement('div');
            row.className = `msg-row ${isAdmin ? 'admin' : 'visitor'}`;

            const ava = document.createElement('div');
            ava.className = 'avatar';
            ava.innerHTML = `<img src="${avatar}">`;
            row.appendChild(ava);

            if (m.type === 'img') {
                const img = document.createElement('img');
                img.className = 'bubble-img';
                img.src = m.text;
                img.onload = () => scrollToBottom();
                img.onclick = () => viewImg(m.text);
                row.appendChild(img);
            } else {
                const bbl = document.createElement('div');
                bbl.className = 'bubble-txt';
                bbl.textContent = m.text;
                row.appendChild(bbl);
            }

            box.appendChild(row);
            scrollToBottom();
        });
    }

    function scrollToBottom() {
        if (!box) return;
        box.scrollTop = box.scrollHeight;
        setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);
    }

    function selectUser(id) {
        activeId = id.toLowerCase();
        lastReadMap[activeId] = Date.now();
        localStorage.setItem('wepro_lastread', JSON.stringify(lastReadMap));
        unreadMap[activeId] = 0;
        renderedKeys = new Set();

        ipt.disabled = false;
        document.getElementById('title-name').innerText = getShortName(activeId);
        emptyTip.style.display = 'none';
        box.style.display = 'block';
        box.innerHTML = '';

        renderSideList();
        renderChat();
        setTimeout(() => ipt.focus(), 100);
    }

    function dismissKeyboard() { ipt.blur(); }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
    }

    function sendText() {
        const val = ipt.value.trim();
        if (!activeId || !val) return;
        if (!isConnected()) { showToast('发送失败，网络未连接'); return; }
        try {
            ws.send(JSON.stringify({ from: 'admin', to: activeId, text: val, type: 'text' }));
            ipt.value = '';
            ipt.style.height = '38px';
            lastReadMap[activeId] = Date.now();
            localStorage.setItem('wepro_lastread', JSON.stringify(lastReadMap));
            scrollToBottom();
        } catch (err) {
            showToast('发送失败，请重试');
        }
    }

    // ── 修复核心②：图片发送全面加固 ─────────────────────────
    function directSendImg(el) {
        const file = el.files[0];
        // 立即重置，确保同张图片可重复选择发送
        el.value = '';

        if (!file || !activeId) return;
        if (!isConnected()) { showToast('发送失败，网络未连接'); return; }

        // 快照异步开始前的状态，防止压缩期间 activeId/ws 发生变化
        const snapId = activeId;
        const snapWs = ws;

        const reader = new FileReader();
        reader.onerror = () => showToast('图片读取失败，请重试');
        reader.onload = (ev) => {
            const img = new Image();
            img.onerror = () => showToast('图片解析失败，请重试');
            img.onload = () => {
                try {
                    const maxWidth = 1000;
                    let w = img.width, h = img.height;
                    if (w > maxWidth) { h = Math.round((maxWidth / w) * h); w = maxWidth; }
                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const b64 = canvas.toDataURL('image/jpeg', 0.7);

                    // 用快照的 ws，不受重连影响
                    if (snapWs.readyState === WebSocket.OPEN) {
                        snapWs.send(JSON.stringify({ from: 'admin', to: snapId, text: b64, type: 'img' }));
                        lastReadMap[snapId] = Date.now();
                        localStorage.setItem('wepro_lastread', JSON.stringify(lastReadMap));
                    } else {
                        showToast('发送失败，网络已断开');
                    }
                } catch (err) {
                    showToast('图片发送失败，请重试');
                }
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function viewImg(src) {
        document.getElementById('viewer-img').src = src;
        document.getElementById('viewer').style.display = 'flex';
    }

    ipt.oninput = function () {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        scrollToBottom();
    };

    connect();
</script>

</body>
</html>
