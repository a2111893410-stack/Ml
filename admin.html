<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>WeChat客服 - 专家版</title>
    <style>
        /* --- 核心布局：iPhone 15 Pro Max 全屏锁定 --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; height: 100dvh; width: 100vw; 
            display: flex; flex-direction: column; background: #ededed; 
            font-family: -apple-system, sans-serif; overflow: hidden; position: fixed; 
        }

        /* 顶部栏 (WeChat Style) */
        #header { 
            height: 44px; background: #ededed; border-bottom: 1px solid #dcdcdc; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; flex-shrink: 0; font-size: 17px; font-weight: 500;
            padding-top: env(safe-area-inset-top);
        }

        /* 中间主体区 */
        #container { flex: 1; display: flex; overflow: hidden; }

        /* 左侧访客列表：颜色改为背景灰，进一步收窄 */
        #side-list { 
            width: 70px; background: #ededed; display: flex; flex-direction: column; 
            flex-shrink: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
            border-right: 1px solid #dcdcdc; /* 增加右边界线 */
        }
        .u-item { 
            padding: 12px 2px; text-align: center; color: #333; cursor: pointer; 
            font-size: 13px; position: relative; border-bottom: 1px solid #e0e0e0; /* 细浅色分界线 */
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .u-item.active { background: #e2e2e2; font-weight: bold; }
        
        /* 状态指示点 */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .online { background: #07c160; box-shadow: 0 0 4px #07c160; }
        .offline { background: #b2b2b2; }

        .badge { 
            position: absolute; top: 2px; right: 2px; background: #fa5151; color: white; 
            border-radius: 10px; min-width: 16px; height: 16px; line-height: 16px; 
            font-size: 10px; padding: 0 4px; 
        }

        /* 右侧对话区 */
        #chat-area { flex: 1; background: #ededed; display: flex; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 15px 10px; -webkit-overflow-scrolling: touch; }

        /* 气泡样式保持一致 */
        .msg-row { display: flex; margin-bottom: 16px; align-items: flex-start; }
        .msg-row.admin { flex-direction: row-reverse; }
        .avatar { width: 38px; height: 38px; border-radius: 4px; background: #fff; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .bubble-txt { 
            position: relative; max-width: 65%; padding: 10px 12px; font-size: 16px; line-height: 1.4; border-radius: 6px; 
            margin: 0 10px; min-height: 38px; word-wrap: break-word;
        }
        .visitor .bubble-txt { background: #fff; }
        .visitor .bubble-txt::before { content: ""; position: absolute; left: -9px; top: 12px; border: 5px solid transparent; border-right-color: #fff; }
        .admin .bubble-txt { background: #95ec69; }
        .admin .bubble-txt::before { content: ""; position: absolute; right: -9px; top: 12px; border: 5px solid transparent; border-left-color: #95ec69; }
        .bubble-img { max-width: 160px; border-radius: 4px; margin: 0 10px; border: 1px solid #dcdcdc; display: block; }

        /* 底部输入栏 */
        #footer { 
            background: #f7f7f7; border-top: 1px solid #dcdcdc; 
            padding: 8px 10px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
            flex-shrink: 0;
        }
        #input-row { display: flex; align-items: flex-end; gap: 8px; }
        #ipt { 
            flex: 1; border: none; background: #fff; border-radius: 4px; 
            padding: 10px; font-size: 16px; outline: none; 
            min-height: 40px; max-height: 100px; resize: none;
            -webkit-appearance: none;
        }
        .icon-btn { width: 32px; height: 32px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn { 
            height: 36px; padding: 0 15px; background: #07c160; color: #fff; 
            border: none; border-radius: 4px; font-weight: bold; margin-bottom: 2px;
        }

        /* 预览层 */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; align-items: center; justify-content: center; z-index: 100; }
        #viewer img { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

<div id="header">
    <span style="visibility: hidden;">‹</span>
    <span id="title-name">WePro 客户管理</span>
    <span style="font-size: 20px;">···</span>
</div>

<div id="container">
    <div id="side-list"></div>
    
    <div id="chat-area">
        <div id="box" onclick="dismissKeyboard()"></div>
    </div>
</div>

<div id="footer">
    <div id="input-row">
        <label class="icon-btn">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="#555"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <input type="file" id="file-ipt" accept="image/*" style="display:none" onchange="directSendImg(this)">
        </label>
        <textarea id="ipt" rows="1" placeholder="发送..." disabled onkeydown="handleKeyDown(event)"></textarea>
        <button id="send-btn" class="send-btn" onclick="sendText()">发送</button>
    </div>
</div>

<div id="viewer" onclick="this.style.display='none'"><img id="viewer-img"></div>

<script>
    let activeId = "", allMsgs = [], unreadMap = {}, ws;
    const ipt = document.getElementById('ipt');
    const box = document.getElementById('box');

    // 状态映射表（简单演示，真实环境需后端配合广播状态）
    let onlineStatus = {}; 

    // ID 转两个中文字符的简易函数
    function getShortName(id) {
        // 取ID后两位作为编号，或者根据ID生成固定词汇
        let num = id.replace(/[^0-9]/g, "").slice(-1) || "1";
        const names = ["访客", "用户", "客户", "咨询", "买家"];
        return names[id.length % names.length] + num;
    }

    function connect() {
        ws = new WebSocket('wss://page-c4hm.onrender.com'); 

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const msgs = res.type === "history" ? res.data : [res.data];
            msgs.forEach(m => {
                allMsgs.push(m);
                const from = String(m.from).toLowerCase();
                if (from !== 'admin') {
                    onlineStatus[from] = true; // 收到消息代表在线
                    if (from !== activeId && res.type !== "history") {
                        unreadMap[from] = (unreadMap[from] || 0) + 1;
                    }
                }
            });
            render();
        };
        ws.onclose = () => { setTimeout(connect, 3000); };
    }

    function render() {
        const users = [...new Set(allMsgs.map(m => m.from === 'admin' ? m.to : m.from))].filter(u => u !== 'admin');
        
        document.getElementById('side-list').innerHTML = users.map(u => `
            <div class="u-item ${u === activeId ? 'active' : ''}" onclick="selectUser('${u}')">
                <span class="status-dot ${onlineStatus[u] ? 'online' : 'offline'}"></span>
                <span>${getShortName(u)}</span>
                ${unreadMap[u] ? `<div class="badge">${unreadMap[u]}</div>` : ''}
            </div>
        `).join("");

        if (!activeId) return;
        ipt.disabled = false;
        document.getElementById('title-name').innerText = getShortName(activeId);

        box.innerHTML = allMsgs.filter(m => m.from === activeId || m.to === activeId).map(m => {
            const isAdmin = m.from === 'admin';
            const avatar = isAdmin ? 'https://dummyimage.com/100/95ec69/fff&text=客服' : 'https://dummyimage.com/100/ccc/333&text=访';
            let content = m.type === 'img' ? `<img src="${m.text}" class="bubble-img" onclick="viewImg('${m.text}')">` : `<div class="bubble-txt">${m.text}</div>`;
            return `<div class="msg-row ${isAdmin ? 'admin' : 'visitor'}"><div class="avatar"><img src="${avatar}"></div>${content}</div>`;
        }).join("");
        box.scrollTop = box.scrollHeight;
    }

    function selectUser(id) {
        activeId = id.toLowerCase();
        unreadMap[id] = 0;
        render();
        setTimeout(() => ipt.focus(), 100);
    }

    function dismissKeyboard() { ipt.blur(); }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
    }

    function sendText() {
        const val = ipt.value.trim();
        if (!activeId || !val) return;
        ws.send(JSON.stringify({ from: 'admin', to: activeId, text: val, type: 'text' }));
        ipt.value = '';
        ipt.style.height = '40px';
    }

    function directSendImg(el) {
        const file = el.files[0];
        if (!file || !activeId) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            ws.send(JSON.stringify({ from: 'admin', to: activeId, text: e.target.result, type: 'img' }));
            el.value = '';
        };
        reader.readAsDataURL(file);
    }

    function viewImg(src) {
        document.getElementById('viewer-img').src = src;
        document.getElementById('viewer').style.display = 'flex';
    }

    ipt.oninput = function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    };

    connect();
</script>
</body>
</html>
