<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服</title>
    <style>
        body { display:flex; height:100vh; margin:0; }
        #list { width:100px; background:#333; color:#fff; font-size:12px; overflow-y:auto; }
        #main { flex:1; display:flex; flex-direction:column; }
        #box { flex:1; overflow-y:auto; padding:10px; background:#eee; }
        .active { background:#07c160; }
    </style>
</head>
<body>
    <div id="list"></div>
    <div id="main">
        <div id="box"></div>
        <div style="padding:10px; display:flex;">
            <input id="ipt" style="flex:1"><button onclick="send()">回信</button>
        </div>
    </div>
<script>
    let activeId = '', msgs = [], ws;
    function start() {
        ws = new WebSocket('wss://page-c4hm.onrender.com');
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") msgs = res.data;
            else msgs.push(res.data);
            render();
        };
        ws.onclose = () => setTimeout(start, 2000);
    }

    function render() {
        const users = [...new Set(msgs.map(m => m.from==='admin'?m.to:m.from))].filter(u => u !== 'admin');
        document.getElementById('list').innerHTML = users.map(u => 
            `<div style="padding:10px" class="${u===activeId?'active':''}" onclick="activeId='${u}';render()">${u}</div>`
        ).join('');

        document.getElementById('box').innerHTML = msgs.filter(m => (m.from===activeId || m.to===activeId)).map(m => `
            <div style="text-align:${m.from==='admin'?'right':'left'}; margin:5px;">
                <span style="background:${m.from==='admin'?'#95ec69':'#fff'}; padding:5px; border-radius:3px; font-size:14px;">${m.text}</span>
            </div>
        `).join('');
        const b = document.getElementById('box'); b.scrollTop = b.scrollHeight;
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!activeId || !i.value) return;
        ws.send(JSON.stringify({ from: 'admin', to: activeId, text: i.value }));
        i.value = '';
    }
    start();
</script>
</body>
</html>
