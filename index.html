<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>在线客服</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 布局锁定 */
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; background: #ededed; 
        }
        
        /* 使用一个固定在全屏的容器，避免 body 被推起 */
        #app-wrapper {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            /* 利用 transition 让高度变化更平滑 */
            transition: bottom 0.1s ease-out; 
        }

        #header-wrapper {
            background: #ededed; border-bottom: 1px solid #dcdcdc;
            padding-top: env(safe-area-inset-top); flex-shrink: 0;
        }
        #header { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 17px; font-weight: 500; }
        #status-bar { width: 100%; text-align: center; color: #b2b2b2; font-size: 12px; padding-bottom: 2px; }

        #chat { 
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
            background: #ededed; position: relative;
        }
        #chat-inner { padding: 12px; display: flex; flex-direction: column; }

        /* 气泡样式保持不变 */
        .msg-row { margin-bottom: 16px; display: flex; align-items: flex-start; }
        .msg-row.me { flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 4px; background: #fff; background-size: cover; flex-shrink: 0; }
        .me .avatar { margin-left: 12px; background-image: url('https://dummyimage.com/100/95ec69/fff&text=我'); }
        .visitor .avatar { margin-right: 12px; background-image: url('https://dummyimage.com/100/fff/333&text=客'); }
        .bubble-txt { position: relative; padding: 10px 14px; font-size: 16px; line-height: 1.5; border-radius: 6px; max-width: calc(100% - 110px); word-wrap: break-word; }
        .visitor .bubble-txt { background: #fff; }
        .me .bubble-txt { background: #95ec69; }

        /* 底部输入栏 */
        #footer { 
            background: #f7f7f7; border-top: 1px solid #dcdcdc; 
            padding: 8px 12px;
            /* 适配底部安全区 */
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0;
        }
        textarea { 
            flex: 1; min-height: 38px; max-height: 120px; border: none; 
            background: #fff; border-radius: 6px; padding: 8px 12px; 
            font-size: 16px; outline: none; resize: none; 
        }
        .btn-send { 
            background: #07c160; color: #fff; border: none; border-radius: 4px; 
            padding: 0 15px; height: 36px; font-size: 15px; font-weight: bold; 
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="header-wrapper">
        <div id="header">
            <div onclick="history.back()"><svg viewBox="0 0 24 24" width="22" height="22" stroke="#111" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg></div>
            <div>在线客服</div>
            <div style="width:24px"></div>
        </div>
        <div id="status-bar">已连接</div>
    </div>

    <div id="chat">
        <div id="chat-inner"></div>
    </div>

    <div id="footer">
        <textarea id="ipt" rows="1" placeholder=""></textarea>
        <button class="btn-send" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    const myId = (localStorage.getItem('wx_uid') || 'u' + Math.random().toString(36).substr(2,4).toLowerCase());
    localStorage.setItem('wx_uid', myId);

    const appWrapper = document.getElementById('app-wrapper');
    const chatContainer = document.getElementById('chat');
    const chatInner = document.getElementById('chat-inner');
    const iptBox = document.getElementById('ipt');

    // --- 【超级优化】Safari 丝滑跟随键盘方案 ---
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            const vv = window.visualViewport;
            // 计算键盘遮挡的高度
            const keyboardHeight = window.innerHeight - vv.height;
            
            // 关键：不要改 body 高度，改容器的 bottom 偏移
            // 这样浏览器只需要移动图层，不需要重排所有文字，非常丝滑
            if (keyboardHeight > 0) {
                appWrapper.style.bottom = keyboardHeight + 'px';
                // 强制将聊天滑到底部
                setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 30);
            } else {
                appWrapper.style.bottom = '0px';
            }
        });
        
        // 解决 Safari 在键盘弹起时页面整体被顶起的 Bug
        window.visualViewport.addEventListener('scroll', () => {
            if (window.visualViewport.offsetTop > 0) {
                window.scrollTo(0, 0);
            }
        });
    }

    let ws;
    function connect() {
        ws = new WebSocket('wss://page-c4hm.onrender.com'); 
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") chatInner.innerHTML = "";
            const list = res.type === "history" ? res.data : [res.data];
            list.forEach(m => {
                if (String(m.from).toLowerCase() === myId || String(m.to).toLowerCase() === myId) renderMsg(m);
            });
        };
        ws.onclose = () => setTimeout(connect, 3000);
    }

    function renderMsg(m) {
        const isMe = String(m.from).toLowerCase() === myId;
        const div = document.createElement('div');
        div.className = 'msg-row' + (isMe ? ' me' : ' visitor');
        div.innerHTML = `<div class="avatar"></div><div class="bubble-txt">${m.text}</div>`;
        chatInner.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function sendMsg() {
        const text = iptBox.value.trim();
        if(!text) return;
        ws.send(JSON.stringify({ from: myId, to: 'admin', text: text, type: 'text' }));
        iptBox.value = '';
        iptBox.style.height = '38px';
    }

    // 自动高度
    iptBox.oninput = function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    };

    connect();
</script>
</body>
</html>
