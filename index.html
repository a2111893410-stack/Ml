<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>访客测试</title>
    <style>
        body { margin:0; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; }
        #log { background:#333; color:#0f0; font-size:10px; padding:5px; height:40px; overflow:hidden; }
        #chat { flex:1; overflow-y:auto; padding:10px; background:#eee; }
        .msg { margin:5px; padding:8px; border-radius:5px; background:#fff; border:1px solid #ddd; }
        .me { background:#95ec69; text-align:right; }
        #bar { display:flex; padding:10px; background:#fff; }
    </style>
</head>
<body>
    <div id="log">等待数据...</div>
    <div id="chat"></div>
    <div id="bar">
        <input id="ipt" style="flex:1" placeholder="输入消息">
        <button onclick="send()">发送</button>
    </div>

<script>
    // 强制固定一个简单的 ID
    const myId = 'USER_' + Math.floor(Math.random()*1000);
    let ws = new WebSocket('wss://page-c4hm.onrender.com');
    const chat = document.getElementById('chat');
    const log = document.getElementById('log');

    ws.onopen = () => log.innerText = "已连接为: " + myId;
    ws.onmessage = (e) => {
        const res = JSON.parse(e.data);
        const data = res.type === "history" ? res.data : [res.data];
        
        data.forEach(m => {
            log.innerText = "收到来自 " + m.from + " 的消息";
            const div = document.createElement('div');
            div.className = 'msg' + (m.from === myId ? ' me' : '');
            // 显示发送者和接收者，方便调试
            div.innerHTML = `<small style="color:gray">${m.from} -> ${m.to}</small><br>${m.text}`;
            chat.appendChild(div);
        });
        chat.scrollTop = chat.scrollHeight;
    };

    function send() {
        const ipt = document.getElementById('ipt');
        if(!ipt.value) return;
        const msg = { from: myId, to: 'admin', text: ipt.value };
        ws.send(JSON.stringify(msg));
        ipt.value = '';
    }
</script>
</body>
</html>
