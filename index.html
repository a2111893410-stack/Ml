<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>联系客服</title>
    <style>
        /* 复用你提供的基础布局 CSS */
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; overflow: hidden; background: #ededed; font-family: -apple-system, BlinkMacSystemFont; }
        #top { position: fixed; top: 0; left: 0; right: 0; height: 44px; padding-top: env(safe-area-inset-top); background: #ededed; border-bottom: 0.5px solid rgba(0,0,0,0.06); z-index: 999; display: flex; align-items: center; justify-content: center; }
        #chat { position: fixed; left: 0; right: 0; top: calc(44px + env(safe-area-inset-top)); bottom: 60px; overflow-y: auto; padding: 10px; }
        .row { display: flex; margin: 10px 0; align-items: flex-start; }
        .left { justify-content: flex-start; }
        .right { justify-content: flex-end; }
        .avatar { width: 40px; height: 40px; border-radius: 6px; overflow: hidden; background: #fff; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 8px; font-size: 15px; word-break: break-word; position: relative; margin: 0 8px; }
        .left .bubble { background: #fff; }
        .right .bubble { background: #95ec69; }
        .msg-img img { max-width: 200px; border-radius: 8px; cursor: pointer; }
        #bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #f7f7f7; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid #ddd; }
        #text { flex: 1; height: 36px; border: none; border-radius: 4px; padding: 0 10px; outline: none; }
        button { margin-left: 5px; background: #07c160; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="top"><div id="title">在线客服</div></div>
    <div id="chat"></div>
    <div id="bar">
        <input id="text" placeholder="输入消息...">
        <input type="file" id="file" hidden accept="image/*">
        <button onclick="document.getElementById('file').click()">+</button>
        <button onclick="send()">发送</button>
    </div>

    <script>
        const chatBox = document.getElementById("chat");
        const myId = localStorage.getItem('chat_uid') || 'user_' + Math.random().toString(36).substr(2, 7);
        localStorage.setItem('chat_uid', myId);

        let socket = new WebSocket('wss://page-c4hm.onrender.com');

        socket.onopen = () => {
            socket.send(JSON.stringify({ type: "init", userId: myId }));
            socket.send(JSON.stringify({ type: "history", userId: myId }));
        };

        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === "history") {
                data.list.forEach(msg => addDOM(msg));
            } else if (data.type === "msg" || data.type === "img") {
                addDOM(data);
            }
        };

        function addDOM(msg) {
            const isMe = msg.from === myId;
            const row = document.createElement("div");
            row.className = "row " + (isMe ? "right" : "left");
            const avatar = isMe ? "https://i.pravatar.cc/100?img=12" : "https://i.pravatar.cc/100?img=3";
            
            let content = msg.type === "msg" ? `<div class="bubble">${msg.text}</div>` : `<div class="msg-img"><img src="${msg.src}"></div>`;
            
            row.innerHTML = isMe ? `${content}<div class="avatar"><img src="${avatar}"></div>` : `<div class="avatar"><img src="${avatar}"></div>${content}`;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function send() {
            const input = document.getElementById("text");
            if (!input.value.trim()) return;
            socket.send(JSON.stringify({ from: myId, to: "admin", type: "msg", text: input.value }));
            input.value = "";
        }

        document.getElementById("file").onchange = function() {
            const reader = new FileReader();
            reader.onload = (e) => socket.send(JSON.stringify({ from: myId, to: "admin", type: "img", src: e.target.result }));
            reader.readAsDataURL(this.files[0]);
        };
    </script>
</body>
</html>
