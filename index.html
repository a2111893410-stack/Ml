<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在线客服</title>
    <style>
        body { margin: 0; background: #ededed; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .row { display: flex; margin-bottom: 15px; }
        .right { justify-content: flex-end; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 8px; font-size: 15px; line-height: 1.4; word-break: break-all; }
        .left .bubble { background: #fff; }
        .right .bubble { background: #95ec69; }
        #bar { background: #f7f7f7; padding: 10px; display: flex; border-top: 1px solid #ddd; }
        input { flex: 1; border: none; border-radius: 5px; padding: 10px; outline: none; font-size: 16px; }
        button { margin-left: 10px; background: #07c160; color: #fff; border: none; padding: 0 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="bar">
        <input id="ipt" placeholder="请输入消息..." autocomplete="off">
        <button onclick="send()">发送</button>
    </div>

    <script>
        let myId = localStorage.getItem('chat_uid') || 'U'+Math.random().toString(36).substr(2,5).toUpperCase();
        localStorage.setItem('chat_uid', myId);

        let socket;
        const chatBox = document.getElementById('chat');

        function connect() {
            socket = new WebSocket('wss://page-c4hm.onrender.com');
            socket.onopen = () => socket.send(JSON.stringify({type: "init", userId: myId}));
            socket.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if (res.type === "history") {
                    chatBox.innerHTML = "";
                    res.list.forEach(m => renderMsg(m));
                } else if (res.from === myId || res.to === myId) {
                    renderMsg(res);
                }
            };
            socket.onclose = () => setTimeout(connect, 3000);
        }

        function renderMsg(m) {
            const isMe = m.from === myId;
            const row = document.createElement('div');
            row.className = `row ${isMe ? 'right' : 'left'}`;
            row.innerHTML = `<div class="bubble">${m.text}</div>`;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function send() {
            const ipt = document.getElementById('ipt');
            if(!ipt.value.trim()) return;
            socket.send(JSON.stringify({from: myId, to: "admin", text: ipt.value, type: "msg"}));
            ipt.value = "";
        }

        document.getElementById('ipt').onkeydown = (e) => { if(e.key === 'Enter') send(); };
        connect();
    </script>
</body>
</html>
