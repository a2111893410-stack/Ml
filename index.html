<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>在线客服</title>
    <style>
        /* --- 微信基础重置 --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; height: 100vh; background: #ededed; font-family: -apple-system, Helvetica, sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        
        /* --- 顶部导航栏 (还原微信) --- */
        #header { height: 44px; background: #ededed; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 10; font-size: 17px; font-weight: 500; padding-top: env(safe-area-inset-top); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .head-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #status-bar { position: fixed; top: calc(44px + env(safe-area-inset-top)); width: 100%; text-align: center; color: #b2b2b2; font-size: 12px; background: #ededed; padding: 4px 0; z-index: 9; }

        /* --- 聊天主区域 --- */
        #chat { flex: 1; overflow-y: auto; padding: 75px 12px 90px 12px; -webkit-overflow-scrolling: touch; }
        
        /* 消息行布局 */
        .msg-row { margin-bottom: 20px; display: flex; align-items: flex-start; }
        .msg-row.me { flex-direction: row-reverse; }
        
        /* 头像 */
        .avatar { width: 40px; height: 40px; border-radius: 4px; background: #dfdfdf; flex-shrink: 0; background-size: cover; background-position: center; }
        .me .avatar { margin-left: 12px; background-image: url('https://dummyimage.com/100x100/95ec69/fff&text=我'); }
        .visitor .avatar { margin-right: 12px; background-image: url('https://dummyimage.com/100x100/fff/333&text=客服'); }

        /* --- 气泡样式 (微信像素级对齐) --- */
        .bubble-wrapper { position: relative; max-width: calc(100% - 110px); }
        .bubble-txt { padding: 10px 14px; font-size: 16px; line-height: 1.4; border-radius: 8px; word-wrap: break-word; min-height: 40px; display: flex; align-items: center; }
        
        /* 客服气泡 (白) */
        .visitor .bubble-txt { background: #fff; color: #111; }
        .visitor .bubble-wrapper::before { content:''; position: absolute; left:-6px; top:14px; width: 10px; height: 10px; background: #fff; transform: rotate(45deg); border-bottom-left-radius: 2px; }
        
        /* 我的气泡 (绿) */
        .me .bubble-txt { background: #95ec69; color: #111; }
        .me .bubble-wrapper::before { content:''; position: absolute; right:-6px; top:14px; width: 10px; height: 10px; background: #95ec69; transform: rotate(45deg); border-top-right-radius: 2px; }

        /* 图片消息 (无气泡) */
        .bubble-img { max-width: 140px; border-radius: 6px; display: block; border: 1px solid rgba(0,0,0,0.05); }

        /* --- 底部输入栏 (全新改版) --- */
        #footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #f7f7f7; border-top: 1px solid #e5e5e5; padding: 8px 12px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); z-index: 10; display: flex; align-items: flex-end; gap: 10px; }
        
        /* 左侧加号图标 */
        .btn-plus { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-bottom: 2px; }
        
        /* 中间输入框 */
        textarea { flex: 1; min-height: 38px; max-height: 100px; border: none; background: #fff; border-radius: 6px; padding: 8px 12px; font-size: 16px; outline: none; resize: none; -webkit-appearance: none; caret-color: #07c160; }
        
        /* 右侧发送按钮 */
        .btn-send { background: #07c160; color: #fff; border: none; border-radius: 6px; padding: 0 16px; height: 36px; font-size: 15px; font-weight: 500; cursor: pointer; flex-shrink: 0; margin-bottom: 1px; transition: 0.2s; }
        .btn-send:active { background: #06ad56; }

        /* 图片发送悬浮预览区 */
        #preview-box { position: absolute; bottom: calc(100% + 15px); left: 15px; background: #fff; border-radius: 8px; padding: 6px; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.12); border: 1px solid #ebebeb; }
        #preview-box img { max-width: 100px; max-height: 100px; display: block; border-radius: 4px; }
        .btn-close-pre { position: absolute; top: -10px; right: -10px; width: 22px; height: 22px; background: #ff4d4f; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); line-height: 1; }
    </style>
</head>
<body>

<div id="header">
    <div class="head-icon" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="22" height="22" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </div>
    <div>在线客服</div>
    <div class="head-icon">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="#111"><circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle></svg>
    </div>
</div>
<div id="status-bar">正在连接...</div>

<div id="chat"></div>

<div id="footer">
    <div id="preview-box">
        <div class="btn-close-pre" onclick="clearPre()">×</div>
        <img src="" id="pre-img">
    </div>

    <label for="file-ipt" class="btn-plus">
        <svg viewBox="0 0 24 24" width="28" height="28" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
    </label>
    <input type="file" id="file-ipt" accept="image/*" style="display:none" onchange="previewImg(this)">
    
    <textarea id="ipt" rows="1" placeholder=""></textarea>
    
    <button class="btn-send" onclick="sendMsg()">发送</button>
</div>

<script>
    const myId = (localStorage.getItem('wx_uid') || 'u' + Math.random().toString(36).substr(2,4).toLowerCase());
    localStorage.setItem('wx_uid', myId);

    let ws, previewBase64 = '';
    const chatBox = document.getElementById('chat');
    const iptBox = document.getElementById('ipt');

    function connect() {
        // ！！！填入你的 Render 地址 ！！！
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onopen = () => document.getElementById('status-bar').innerText = "已连接";
        ws.onclose = () => { document.getElementById('status-bar').innerText = "断开重连中..."; setTimeout(connect, 3000); };
        
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const list = res.type === "history" ? res.data : [res.data];
            list.forEach(m => {
                if (String(m.from).toLowerCase() === myId || String(m.to).toLowerCase() === myId) {
                    renderMsg(m);
                }
            });
        };
    }

    function renderMsg(m) {
        const isMe = String(m.from).toLowerCase() === myId;
        const div = document.createElement('div');
        div.className = 'msg-row' + (isMe ? ' me' : ' visitor');
        
        const ava = document.createElement('div');
        ava.className = 'avatar';
        
        const wrapper = document.createElement('div');
        wrapper.className = 'bubble-wrapper';

        if (m.type === 'img') {
            const img = document.createElement('img');
            img.className = 'bubble-img';
            img.src = m.text;
            wrapper.appendChild(img);
        } else {
            const txt = document.createElement('div');
            txt.className = 'bubble-txt';
            txt.innerText = m.text;
            wrapper.appendChild(txt);
        }

        div.appendChild(ava);
        div.appendChild(wrapper);
        chatBox.appendChild(div);
        scrollToBottom();
    }

    function previewImg(el) {
        const file = el.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            previewBase64 = e.target.result;
            document.getElementById('pre-img').src = previewBase64;
            document.getElementById('preview-box').style.display = 'block';
            el.value = ''; 
        };
        reader.readAsDataURL(file);
    }

    function clearPre() {
        previewBase64 = '';
        document.getElementById('preview-box').style.display = 'none';
        document.getElementById('pre-img').src = '';
    }

    function sendMsg() {
        const text = iptBox.value.trim();
        // 优先发送预览的图片
        if (previewBase64) {
            ws.send(JSON.stringify({ from: myId, to: 'admin', text: previewBase64, type: 'img' }));
            clearPre();
        } 
        // 然后发送文字
        else if (text) {
            ws.send(JSON.stringify({ from: myId, to: 'admin', text: text, type: 'text' }));
            iptBox.value = '';
        }
        iptBox.focus();
    }

    function scrollToBottom() {
        requestAnimationFrame(() => chatBox.scrollTop = chatBox.scrollHeight);
    }

    // 监听键盘事件
    iptBox.onfocus = () => setTimeout(scrollToBottom, 300);
    iptBox.onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { sendMsg(); e.preventDefault(); } };

    connect();
</script>
</body>
</html>
