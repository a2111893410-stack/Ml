<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>在线客服</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 1. 放弃动态单位，回归最稳的 absolute 布局 */
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #ededed; font-family: -apple-system, sans-serif; 
            overflow: hidden; position: absolute; top: 0; left: 0;
        }
        
        #app-wrapper {
            height: 100%; width: 100%;
            display: flex; flex-direction: column;
            position: relative;
        }

        #header-wrapper {
            background: #ededed; border-bottom: 1px solid #dcdcdc;
            padding-top: env(safe-area-inset-top); flex-shrink: 0;
        }
        #header { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 17px; font-weight: 500; }

        #chat { 
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
            background: #ededed;
        }
        #chat-inner { padding: 12px; display: flex; flex-direction: column; }

        /* 气泡样式保持不变 */
        .msg-row { margin-bottom: 16px; display: flex; align-items: flex-start; }
        .msg-row.me { flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 4px; background: #fff; flex-shrink: 0; background-size: cover; }
        .me .avatar { margin-left: 12px; background-image: url('https://dummyimage.com/100x100/95ec69/fff&text=我'); }
        .visitor .avatar { margin-right: 12px; background-image: url('https://dummyimage.com/100x100/fff/333&text=客'); }
        .bubble-txt { position: relative; padding: 10px 14px; font-size: 16px; line-height: 1.5; border-radius: 6px; max-width: calc(100% - 110px); word-wrap: break-word; background: #fff; }
        .me .bubble-txt { background: #95ec69; }

        /* 2. 底部栏补丁：不再使用 env(safe-area-inset-bottom) 实时撑开
           因为搜狗输入法弹出时，这个值会乱跳 */
        #footer { 
            background: #f7f7f7; border-top: 1px solid #dcdcdc; 
            padding: 8px 12px; 
            display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }
        
        textarea { 
            flex: 1; min-height: 38px; max-height: 120px; border: none; 
            background: #fff; border-radius: 6px; padding: 8px 12px; 
            font-size: 16px; outline: none; resize: none; -webkit-appearance: none;
        }
        .btn-send { background: #07c160; color: #fff; border: none; border-radius: 4px; padding: 0 15px; height: 36px; font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="header-wrapper"><div id="header"><span></span><span>在线客服</span><span></span></div></div>
    <div id="chat"><div id="chat-inner"></div></div>
    <div id="footer">
        <textarea id="ipt" rows="1"></textarea>
        <button class="btn-send" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat');
    const iptBox = document.getElementById('ipt');
    const footer = document.getElementById('footer');

    // --- 【搜狗输入法专治补丁】 ---
    
    // 方案：scrollIntoView 钉死法
    // 不管视口高度怎么变，强制让 footer 滚动到当前可视区域的底部
    const stickToBottom = () => {
        footer.scrollIntoView({ block: "end", behavior: "auto" });
        chatContainer.scrollTop = chatContainer.scrollHeight;
    };

    iptBox.addEventListener('focus', () => {
        // 搜狗输入法弹出较慢，需要多重检查
        setTimeout(stickToBottom, 100);
        setTimeout(stickToBottom, 300);
        setTimeout(stickToBottom, 500); 
    });

    // 监听视口变化作为双重保险
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', stickToBottom);
    }

    // 消息逻辑（简略）
    let ws = new WebSocket('wss://page-c4hm.onrender.com');
    ws.onmessage = (e) => {
        const res = JSON.parse(e.data);
        if(res.data) renderMsg(res.data);
    };

    function renderMsg(m) {
        const div = document.createElement('div');
        div.className = 'msg-row' + (m.from === 'me' ? ' me' : ' visitor');
        div.innerHTML = `<div class="avatar"></div><div class="bubble-txt">${m.text}</div>`;
        document.getElementById('chat-inner').appendChild(div);
        stickToBottom();
    }

    function sendMsg() {
        const text = iptBox.value.trim();
        if(!text) return;
        ws.send(JSON.stringify({ text }));
        iptBox.value = '';
        stickToBottom();
    }

    iptBox.oninput = function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        stickToBottom();
    };
</script>
</body>
</html>
