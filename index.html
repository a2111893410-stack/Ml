<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">

<title>WeChat 5.0 System</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #ededed;
  font-family: -apple-system, BlinkMacSystemFont;
  -webkit-text-size-adjust: 100%;
}

/* ===== 顶部（🔥统一高级版） ===== */
#top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 44px;
  padding-top: env(safe-area-inset-top);
  background: #ededed;
  border-bottom: 0.5px solid rgba(0,0,0,0.06);
  z-index: 999;
}

#top-inner {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ⭐统一按钮区域 */
.top-btn {
  position: absolute;
  top: 0;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(0,0,0,0.85);
  font-size: 22px;
}

#back { left: 2px; }
#more { right: 2px; }

#title {
  font-size: 17px;
  font-weight: 500;
}

/* ===== 聊天区 ===== */
#chat {
  position: fixed;
  left: 0;
  right: 0;
  top: calc(44px + env(safe-area-inset-top));
  bottom: calc(60px + env(safe-area-inset-bottom));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 8px;
}

/* ===== 行 ===== */
.row {
  display: flex;
  margin: 10px 0;
  align-items: flex-start;
}

.left { justify-content: flex-start; }
.right { justify-content: flex-end; }

/* ===== 头像 ===== */
.avatar {
  width: 42px;
  height: 42px;
  border-radius: 6px;
  background: #ccc;
  flex-shrink: 0;
}

.left .avatar { margin-right: 6px; }
.right .avatar { margin-left: 6px; }

/* ===== 气泡 ===== */
.bubble {
  position: relative;
  max-width: 70%;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 15px;
  line-height: 1.4;
  word-break: break-word;
}

.left .bubble { background: #fff; }
.right .bubble { background: #95ec69; }

.left .bubble::before {
  content: "";
  position: absolute;
  left: -6px;
  top: 12px;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-right: 6px solid #fff;
}

.right .bubble::before {
  content: "";
  position: absolute;
  right: -6px;
  top: 12px;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-left: 6px solid #95ec69;
}

/* ===== 输入栏（🔥最终稳定版） ===== */
#bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  display: flex;
  align-items: center;

  padding: 8px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));

  background: #f7f7f7;
  border-top: 1px solid rgba(0,0,0,0.08);

  width: 100%;
  z-index: 1000;
}

#text {
  flex: 1;
  min-width: 0;
  height: 36px;
  border: none;
  border-radius: 6px;
  padding: 0 10px;
  font-size: 15px;
  outline: none;
}

button {
  margin-left: 6px;
  background: #07c160;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 15px;
}

/* ===== 图片 ===== */
.msg-img img {
  max-width: 180px;
  border-radius: 10px;
}

/* ===== 预览 ===== */
#imgPreview {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}

#imgPreview img {
  max-width: 95%;
  max-height: 95%;
}
</style>
</head>

<body>

<!-- 顶部 -->

</div>

    <div id="title">管理员</div>

    <div id="more" class="top-btn">⋯</div>
  </div>
</div>

<!-- 聊天 -->
<div id="chat"></div>

<!-- 输入 -->
<div id="bar">
  <input id="text" placeholder="输入消息..." />
  <input type="file" id="file" accept="image/*" hidden>
  <button onclick="pickImg()">+</button>
  <button onclick="send()">发送</button>
</div>

<!-- 图片预览 -->
<div id="imgPreview" onclick="closePreview()">
  <img id="previewImg">
</div>

<script>
const chat = document.getElementById("chat");

function scrollBottom(){
  setTimeout(()=>{
    chat.scrollTop = chat.scrollHeight;
  }, 30);
}

function addMsg(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const avatar=document.createElement("div");
  avatar.className="avatar";

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;

  if(type==="left"){
    row.appendChild(avatar);
    row.appendChild(bubble);
  }else{
    row.appendChild(bubble);
    row.appendChild(avatar);
  }

  chat.appendChild(row);
  scrollBottom();
}

function addImage(src,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const avatar=document.createElement("div");
  avatar.className="avatar";

  const box=document.createElement("div");
  box.className="msg-img";

  const img=document.createElement("img");
  img.src=src;
  img.onclick=()=>openPreview(src);

  box.appendChild(img);

  if(type==="left"){
    row.appendChild(avatar);
    row.appendChild(box);
  }else{
    row.appendChild(box);
    row.appendChild(avatar);
  }

  chat.appendChild(row);
  scrollBottom();
}

function send(){
  const v=document.getElementById("text").value.trim();
  if(!v) return;
  addMsg(v,"right");
  document.getElementById("text").value="";
}

function pickImg(){
  document.getElementById("file").click();
}

document.getElementById("file").onchange=function(){
  const file=this.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=(e)=>{
    addImage(e.target.result,"right");
  };
  reader.readAsDataURL(file);
};

function openPreview(src){
  document.getElementById("previewImg").src = src;
  document.getElementById("imgPreview").style.display = "flex";
}

function closePreview(){
  document.getElementById("imgPreview").style.display = "none";
}
</script>

</body>
</html>
