<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客端</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: #eee; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .row { margin: 8px 0; display: flex; }
        .row.me { justify-content: flex-end; }
        .msg { padding: 8px 12px; background: #fff; border-radius: 5px; max-width: 80%; }
        .me .msg { background: #95ec69; }
        #bar { display: flex; padding: 10px; background: #fff; }
        input { flex: 1; padding: 8px; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="bar">
        <input id="ipt" placeholder="输入...">
        <button onclick="send()">发送</button>
    </div>

<script>
    const myId = localStorage.getItem('cid') || 'U' + Math.random().toString(36).slice(2,6);
    localStorage.setItem('cid', myId);

    let ws;
    function start() {
        // 自动识别 Render 地址：将 https:// 替换为 wss://
        const wsUrl = window.location.origin.replace(/^http/, 'ws');
        // 如果是在本地打开 HTML 文件测试，请手动填入 Render 地址：
        // const wsUrl = 'wss://page-c4hm.onrender.com';
        
        ws = new WebSocket(wsUrl);

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                res.data.forEach(m => draw(m));
            } else {
                draw(res);
            }
        };

        ws.onclose = () => setTimeout(start, 2000);
        ws.onerror = (err) => console.error("WS Error");
    }

    function draw(m) {
        if (m.from !== myId && m.to !== myId && m.to !== 'admin' && m.from !== 'admin') return;
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'row' + (m.from === myId ? ' me' : '');
        div.innerHTML = `<div class="msg">${m.text}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function send() {
        const ipt = document.getElementById('ipt');
        if (!ipt.value) return;
        try {
            ws.send(JSON.stringify({ type: 'msg', from: myId, to: 'admin', text: ipt.value }));
            ipt.value = '';
        } catch (e) {
            alert("发送失败，请检查网络连接");
        }
    }

    start();
</script>
</body>
</html>
