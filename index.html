<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>联系客服</title>
    <style>
        body { margin:0; display:flex; flex-direction:column; height:100vh; background:#f5f5f5; font-family:sans-serif; }
        #status { font-size:12px; text-align:center; padding:5px; background:#eee; color:#888; }
        #chat { flex:1; overflow-y:auto; padding:15px; }
        .row { display:flex; margin-bottom:12px; animation: fadeIn 0.2s; }
        .row.me { justify-content:flex-end; }
        .bubble { padding:10px 14px; background:#fff; border-radius:10px; max-width:75%; font-size:15px; box-shadow:0 1px 2px rgba(0,0,0,0.05); }
        .me .bubble { background:#95ec69; }
        #bar { display:flex; padding:10px; background:#fff; border-top:1px solid #ddd; padding-bottom:env(safe-area-inset-bottom); }
        input { flex:1; border:1px solid #ddd; padding:10px; border-radius:6px; outline:none; font-size:16px; }
        button { margin-left:10px; padding:0 20px; background:#07c160; color:#fff; border:none; border-radius:6px; font-weight:bold; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
    <div id="status">正在连接...</div>
    <div id="chat"></div>
    <div id="bar">
        <input id="ipt" placeholder="输入消息..." autocomplete="off">
        <button onclick="send()">发送</button>
    </div>

<script>
    // 永久固定本地ID
    const myId = (localStorage.getItem('chat_uid') || 'U' + Math.random().toString(36).substr(2,4).toUpperCase());
    localStorage.setItem('chat_uid', myId);

    let ws;
    const chatBox = document.getElementById('chat');
    const status = document.getElementById('status');

    function connect() {
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onopen = () => status.innerText = "在线 (ID: " + myId + ")";
        ws.onclose = () => { status.innerText = "重连中..."; setTimeout(connect, 2000); };
        
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const list = res.type === "history" ? res.data : [res.data];
            list.forEach(m => {
                // 【私密性核心】只认领发给自己或自己发出的信
                if (m.from === myId || m.to === myId) render(m);
            });
        };
    }

    function render(m) {
        const isMe = m.from === myId;
        const div = document.createElement('div');
        div.className = 'row' + (isMe ? ' me' : '');
        div.innerHTML = `<div class="bubble">${m.text}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim() || ws.readyState !== 1) return;
        ws.send(JSON.stringify({ from: myId, to: 'admin', text: i.value }));
        i.value = '';
    }
    
    document.getElementById('ipt').onkeydown = (e) => { if(e.key==='Enter') send(); };
    connect();
</script>
</body>
</html>
