<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>访客</title>
    <style>
        body { margin:0; display:flex; flex-direction:column; height:100vh; background:#f0f0f0; }
        #chat { flex:1; overflow-y:auto; padding:10px; }
        .msg { margin:10px 0; display:flex; }
        .msg.me { justify-content:flex-end; }
        .inner { padding:8px 12px; background:#fff; border-radius:5px; max-width:80%; }
        .me .inner { background:#95ec69; }
        #bar { display:flex; padding:10px; background:#fff; border-top:1px solid #ddd; }
        #status { font-size:12px; text-align:center; padding:5px; background:#eee; }
    </style>
</head>
<body>
    <div id="status">正在连接...</div>
    <div id="chat"></div>
    <div id="bar">
        <input id="ipt" style="flex:1; padding:8px;">
        <button onclick="send()" style="margin-left:5px">发送</button>
    </div>

<script>
    const myId = 'U' + Math.random().toString(36).substr(2,4).toUpperCase();
    let ws;
    
    function start() {
        // 直接写死你的真实地址，不再自动判断
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onopen = () => document.getElementById('status').innerText = "已连接 (ID: " + myId + ")";
        ws.onclose = () => {
            document.getElementById('status').innerText = "连接断开，重连中...";
            setTimeout(start, 2000);
        };
        ws.onerror = () => document.getElementById('status').innerText = "连接失败，请检查网络";

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                res.data.forEach(m => draw(m));
            } else {
                draw(res.data);
            }
        };
    }

    function draw(m) {
        if (m.from !== myId && m.to !== myId) return;
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'msg' + (m.from === myId ? ' me' : '');
        div.innerHTML = `<div class="inner">${m.text}</div>`;
        chat.appendChild(div);
        chatBoxScroll();
    }

    function chatBoxScroll() {
        const c = document.getElementById('chat');
        c.scrollTop = c.scrollHeight;
    }

    function send() {
        const ipt = document.getElementById('ipt');
        if (!ipt.value) return;
        ws.send(JSON.stringify({ from: myId, to: 'admin', text: ipt.value }));
        ipt.value = '';
    }
    start();
</script>
</body>
</html>
