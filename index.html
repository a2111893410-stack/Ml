</head>
<body>

<div id="header-wrapper">
    <div id="header">
        <div class="head-icon" onclick="history.back()"><svg viewBox="0 0 24 24" width="22" height="22" stroke="#111" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg></div>
        <div>在线客服</div>
        <div class="head-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="#111"><circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle></svg></div>
    </div>
    <div id="status-bar">正在连接...</div>
</div>

<div id="chat" onclick="dismissKeyboard()">
    <div id="chat-inner"></div>
</div>

<div id="footer">
    <label for="file-ipt" class="btn-plus">
        <svg viewBox="0 0 24 24" width="30" height="30" stroke="#333" stroke-width="1.2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
    </label>
    <input type="file" id="file-ipt" accept="image/*" style="display:none" onchange="directSendImg(this)">
    <textarea id="ipt" rows="1" placeholder="发送消息..."></textarea>
    <button class="btn-send" onclick="sendMsg()">发送</button>
</div>

<div id="toast"></div>
<div id="img-viewer" onclick="this.style.display='none'"><img src="" id="viewer-img"></div>

<script>
    const myId = (localStorage.getItem('wx_uid') || 'u' + Math.random().toString(36).substr(2,4).toLowerCase());
    localStorage.setItem('wx_uid', myId);

    let ws;
    const chatContainer = document.getElementById('chat');
    const chatInner = document.getElementById('chat-inner');
    const iptBox = document.getElementById('ipt');

    // ── Toast 提示 ──────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ── 判断 WebSocket 是否可用 ──────────────────────────────
    function isConnected() {
        return ws && ws.readyState === WebSocket.OPEN;
    }

    function connect() {
        ws = new WebSocket('wss://page-c4hm.onrender.com'); 
        ws.onopen = () => document.getElementById('status-bar').innerText = "已连接";
        ws.onclose = () => { document.getElementById('status-bar').innerText = "重连中..."; setTimeout(connect, 3000); };
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") chatInner.innerHTML = "";
            const list = res.type === "history" ? res.data : [res.data];
            list.forEach(m => {
                if (String(m.from).toLowerCase() === myId || String(m.to).toLowerCase() === myId) renderMsg(m);
            });
        };
    }

    // ── 【修复2】renderMsg：图片 onload 只在这里设置一次，不在 scrollToBottom 里重复挂载 ──
    function renderMsg(m) {
        const isMe = String(m.from).toLowerCase() === myId;
        const div = document.createElement('div');
        div.className = 'msg-row' + (isMe ? ' me' : ' visitor');
        
        const ava = document.createElement('div');
        ava.className = 'avatar';
        div.appendChild(ava);

        if (m.type === 'img') {
            const wrap = document.createElement('div');
            wrap.className = 'msg-img-wrap';
            const img = document.createElement('img');
            img.className = 'msg-img';
            img.src = m.text;
            // 图片加载完成后再滚一次，确保滚到底
            img.onload = () => scrollToBottom();
            img.onclick = (e) => { e.stopPropagation(); showFullImage(m.text); };
            wrap.appendChild(img);
            div.appendChild(wrap);
        } else {
            const txt = document.createElement('div');
            txt.className = 'bubble-txt';
            txt.innerText = m.text;
            div.appendChild(txt);
        }

        chatInner.appendChild(div);
        scrollToBottom();
    }

    function dismissKeyboard() { iptBox.blur(); }

    iptBox.addEventListener('focus', () => {
        setTimeout(scrollToBottom, 300);
    });
    iptBox.addEventListener('blur', () => {
        setTimeout(() => { window.scrollTo(0, 0); }, 100);
    });

    // ── 【修复4】发图片前检查连接状态 ──────────────────────────
    function directSendImg(el) {
        const file = el.files[0];
        if (!file) return;

        // 先检查连接
        if (!isConnected()) {
            showToast('发送失败，网络未连接');
            el.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const maxWidth = 1000;
                let width = img.width, height = img.height;
                if (width > maxWidth) {
                    height = (maxWidth / width) * height;
                    width = maxWidth;
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                
                // 压缩完再次确认连接（避免压缩期间断线）
                if (isConnected()) {
                    ws.send(JSON.stringify({ from: myId, to: 'admin', text: compressedBase64, type: 'img' }));
                } else {
                    showToast('发送失败，请重试');
                }
                el.value = '';
            };
        };
        reader.readAsDataURL(file);
    }

    function showFullImage(src) {
        document.getElementById('viewer-img').src = src;
        document.getElementById('img-viewer').style.display = 'flex';
    }

    // ── 【修复4】发文字前检查连接状态 ──────────────────────────
    function sendMsg() {
        const text = iptBox.value.trim();
        if (!text) return;

        if (!isConnected()) {
            showToast('发送失败，网络未连接');
            return;
        }

        try {
            ws.send(JSON.stringify({ from: myId, to: 'admin', text: text, type: 'text' }));
            iptBox.value = '';
            iptBox.style.height = '38px';
            scrollToBottom();
        } catch (err) {
            showToast('发送失败，请重试');
        }
    }

    // ── 【修复2】scrollToBottom：不再重复挂载图片 onload ──────
    function scrollToBottom() {
        if (!chatContainer) return;
        chatContainer.scrollTop = chatContainer.scrollHeight;
        // 延时兜底（防止软键盘回弹或 DOM 渲染滞后）
        setTimeout(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 100);
    }

    iptBox.onkeydown = (e) => { 
        if(e.key==='Enter' && !e.shiftKey) { sendMsg(); e.preventDefault(); } 
    };

    iptBox.oninput = function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        scrollToBottom();
    };

    // ── Safari+搜狗输入法空白修复 ────────────────────────────
    // 搜狗候选词栏会改变 window.innerHeight，但 Safari 的 dvh 不跟着变
    // 解决方案：监听 visualViewport resize，把实际高度写入 CSS 变量 --vh
    function fixVh() {
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--vh', h * 0.01 + 'px');
    }
    fixVh();
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', fixVh);
    } else {
        window.addEventListener('resize', fixVh);
    }

    connect();
</script>

</body>
</html>
