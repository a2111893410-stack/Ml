<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在线客服</title>
    <style>
        body { margin: 0; background: #ededed; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .row { display: flex; margin-bottom: 12px; }
        .right { justify-content: flex-end; }
        .bubble { max-width: 75%; padding: 10px; border-radius: 8px; font-size: 15px; line-height: 1.4; word-break: break-all; }
        .left .bubble { background: #fff; border: 0.5px solid #ddd; }
        .right .bubble { background: #95ec69; }
        #bar { padding: 10px; background: #f7f7f7; display: flex; border-top: 0.5px solid #ddd; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 5px; outline: none; font-size: 16px; }
        button { margin-left: 10px; background: #07c160; color: #fff; border: none; padding: 0 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="bar">
        <input id="ipt" placeholder="请输入消息..." autocomplete="off">
        <button onclick="send()">发送</button>
    </div>

<script>
    const chatBox = document.getElementById('chat');
    const shownIds = new Set();
    
    // 身份标识：确保全局唯一且固定
    let myId = localStorage.getItem('chat_uid');
    if (!myId) {
        myId = 'USER-' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('chat_uid', myId);
    }

    let socket;
    function connect() {
        socket = new WebSocket('wss://page-c4hm.onrender.com');

        socket.onmessage = (e) => {
            const res = JSON.parse(e.data);
            
            if (res.type === "history") {
                chatBox.innerHTML = ""; shownIds.clear();
                // 历史记录过滤：只画出跟我有关的
                res.list.forEach(m => {
                    if (m.from === myId || m.to === myId) render(m);
                });
            } else if (res.from === myId || res.to === myId) {
                // 实时消息过滤：只识别发给我的，或者我发出的
                render(res);
            }
        };

        socket.onclose = () => setTimeout(connect, 2000);
    }

    function render(m) {
        if (shownIds.has(m.msgId)) return;
        shownIds.add(m.msgId);
        
        const isMe = m.from === myId;
        const row = document.createElement('div');
        row.className = `row ${isMe ? 'right' : 'left'}`;
        row.innerHTML = `<div class="bubble">${m.text}</div>`;
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim()) return;
        const payload = { from: myId, to: "ADMIN", text: i.value, type: "msg" };
        socket.send(JSON.stringify(payload));
        i.value = "";
    }
    
    document.getElementById('ipt').onkeydown = (e) => { if(e.key === 'Enter') send(); };
    connect();
</script>
</body>
</html>
