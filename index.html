<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>微信级IM</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #ededed;
  height: 100vh;
  overflow: hidden;
}

/* 顶部 */
#top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;

  height: calc(44px + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);

  background: #ededed;
  border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
  z-index: 999;
}

#top-inner {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

#back, #more {
  color: rgba(0, 0, 0, 0.85);
}

#back {
  position: absolute;
  left: 10px;
  display: flex;
  align-items: center;
}

#back .arrow {
  font-size: 20px;
  margin-right: 2px;
}

#more {
  position: absolute;
  right: 12px;
  font-size: 20px;
}

#title {
  font-size: 17px;
  font-weight: 500;
}

/* 聊天区 */
#chat-container {
  position: absolute;
  top: calc(44px + env(safe-area-inset-top));
  bottom: 60px;
  left: 0;
  right: 0;
}

#chat {
  height: 100%;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

/* 消息 */
.row { display:flex; margin:8px 0; }
.left { justify-content:flex-start; }
.right { justify-content:flex-end; }

.avatar {
  width:34px;
  height:34px;
  background:#ccc;
  border-radius:4px;
  margin:0 6px;
}

.bubble {
  max-width:70%;
  padding:10px;
  border-radius:10px;
  font-size:15px;
}

.left .bubble { background:#fff; }
.right .bubble { background:#95ec69; }

.msg-img img {
  max-width:180px;
  border-radius:10px;
}

/* 输入 */
#bar {
  position: fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#f7f7f7;
  display:flex;
  align-items:center;
  padding:8px;
  border-top:1px solid #ddd;
}

#text {
  flex:1;
  height:36px;
  border:none;
  border-radius:6px;
  padding:0 10px;
  font-size:16px;

  outline:none;
  box-shadow:none;
}

#text:focus {
  outline:none;
  box-shadow:none;
}

button {
  margin-left:6px;
  background:#07c160;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
}

/* 图片预览 */
#imgPreview {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;

  background: rgba(0,0,0,0.9);
  display: none;

  align-items: center;
  justify-content: center;

  z-index: 9999;
}

#imgPreview img {
  max-width: 95%;
  max-height: 95%;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div id="top">
  <div id="top-inner">

    <div id="back" onclick="history.back()">
      <span class="arrow">‹</span>
    </div>

    <div id="title">管理员</div>

    <div id="more">···</div>

  </div>
</div>

<!-- 聊天 -->
<div id="chat-container">
  <div id="chat"></div>
</div>

<!-- 输入 -->
<div id="bar">
  <input id="text" placeholder="输入消息..." />
  <input type="file" id="file" accept="image/*" hidden>
  <button onclick="pickImg()">📷</button>
  <button onclick="send()">发送</button>
</div>

<!-- 图片预览 -->
<div id="imgPreview" onclick="closePreview()">
  <img id="previewImg" src="">
</div>

<script>
const chat = document.getElementById("chat");
const text = document.getElementById("text");

const ws = new WebSocket("ws://localhost:3000");

/* 滚动（修复版） */
function scrollBottom(){
  requestAnimationFrame(()=>{
    chat.scrollTop = chat.scrollHeight;
  });
}

/* 图片预览 */
function openPreview(src){
  document.getElementById("previewImg").src = src;
  document.getElementById("imgPreview").style.display = "flex";
}

function closePreview(){
  document.getElementById("imgPreview").style.display = "none";
}

/* 保存图片 */
function saveImage(src){
  const a = document.createElement("a");
  a.href = src;
  a.download = "image.png";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* 消息 */
function addMsg(content,type,isImg=false){
  const row=document.createElement("div");
  row.className="row "+type;

  const avatar=document.createElement("div");
  avatar.className="avatar";

  let box;

  if(isImg){
    box=document.createElement("div");
    box.className="msg-img";

    const img=document.createElement("img");
    img.src = content;

    /* 点击放大 */
    img.onclick = function(){
      openPreview(content);
    };

    /* ⭐修复：图片加载后自动滚到底 */
    img.onload = function(){
      scrollBottom();
    };

    /* ⭐长按保存 */
    let pressTimer;

    img.addEventListener("touchstart", function(){
      pressTimer = setTimeout(()=>{
        saveImage(content);
      }, 600);
    });

    img.addEventListener("touchend", function(){
      clearTimeout(pressTimer);
    });

    img.addEventListener("touchmove", function(){
      clearTimeout(pressTimer);
    });

    box.appendChild(img);

  }else{
    box=document.createElement("div");
    box.className="bubble";
    box.innerText=content;
  }

  if(type==="left"){
    row.appendChild(avatar);
    row.appendChild(box);
  }else{
    row.appendChild(box);
    row.appendChild(avatar);
  }

  chat.appendChild(row);
  scrollBottom();
}

/* WS */
ws.onopen=()=>{
  ws.send(JSON.stringify({type:"join",room:"1"}));
};

ws.onmessage=(e)=>{
  const d=JSON.parse(e.data);
  if(d.type==="msg") addMsg(d.text,"left");
  if(d.type==="img") addMsg(d.img,"left",true);
};

/* 发送 */
function send(){
  const v=text.value.trim();
  if(!v) return;

  addMsg(v,"right");

  ws.send(JSON.stringify({type:"msg",text:v}));

  text.value="";
  text.blur();
}

/* 图片选择 */
function pickImg(){
  document.getElementById("file").click();
}

document.getElementById("file").onchange=function(){
  const file=this.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=(e)=>{
    const img=e.target.result;

    addMsg(img,"right",true);

    ws.send(JSON.stringify({
      type:"img",
      img
    }));
  };
  reader.readAsDataURL(file);
};
</script>

</body>
</html>
