<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>WeChat 5.0 System</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #ededed;
  font-family: -apple-system, BlinkMacSystemFont;
}

/* ===== 顶部 ===== */
#top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 44px;
  padding-top: env(safe-area-inset-top);
  background: #ededed;
  border-bottom: 0.5px solid rgba(0,0,0,0.06);
  z-index: 999;
}

#top-inner {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

#back, #more {
  position: absolute;
  height: 44px;
  display: flex;
  align-items: center;
  font-size: 20px;
  color: rgba(0,0,0,0.85);
}

#back { left: 10px; }
#more { right: 12px; }

#title {
  font-size: 17px;
  font-weight: 500;
}

/* ===== 菜单 ===== */
#moreMenu {
  position: fixed;
  top: 60px;
  right: 10px;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  display: none;
  z-index: 9999;
}

.more-item {
  padding: 10px 14px;
  font-size: 14px;
  border-bottom: 1px solid #eee;
}

/* ===== 聊天 ===== */
#chat {
  position: fixed;
  left: 0;
  right: 0;
  top: calc(44px + env(safe-area-inset-top));
  bottom: 60px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px;
}

/* 消息 */
.row {
  display: flex;
  margin: 8px 0;
}

.left { justify-content: flex-start; }
.right { justify-content: flex-end; }

.bubble {
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  font-size: 15px;
}

.left .bubble { background: #fff; }
.right .bubble { background: #95ec69; }

/* 图片 */
.msg-img img {
  max-width: 180px;
  border-radius: 10px;
}

/* ===== 输入栏 ===== */
#bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 60px;
  background: #f7f7f7;
  display: flex;
  align-items: center;
  padding: 8px;
  border-top: 1px solid rgba(0,0,0,0.08);
}

#text {
  flex: 1;
  height: 36px;
  border: none;
  border-radius: 6px;
  padding: 0 10px;
  font-size: 16px;
  outline: none;
}

button {
  margin-left: 6px;
  background: #07c160;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
}

/* ===== 图片预览 ===== */
#imgPreview {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}

#imgPreview img {
  max-width: 95%;
  max-height: 95%;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div id="top">
  <div id="top-inner">
    <div id="back" onclick="history.back()">‹</div>
    <div id="title">管理员</div>
    <div id="more" onclick="toggleMore()">···</div>
  </div>
</div>

<!-- 菜单 -->
<div id="moreMenu">
  <div class="more-item">查看资料</div>
  <div class="more-item">清空聊天</div>
</div>

<!-- 聊天 -->
<div id="chat"></div>

<!-- 输入 -->
<div id="bar">
  <input id="text" placeholder="输入消息..." />
  <input type="file" id="file" accept="image/*" hidden>
  <button onclick="pickImg()">+</button>
  <button onclick="send()">发送</button>
</div>

<!-- 图片预览 -->
<div id="imgPreview" onclick="closePreview()">
  <img id="previewImg">
</div>

<script>
const chat = document.getElementById("chat");

/* ===== 菜单 ===== */
function toggleMore(){
  const menu = document.getElementById("moreMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

document.addEventListener("click",(e)=>{
  const menu = document.getElementById("moreMenu");
  const more = document.getElementById("more");

  if(!menu.contains(e.target) && e.target !== more){
    menu.style.display = "none";
  }
});

/* ===== 图片预览 ===== */
function openPreview(src){
  document.getElementById("previewImg").src = src;
  document.getElementById("imgPreview").style.display = "flex";
}

function closePreview(){
  document.getElementById("imgPreview").style.display = "none";
}

/* ===== 消息 ===== */
function addMsg(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;

  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop = chat.scrollHeight;
}

/* ===== 图片消息 ===== */
function addImage(src,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const box=document.createElement("div");
  box.className="msg-img";

  const img=document.createElement("img");
  img.src=src;

  /* 点击预览 */
  img.onclick = ()=>{
    openPreview(src);
  };

  box.appendChild(img);
  row.appendChild(box);
  chat.appendChild(row);

  img.onload=()=>{
    chat.scrollTop = chat.scrollHeight;
  };
}

/* ===== 发送 ===== */
function send(){
  const v=document.getElementById("text").value.trim();
  if(!v) return;

  addMsg(v,"right");
  document.getElementById("text").value="";
}

/* ===== 图片 ===== */
function pickImg(){
  document.getElementById("file").click();
}

document.getElementById("file").onchange=function(){
  const file=this.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=(e)=>{
    addImage(e.target.result,"right");
  };
  reader.readAsDataURL(file);
};
</script>

</body>
</html>
