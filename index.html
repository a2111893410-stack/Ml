<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>客服测试</title>
    <style>
        body { margin: 0; background: #f0f0f0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .row { display: flex; margin-bottom: 10px; }
        .right { justify-content: flex-end; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 8px; background: #fff; font-size: 15px; }
        .right .bubble { background: #95ec69; }
        #bar { padding: 10px; background: #fff; display: flex; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="bar"><input id="ipt"><button onclick="send()" style="margin-left:5px">发送</button></div>

<script>
    const chatBox = document.getElementById('chat');
    const shownIds = new Set();
    const myId = (localStorage.getItem('chat_uid') || 'U' + Math.random().toString(36).substr(2, 4)).toLowerCase();
    localStorage.setItem('chat_uid', myId);

    let socket;
    function connect() {
        // 【核心】请确保这里的地址和你 Render 的地址完全一致
        socket = new WebSocket('wss://page-c4hm.onrender.com');

        socket.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                res.list.forEach(m => render(m));
            } else if (res.type === "msg") {
                // 【测试阶段】暂时取消 ID 过滤，看能不能收到任何消息
                render(res);
            }
        };
        socket.onclose = () => setTimeout(connect, 2000);
    }

    function render(m) {
        if (shownIds.has(m.msgId)) return;
        shownIds.add(m.msgId);
        const isMe = m.from === myId;
        const row = document.createElement('div');
        row.className = `row ${isMe ? 'right' : 'left'}`;
        row.innerHTML = `<div class="bubble">${m.text}</div>`;
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim()) return;
        socket.send(JSON.stringify({ from: myId, to: "admin", text: i.value, type: "msg" }));
        i.value = "";
    }
    connect();
</script>
</body>
</html>
