<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>在线客服</title>
    <style>
        body { margin:0; display:flex; flex-direction:column; height:100vh; background:#f4f4f7; font-family:sans-serif; }
        #status { font-size:11px; text-align:center; padding:4px; background:#eee; color:#999; }
        #chat { flex:1; overflow-y:auto; padding:15px; }
        .row { display:flex; margin-bottom:15px; }
        .row.me { justify-content:flex-end; }
        .bubble { padding:10px 14px; background:#fff; border-radius:10px; max-width:75%; font-size:15px; box-shadow:0 1px 2px rgba(0,0,0,0.1); }
        .me .bubble { background:#95ec69; }
        .bubble img { max-width:100%; border-radius:5px; margin-top:5px; display:block; }
        #bar { display:flex; align-items:center; padding:10px; background:#fff; border-top:1px solid #ddd; gap:8px; }
        #ipt { flex:1; border:1px solid #ddd; padding:10px; border-radius:6px; outline:none; font-size:16px; }
        .btn-plus { width:35px; height:35px; border:1px solid #ccc; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; color:#666; cursor:pointer; }
        #send-btn { padding:10px 15px; background:#07c160; color:#fff; border:none; border-radius:6px; font-weight:bold; }
    </style>
</head>
<body>
    <div id="status">正在连接...</div>
    <div id="chat"></div>
    <div id="bar">
        <label class="btn-plus">+<input type="file" id="file-ipt" accept="image/*" style="display:none" onchange="uploadImg(this)"></label>
        <input id="ipt" placeholder="输入消息..." autocomplete="off">
        <button id="send-btn" onclick="sendText()">发送</button>
    </div>

<script>
    let myId = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2,5);
    myId = myId.toLowerCase();
    localStorage.setItem('chat_uid', myId);

    let ws;
    const chatBox = document.getElementById('chat');

    function connect() {
        ws = new WebSocket('wss://page-c4hm.onrender.com');
        ws.onopen = () => document.getElementById('status').innerText = "已连接 (ID: " + myId + ")";
        ws.onclose = () => { 
            document.getElementById('status').innerText = "重连中..."; 
            setTimeout(connect, 3000); 
        };
        
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const list = res.type === "history" ? res.data : [res.data];
            if(res.type === "history") chatBox.innerHTML = ""; // 刷新历史
            list.forEach(m => {
                if (m.from === myId || m.to === myId) render(m);
            });
        };
    }

    function render(m) {
        const isMe = m.from === myId;
        const div = document.createElement('div');
        div.className = 'row' + (isMe ? ' me' : '');
        let content = m.text;
        // 如果是图片，转换为img标签
        if(m.type === 'img') content = `<img src="${m.text}">`;
        div.innerHTML = `<div class="bubble">${content}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendText() {
        const i = document.getElementById('ipt');
        if(!i.value.trim() || ws.readyState !== 1) return;
        ws.send(JSON.stringify({ from: myId, to: 'admin', text: i.value, type: 'text' }));
        i.value = '';
    }

    function uploadImg(el) {
        const file = el.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            ws.send(JSON.stringify({ from: myId, to: 'admin', text: e.target.result, type: 'img' }));
            el.value = ''; // 清空选择
        };
        reader.readAsDataURL(file);
    }

    document.getElementById('ipt').onkeydown = (e) => { if(e.key==='Enter') sendText(); };
    connect();
</script>
</body>
</html>
