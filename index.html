<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线客服</title>
    <style>
        body { margin:0; display:flex; flex-direction:column; height:100vh; background:#f4f4f7; font-family:sans-serif; }
        #status { font-size:12px; text-align:center; padding:8px; background:#eee; color:#666; }
        #chat { flex:1; overflow-y:auto; padding:15px; }
        .row { display:flex; margin-bottom:12px; }
        .row.me { justify-content:flex-end; }
        .bubble { padding:10px 14px; background:#fff; border-radius:10px; max-width:75%; font-size:15px; box-shadow:0 1px 2px rgba(0,0,0,0.1); }
        .me .bubble { background:#95ec69; }
        #bar { display:flex; padding:10px; background:#fff; border-top:1px solid #ddd; }
        input { flex:1; border:1px solid #ddd; padding:12px; border-radius:8px; outline:none; font-size:16px; }
        button { margin-left:10px; padding:0 20px; background:#07c160; color:#fff; border:none; border-radius:8px; font-weight:bold; }
    </style>
</head>
<body>
    <div id="status">正在连接...</div>
    <div id="chat"></div>
    <div id="bar">
        <input id="ipt" placeholder="点击输入消息..." autocomplete="off">
        <button onclick="send()">发送</button>
    </div>

<script>
    // 1. 获取或生成持久化ID
    let myId = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2,5);
    myId = myId.toLowerCase().trim();
    localStorage.setItem('chat_uid', myId);

    let ws;
    const chatBox = document.getElementById('chat');
    const status = document.getElementById('status');

    function connect() {
        // 替换为你真实的 Render 地址
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onopen = () => status.innerText = "● 在线 (我的ID: " + myId + ")";
        ws.onclose = () => { status.innerText = "○ 连接断开，正在重连..."; setTimeout(connect, 2000); };
        
        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const msgs = res.type === "history" ? res.data : [res.data];
            
            msgs.forEach(m => {
                const f = String(m.from).toLowerCase().trim();
                const t = String(m.to).toLowerCase().trim();

                // 【私密逻辑】只显示和我相关的消息
                if (f === myId || t === myId) {
                    render(m);
                }
            });
        };
    }

    function render(m) {
        const isMe = String(m.from).toLowerCase().trim() === myId;
        const div = document.createElement('div');
        div.className = 'row' + (isMe ? ' me' : '');
        div.innerHTML = `<div class="bubble">${m.text}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim() || ws.readyState !== 1) return;
        ws.send(JSON.stringify({ from: myId, to: 'admin', text: i.value }));
        i.value = '';
    }
    
    document.getElementById('ipt').onkeydown = (e) => { if(e.key==='Enter') send(); };
    connect();
</script>
</body>
</html>
