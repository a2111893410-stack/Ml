<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">

<title>WeChat 5.0 System</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #ededed;
  font-family: -apple-system, BlinkMacSystemFont;
  -webkit-text-size-adjust: 100%;
}

/* ===== 顶部 ===== */
#top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 44px;
  padding-top: env(safe-area-inset-top);
  background: #ededed;
  border-bottom: 0.5px solid rgba(0,0,0,0.06);
  z-index: 999;
  backdrop-filter: blur(10px);
}

#top-inner {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ===== 顶部按钮 ===== */
.top-btn {
  position: absolute;
  top: 0;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  border-radius: 12px;
}

.top-btn:active {
  background: rgba(0,0,0,0.06);
  transform: scale(0.92);
}

#back { left: 2px; }
#more { right: 2px; }

#title {
  font-size: 17px;
  font-weight: 500;
}

/* ===== 聊天区 ===== */
#chat {
  position: fixed;
  left: 0;
  right: 0;
  top: calc(44px + env(safe-area-inset-top));
  bottom: calc(60px + env(safe-area-inset-bottom));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 8px;
}

/* ===== 行 ===== */
.row {
  display: flex;
  margin: 10px 0;
  align-items: flex-start;
}

.left { justify-content: flex-start; }
.right { justify-content: flex-end; }

/* ===== 头像（🔥已升级） ===== */
.avatar {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  background: #eee;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.left .avatar { margin-right: 6px; }
.right .avatar { margin-left: 6px; }

/* ===== 气泡 ===== */
.bubble {
  position: relative;
  max-width: 70%;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 15px;
  line-height: 1.4;
  word-break: break-word;
}

.left .bubble { background: #fff; }
.right .bubble { background: #95ec69; }

.left .bubble::before {
  content: "";
  position: absolute;
  left: -6px;
  top: 12px;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-right: 6px solid #fff;
}

.right .bubble::before {
  content: "";
  position: absolute;
  right: -6px;
  top: 12px;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-left: 6px solid #95ec69;
}

/* ===== 输入栏 ===== */
#bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  display: flex;
  align-items: center;

  padding: 8px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));

  background: #f7f7f7;
  border-top: 1px solid rgba(0,0,0,0.08);

  width: 100%;
  z-index: 1000;
}

#text {
  flex: 1;
  min-width: 0;
  height: 36px;
  border: none;
  border-radius: 6px;
  padding: 0 10px;
  font-size: 15px;
  outline: none;
}

button {
  margin-left: 6px;
  background: #07c160;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 15px;
}

/* ===== 图片 ===== */
.msg-img img {
  max-width: 180px;
  border-radius: 10px;
}

/* ===== 预览 ===== */
#imgPreview {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}

#imgPreview img {
  max-width: 95%;
  max-height: 95%;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div id="top">
  <div id="top-inner">

    <div id="back" class="top-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" width="22" height="22">
        <path d="M15.5 19l-7-7 7-7"
          fill="none"
          stroke="black"
          stroke-width="2.2"
          stroke-linecap="round"/>
      </svg>
    </div>

    <div id="title">管理员</div>

    <div id="more" class="top-btn">
      <svg viewBox="0 0 24 24" width="22" height="22">
        <circle cx="5" cy="12" r="1.8" fill="black"/>
        <circle cx="12" cy="12" r="1.8" fill="black"/>
        <circle cx="19" cy="12" r="1.8" fill="black"/>
      </svg>
    </div>

  </div>
</div>

<!-- 聊天 -->
<div id="chat"></div>

<!-- 输入 -->
<div id="bar">
  <input id="text" placeholder="输入消息..." />

  <button onclick="pickImg()">+</button>
  <button onclick="send()">发送</button>
</div>

<div id="imgPreview" onclick="closePreview()">

const chat = document.getElementById("chat");

/* ===== 用户ID ===== */
let userId = localStorage.getItem("uid");
if (!userId) {
  userId = "u_" + Math.random().toString(36).slice(2, 10);
  localStorage.setItem("uid", userId);
}

/* ===== 房间ID（关键） ===== */
const roomId = "room_" + userId;

/* ===== WebSocket（你的 Render 地址） ===== */
const socket = new WebSocket("wss://page-c4hm.onrender.com");

/* ===== 连接 ===== */
socket.onopen = () => {
  socket.send(JSON.stringify({
    type: "join",
    userId,
    roomId
  }));

  socket.send(JSON.stringify({
    type: "history",
    roomId
  }));
};

/* ===== 收消息 ===== */
socket.onmessage = (e) => {
  const data = JSON.parse(e.data);

  if (data.type === "msg") {
    addMsg(data.text, data.from === userId ? "right" : "left");
  }

  if (data.type === "img") {
    addImage(data.src, data.from === userId ? "right" : "left");
  }

  if (data.type === "history") {
    data.list.forEach(m => {
      if (m.type === "msg") addMsg(m.text, m.from === userId ? "right" : "left");
      if (m.type === "img") addImage(m.src, m.from === userId ? "right" : "left");
    });
  }
};

/* ===== 发送文字 ===== */
function send() {
  const v = document.getElementById("text").value.trim();
  if (!v) return;

  socket.send(JSON.stringify({
    type: "msg",
    from: userId,
    roomId,
    text: v,
    time: Date.now()
  }));

  document.getElementById("text").value = "";
}

/* ===== 图片 ===== */
function pickImg() {
  document.getElementById("file").click();
}

document.getElementById("file").onchange = function () {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    socket.send(JSON.stringify({
      type: "img",
      from: userId,
      roomId,
      src: e.target.result,
      time: Date.now()
    }));
  };
  reader.readAsDataURL(file);
};

  if (type === "left") {
    row.appendChild(avatar);
    row.appendChild(bubble);
  } else {
    row.appendChild(bubble);
    row.appendChild(avatar);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

    row.appendChild(box);
  } else {
    row.appendChild(box);

  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}
