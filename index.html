<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">

<title>WeChat 5.0 System</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #ededed;
  font-family: -apple-system, BlinkMacSystemFont;
  -webkit-text-size-adjust: 100%;
}

/* ===== 顶部 ===== */
#top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 44px;
  padding-top: env(safe-area-inset-top);
  background: #ededed;
  border-bottom: 0.5px solid rgba(0,0,0,0.06);
  z-index: 999;
  backdrop-filter: blur(10px);
}

#top-inner {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.top-btn {
  position: absolute;
  top: 0;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  border-radius: 12px;
}

#back { left: 2px; }
#more { right: 2px; }

#title {
  font-size: 17px;
  font-weight: 500;
}

/* ===== 聊天 ===== */
#chat {
  position: fixed;
  left: 0;
  right: 0;
  top: calc(44px + env(safe-area-inset-top));
  bottom: calc(60px + env(safe-area-inset-bottom));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 8px;
}

/* ===== 行 ===== */
.row {
  display: flex;
  margin: 10px 0;
  align-items: flex-start;
}

.left { justify-content: flex-start; }
.right { justify-content: flex-end; }

/* ===== 头像（保留你原来的） ===== */
.avatar {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  background: #eee;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.left .avatar { margin-right: 6px; }
.right .avatar { margin-left: 6px; }

/* ===== 气泡 ===== */
.bubble {
  position: relative;
  max-width: 70%;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 15px;
  line-height: 1.4;
  word-break: break-word;
}

.left .bubble { background: #fff; }
.right .bubble { background: #95ec69; }

/* ===== 输入栏（完全保留） ===== */
#bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  padding: 8px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  background: #f7f7f7;
  border-top: 1px solid rgba(0,0,0,0.08);
}

#text {
  flex: 1;
  height: 36px;
  border: none;
  border-radius: 6px;
  padding: 0 10px;
  font-size: 15px;
  outline: none;
}

button {
  margin-left: 6px;
  background: #07c160;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 15px;
}

/* 图片 */
.msg-img img {
  max-width: 180px;
  border-radius: 10px;
}

/* 预览 */
#imgPreview {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div id="top">
  <div id="top-inner">

    <div id="back" class="top-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" width="22" height="22">
        <path d="M15.5 19l-7-7 7-7" fill="none" stroke="black" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>

    <div id="title">管理员</div>

    <div id="more" class="top-btn">
      <svg viewBox="0 0 24 24" width="22" height="22">
        <circle cx="5" cy="12" r="1.8"/>
        <circle cx="12" cy="12" r="1.8"/>
        <circle cx="19" cy="12" r="1.8"/>
      </svg>
    </div>

  </div>
</div>

<div id="chat"></div>

<!-- 输入 -->
<div id="bar">
  <input id="text" placeholder="输入消息..." />
  <input type="file" id="file" accept="image/*" hidden>
  <button onclick="pickImg()">+</button>
  <button onclick="send()">发送</button>
</div>

<div id="imgPreview" onclick="closePreview()">
  <img id="previewImg">
</div>

<script>
const chat = document.getElementById("chat");

/* ===== 用户ID（不影响UI） ===== */
let userId = localStorage.getItem("uid");
if(!userId){
  userId = "u_" + Math.random().toString(36).slice(2,10);
  localStorage.setItem("uid", userId);
}

const adminId = "admin";

/* ===== WebSocket（后端） ===== */
const socket = new WebSocket("wss://page-c4hm.onrender.com");

/* ===== 初始化 ===== */
socket.onopen = ()=>{
  socket.send(JSON.stringify({
    type:"init",
    userId,
    adminId
  }));

  socket.send(JSON.stringify({
    type:"history",
    userId
  }));
};

/* ===== 收消息 ===== */
socket.onmessage = (e)=>{
  const data = JSON.parse(e.data);

  if(data.type==="msg"){
    render(data.text, data.from===userId?"right":"left");
  }

  if(data.type==="img"){
    renderImg(data.src, data.from===userId?"right":"left");
  }

  if(data.type==="history"){
    data.list.forEach(m=>{
      if(m.type==="msg") render(m.text, m.from===userId?"right":"left");
      if(m.type==="img") renderImg(m.src, m.from===userId?"right":"left");
    });
  }
};

/* ===== 发送 ===== */
function send(){
  const v=document.getElementById("text").value.trim();
  if(!v) return;

  socket.send(JSON.stringify({
    type:"msg",
    from:userId,
    to:adminId,
    text:v,
    time:Date.now()
  }));

  document.getElementById("text").value="";
}

/* ===== 上传（🔥完全保留） ===== */
function pickImg(){
  document.getElementById("file").click();
}

document.getElementById("file").onchange=function(){
  const file=this.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=(e)=>{
    socket.send(JSON.stringify({
      type:"img",
      from:userId,
      to:adminId,
      src:e.target.result,
      time:Date.now()
    }));
  };
  reader.readAsDataURL(file);
};

/* ===== 渲染文本 ===== */
function render(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const avatar=document.createElement("div");
  avatar.className="avatar";

  const img=document.createElement("img");
  img.src = type==="right"
    ?"https://i.pravatar.cc/100?img=12"
    :"https://i.pravatar.cc/100?img=3";

  avatar.appendChild(img);

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;

  if(type==="left"){
    row.appendChild(avatar);
    row.appendChild(bubble);
  }else{
    row.appendChild(bubble);
    row.appendChild(avatar);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

/* ===== 渲染图片 ===== */
function renderImg(src,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const avatar=document.createElement("div");
  avatar.className="avatar";

  const img=document.createElement("img");
  img.src = type==="right"
    ?"https://i.pravatar.cc/100?img=12"
    :"https://i.pravatar.cc/100?img=3";

  avatar.appendChild(img);

  const box=document.createElement("div");
  box.className="msg-img";

  const img2=document.createElement("img");
  img2.src=src;

  box.appendChild(img2);

  row.appendChild(type==="left"?avatar:box);
  row.appendChild(type==="left"?box:avatar);

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

/* ===== 返回 ===== */
function goBack(){
  if(history.length>1) history.back();
  else location.href="/";
}
</script>

</body>
</html>
