<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>在线客服</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f5f5f5; font-family: sans-serif; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .row { display: flex; margin-bottom: 10px; }
        .row.me { justify-content: flex-end; }
        .msg { padding: 10px; border-radius: 8px; max-width: 70%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .other .msg { background: #fff; color: #333; }
        .me .msg { background: #95ec69; color: #000; }
        #bar { display: flex; padding: 10px; background: #fff; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 4px; outline: none; font-size: 16px; }
        button { margin-left: 10px; background: #07c160; color: white; border: none; padding: 0 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="bar">
        <input id="ipt" placeholder="请输入...">
        <button onclick="send()">发送</button>
    </div>

<script>
    // 1. 唯一且固定的本地ID
    const myId = localStorage.getItem('cid') || 'U' + Math.random().toString(36).substr(2,4).toUpperCase();
    localStorage.setItem('cid', myId);

    let ws;
    const chatBox = document.getElementById('chat');
    const seenIds = new Set();

    function connect() {
        // 修改为你的 Render 地址
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                res.data.forEach(m => processMsg(m));
            } else if (res.type === "new_msg") {
                processMsg(res.data);
            }
        };
        ws.onclose = () => setTimeout(connect, 2000);
    }

    function processMsg(m) {
        // 【核心过滤】只认领：发给我的，或者我发出的
        if (m.to === myId || m.from === myId) {
            if (seenIds.has(m.id)) return;
            seenIds.add(m.id);
            render(m);
        }
    }

    function render(m) {
        const isMe = m.from === myId;
        const div = document.createElement('div');
        div.className = `row ${isMe ? 'me' : 'other'}`;
        div.innerHTML = `<div class="msg">${m.text}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim()) return;
        // 目标永远是 admin
        ws.send(JSON.stringify({ from: myId, to: 'admin', text: i.value }));
        i.value = '';
    }
    connect();
</script>
</body>
</html>
