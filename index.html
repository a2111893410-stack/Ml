<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>在线客服</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 1. 基础容器锁定 */
        body { 
            margin: 0; padding: 0; height: 100dvh; width: 100vw; 
            background: #ededed; font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: column; overflow: hidden; position: fixed; 
        }
        
        #header-wrapper {
            background: #ededed; border-bottom: 1px solid #dcdcdc;
            padding-top: env(safe-area-inset-top); flex-shrink: 0; z-index: 10;
        }
        #header { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 17px; font-weight: 500; }
        #status-bar { width: 100%; text-align: center; color: #b2b2b2; font-size: 12px; padding: 2px 0; }

        /* 2. 聊天区域：使用 transform 避让键盘，比改 height 丝滑得多 */
        #chat { 
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
            background: #ededed; position: relative;
            transition: transform 0.25s cubic-bezier(0.2, 0, 0.2, 1);
            will-change: transform;
        }
        #chat-inner { padding: 12px; display: flex; flex-direction: column; }

        /* 3. 底部栏：固定记忆位移 */
        #footer { 
            background: #f7f7f7; border-top: 1px solid #dcdcdc; 
            padding: 8px 12px calc(8px + env(safe-area-inset-bottom)); 
            display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0; z-index: 10;
            transition: transform 0.25s cubic-bezier(0.2, 0, 0.2, 1);
            will-change: transform;
        }

        /* 样式保持一致 */
        .msg-row { margin-bottom: 16px; display: flex; align-items: flex-start; flex-shrink: 0; }
        .msg-row.me { flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 4px; background: #fff; flex-shrink: 0; background-size: cover; }
        .me .avatar { margin-left: 12px; background-image: url('https://dummyimage.com/100/95ec69/fff&text=我'); }
        .visitor .avatar { margin-right: 12px; background-image: url('https://dummyimage.com/100/fff/333&text=客'); }
        .bubble-txt { position: relative; padding: 10px 14px; font-size: 16px; line-height: 1.5; border-radius: 6px; max-width: calc(100% - 110px); word-wrap: break-word; min-height: 40px; background: #fff; }
        .me .bubble-txt { background: #95ec69; }

        textarea { flex: 1; min-height: 38px; max-height: 120px; border: none; background: #fff; border-radius: 6px; padding: 8px 12px; font-size: 16px; outline: none; resize: none; -webkit-appearance: none; caret-color: #07c160; }
        .btn-send { background: #07c160; color: #fff; border: none; border-radius: 4px; padding: 0 15px; height: 36px; font-size: 15px; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="header-wrapper">
    <div id="header"><div></div><div>在线客服</div><div></div></div>
    <div id="status-bar">正在连接...</div>
</div>

<div id="chat" onclick="dismissKeyboard()">
    <div id="chat-inner"></div>
</div>

<div id="footer">
    <textarea id="ipt" rows="1"></textarea>
    <button class="btn-send" onclick="sendMsg()">发送</button>
</div>

<script>
    const chatContainer = document.getElementById('chat');
    const footer = document.getElementById('footer');
    const iptBox = document.getElementById('ipt');
    let memorizedKBHeight = 0; // 记忆的键盘高度

    // --- 核心优化：记忆高度与静态平移 ---
    const updateLayout = () => {
        if (!window.visualViewport) return;
        
        const vv = window.visualViewport;
        const currentDiff = window.innerHeight - vv.height;

        if (currentDiff > 100) { // 键盘弹起
            // 只有当高度变化超过 15px 时才更新记忆，防止搜狗联想词跳动
            if (Math.abs(currentDiff - memorizedKBHeight) > 15) {
                memorizedKBHeight = currentDiff;
            }
            const offset = memorizedKBHeight;
            footer.style.transform = `translateY(-${offset}px)`;
            chatContainer.style.transform = `translateY(-${offset}px)`;
            
            // 延迟确保动画完成后滚动到底部
            setTimeout(scrollToBottom, 260);
        } else {
            // 键盘收起
            footer.style.transform = 'translateY(0)';
            chatContainer.style.transform = 'translateY(0)';
        }
    };

    // 仅在必要时监听，减少 CPU 占用
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateLayout);
    }

    iptBox.addEventListener('focus', () => {
        // 针对搜狗输入法的初次弹起延迟校准
        setTimeout(updateLayout, 300);
    });

    iptBox.addEventListener('blur', () => {
        setTimeout(() => { window.scrollTo(0,0); }, 100);
    });

    // --- 原有逻辑保留 ---
    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function sendMsg() {
        const text = iptBox.value.trim();
        if(!text) return;
        // 此处接你的 WS 发送逻辑
        iptBox.value = '';
        iptBox.style.height = '38px';
        scrollToBottom();
    }

    iptBox.oninput = function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        scrollToBottom();
    };

    // 模拟渲染演示（实际请用你的 WS 逻辑）
    function renderMsg(txt, isMe) {
        const div = document.createElement('div');
        div.className = 'msg-row' + (isMe ? ' me' : ' visitor');
        div.innerHTML = `<div class="avatar"></div><div class="bubble-txt">${txt}</div>`;
        document.getElementById('chat-inner').appendChild(div);
        scrollToBottom();
    }
</script>
</body>
</html>
