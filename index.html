<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>客服后台</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; }
        #side { width: 150px; background: #333; color: #fff; overflow-y: auto; }
        .u { padding: 15px; border-bottom: 1px solid #444; cursor: pointer; }
        .u.active { background: #07c160; }
        #main { flex: 1; display: flex; flex-direction: column; background: #eee; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; }
    </style>
</head>
<body>
    <div id="side"></div>
    <div id="main">
        <div id="msgs"></div>
        <div id="bar" style="padding:10px;background:#fff;display:flex;">
            <input id="ipt" style="flex:1;padding:8px">
            <button onclick="send()">回信</button>
        </div>
    </div>
<script>
    let activeId = "", db = {}, shownIds = new Set(), socket;

    function connect() {
        socket = new WebSocket('wss://page-c4hm.onrender.com');
        socket.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                res.list.forEach(m => store(m));
            } else if (res.type === "msg") {
                store(res);
            }
            render();
        };
        socket.onclose = () => setTimeout(connect, 2000);
    }

    function store(m) {
        if (shownIds.has(m.msgId)) return;
        shownIds.add(m.msgId);
        // 如果不是 admin 发的消息，那就是访客发的
        const talker = (m.from === "admin") ? m.to : m.from;
        if (talker && talker !== "admin") {
            if (!db[talker]) db[talker] = [];
            db[talker].push(m);
        }
    }

    function render() {
        document.getElementById('side').innerHTML = Object.keys(db).map(id => 
            `<div class="u ${id===activeId?'active':''}" onclick="activeId='${id}';render()">${id}</div>`
        ).join("");

        document.getElementById('msgs').innerHTML = (db[activeId] || []).map(m => `
            <div style="display:flex;margin-bottom:8px;justify-content:${m.from==='admin'?'flex-end':'flex-start'}">
                <div style="background:${m.from==='admin'?'#95ec69':'#fff'};padding:8px;border-radius:5px;">${m.text}</div>
            </div>
        `).join("");
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim() || !activeId) return;
        socket.send(JSON.stringify({ from: "admin", to: activeId, text: i.value, type: "msg" }));
        i.value = "";
    }
    connect();
</script>
</body>
</html>
