<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>在线客服</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; height: 100dvh; width: 100vw; display: flex; flex-direction: column; background: #ededed; font-family: -apple-system, sans-serif; overflow: hidden; position: fixed; top: 0; left: 0; }
        
        #header { height: 44px; background: #ededed; border-bottom: 1px solid #dcdcdc; display: flex; align-items: center; justify-content: center; padding: 0 15px; flex-shrink: 0; font-size: 17px; font-weight: 500; padding-top: env(safe-area-inset-top); position: relative; }
        .back-btn { position: absolute; left: 15px; top: env(safe-area-inset-top); height: 44px; display: flex; align-items: center; font-size: 24px; color: #333; }
        
        #chat-area { flex: 1; background: #ededed; display: flex; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 15px 10px; -webkit-overflow-scrolling: touch; }
        
        /* 访客端视角：自己(me)在右，客服(admin)在左 */
        .msg-row { display: flex; margin-bottom: 16px; align-items: flex-start; }
        .msg-row.me { flex-direction: row-reverse; }
        
        .avatar { width: 38px; height: 38px; border-radius: 4px; background: #fff; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .bubble-txt { position: relative; max-width: 70%; padding: 10px 12px; font-size: 16px; line-height: 1.4; border-radius: 6px; margin: 0 10px; min-height: 38px; word-wrap: break-word; }
        
        /* 客服气泡：白色，在左边 */
        .admin .bubble-txt { background: #fff; }
        .admin .bubble-txt::before { content: ""; position: absolute; left: -9px; top: 12px; border: 5px solid transparent; border-right-color: #fff; }
        
        /* 访客自己气泡：绿色，在右边 */
        .me .bubble-txt { background: #95ec69; }
        .me .bubble-txt::before { content: ""; position: absolute; right: -9px; top: 12px; border: 5px solid transparent; border-left-color: #95ec69; }
        
        .bubble-img { max-width: 160px; border-radius: 4px; margin: 0 10px; border: 1px solid #dcdcdc; display: block; }
        
        #footer { background: #f7f7f7; border-top: 1px solid #dcdcdc; padding: 8px 10px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); flex-shrink: 0; }
        #input-row { display: flex; align-items: flex-end; gap: 8px; }
        #ipt { flex: 1; border: none; background: #fff; border-radius: 4px; padding: 10px; font-size: 16px; outline: none; min-height: 40px; max-height: 100px; resize: none; -webkit-appearance: none; }
        .icon-btn { width: 32px; height: 32px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn { height: 36px; padding: 0 15px; background: #07c160; color: #fff; border: none; border-radius: 4px; font-weight: bold; margin-bottom: 2px; }
        
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; align-items: center; justify-content: center; z-index: 100; }
        #viewer img { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

<div id="header">
    <span class="back-btn">‹</span>
    <span>在线客服</span>
</div>

<div id="chat-area">
    <div id="box" onclick="dismissKeyboard()"></div>
</div>

<div id="footer">
    <div id="input-row">
        <label class="icon-btn">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="#555"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <input type="file" id="file-ipt" accept="image/*" style="display:none" onchange="directSendImg(this)">
        </label>
        <textarea id="ipt" rows="1" placeholder="有问题请留言..." onkeydown="handleKeyDown(event)"></textarea>
        <button id="send-btn" class="send-btn" onclick="sendText()">发送</button>
    </div>
</div>

<div id="viewer" onclick="this.style.display='none'"><img id="viewer-img"></div>

<script>
    // 给访客生成并保存一个永久的唯一ID
    let myId = localStorage.getItem('wepro_vid');
    if (!myId) {
        myId = 'v_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('wepro_vid', myId);
    }
    
    let allMsgs = [], ws;
    const ipt = document.getElementById('ipt');
    const box = document.getElementById('box');

    // --- 【同步修复：智能防抖滚动到底部】 ---
    function scrollToBottom() {
        if (!box) return;
        
        box.scrollTop = box.scrollHeight;
        
        const imgs = box.querySelectorAll('.bubble-img');
        imgs.forEach(img => {
            img.onload = () => { 
                box.scrollTop = box.scrollHeight; 
            };
        });

        setTimeout(() => { box.scrollTop = box.scrollHeight; }, 150);
        setTimeout(() => { box.scrollTop = box.scrollHeight; }, 300);
    }

    function connect() {
        ws = new WebSocket('wss://page-c4hm.onrender.com'); 

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            
            if (res.type === "history") {
                allMsgs = []; 
            }

            const msgs = res.type === "history" ? res.data : [res.data];
            
            msgs.forEach(m => {
                // 访客端只需要关心自己发送的，以及发给自己的消息
                if (m.from === myId || m.to === myId) {
                    allMsgs.push(m);
                }
            });
            render();
        };
        ws.onclose = () => { setTimeout(connect, 3000); };
    }

    function render() {
        box.innerHTML = allMsgs.map(m => {
            const isMe = m.from === myId;
            const avatar = isMe ? 'https://dummyimage.com/100/ccc/333&text=我' : 'https://dummyimage.com/100/95ec69/fff&text=客服';
            let content = m.type === 'img' ? `<img src="${m.text}" class="bubble-img" onclick="viewImg('${m.text}')">` : `<div class="bubble-txt">${m.text}</div>`;
            return `<div class="msg-row ${isMe ? 'me' : 'admin'}"><div class="avatar"><img src="${avatar}"></div>${content}</div>`;
        }).join("");
        
        scrollToBottom();
    }

    function dismissKeyboard() { ipt.blur(); }

    // 修复 iOS 键盘收起和弹起时的强行位移
    ipt.addEventListener('focus', () => {
        setTimeout(scrollToBottom, 300);
    });
    ipt.addEventListener('blur', () => {
        setTimeout(() => { window.scrollTo(0, 0); }, 100);
    });

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
    }

    function sendText() {
        const val = ipt.value.trim();
        if (!val) return;
        ws.send(JSON.stringify({ from: myId, to: 'admin', text: val, type: 'text', time: Date.now() }));
        ipt.value = '';
        ipt.style.height = '40px';
        
        scrollToBottom();
    }

    // --- 【同步增强：访客端图片压缩】 ---
    function directSendImg(el) {
        const file = el.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const maxWidth = 1000;
                let width = img.width, height = img.height;
                if (width > maxWidth) {
                    height = (maxWidth / width) * height;
                    width = maxWidth;
                }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ from: myId, to: 'admin', text: compressedBase64, type: 'img', time: Date.now() }));
                }
                el.value = '';
            };
        };
        reader.readAsDataURL(file);
    }

    function viewImg(src) {
        document.getElementById('viewer-img').src = src;
        document.getElementById('viewer').style.display = 'flex';
    }

    ipt.oninput = function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        scrollToBottom();
    };

    connect();
</script>
</body>
</html>
