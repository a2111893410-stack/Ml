<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>在线客服</title>
    <style>
        :root {
            /* 定义动态高度变量，初始为 100vh */
            --safe-height: 100vh;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; background: #ededed; 
        }
        
        /* 核心优化：使用 fixed 定位并由 CSS 变量控制高度 */
        #app-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--safe-height); /* 动态实时高度 */
            display: flex;
            flex-direction: column;
            background: #ededed;
            will-change: height; /* 告知浏览器此处会有动画优化 */
        }

        #header-wrapper {
            background: #ededed; border-bottom: 1px solid #dcdcdc;
            padding-top: env(safe-area-inset-top); flex-shrink: 0;
        }
        #header { height: 44px; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 500; }

        #chat { 
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
            background: #ededed; 
        }
        #chat-inner { padding: 12px; display: flex; flex-direction: column; }

        /* 气泡样式略（保持原样） */
        .msg-row { margin-bottom: 16px; display: flex; align-items: flex-start; }
        .msg-row.me { flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 4px; background: #fff; background-size: cover; flex-shrink: 0; }
        .me .avatar { margin-left: 12px; background-image: url('https://dummyimage.com/100/95ec69/fff&text=我'); }
        .visitor .avatar { margin-right: 12px; background-image: url('https://dummyimage.com/100/fff/333&text=客'); }
        .bubble-txt { position: relative; padding: 10px 14px; font-size: 16px; line-height: 1.5; border-radius: 6px; max-width: calc(100% - 110px); word-wrap: break-word; background: #fff; }
        .me .bubble-txt { background: #95ec69; }

        #footer { 
            background: #f7f7f7; border-top: 1px solid #dcdcdc; 
            padding: 8px 12px;
            /* 适配底部安全区：仅在键盘收起时生效 */
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0;
        }
        
        textarea { 
            flex: 1; min-height: 38px; max-height: 120px; border: none; 
            background: #fff; border-radius: 6px; padding: 8px 12px; 
            font-size: 16px; outline: none; resize: none; -webkit-appearance: none;
        }
        .btn-send { background: #07c160; color: #fff; border: none; border-radius: 4px; padding: 0 15px; height: 36px; font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="header-wrapper">
        <div id="header">在线客服</div>
    </div>

    <div id="chat" id="chat-box">
        <div id="chat-inner"></div>
    </div>

    <div id="footer">
        <textarea id="ipt" rows="1"></textarea>
        <button class="btn-send" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat');
    const chatInner = document.getElementById('chat-inner');
    const iptBox = document.getElementById('ipt');
    const root = document.documentElement;

    // --- 【极致优化逻辑】 ---
    
    let isKeyboardOpen = false;

    const updateLayout = () => {
        if (!window.visualViewport) return;
        
        const vv = window.visualViewport;
        // 使用 requestAnimationFrame 确保在浏览器重绘前更新数值，消除抖动
        requestAnimationFrame(() => {
            // 直接设置 CSS 变量，让高度自适应
            root.style.setProperty('--safe-height', `${vv.height}px`);
            
            // 键盘弹出状态下，强制滚动到底部
            if (vv.height < window.innerHeight) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
                if (!isKeyboardOpen) {
                    isKeyboardOpen = true;
                    // 彻底解决 Safari 整体页面漂移问题
                    window.scrollTo(0, 0);
                }
            } else {
                isKeyboardOpen = false;
            }
        });
    };

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateLayout);
        window.visualViewport.addEventListener('scroll', updateLayout);
    }

    // 针对 iOS 的特殊处理：点击输入框时立即修正一次
    iptBox.addEventListener('focus', () => {
        setTimeout(updateLayout, 50);
        setTimeout(updateLayout, 300); // 补一次，确保动画结束时位置精准
    });

    // 消息逻辑（简化版，仅作演示）
    const myId = 'user_' + Math.random().toString(36).substr(2,4);
    let ws = new WebSocket('wss://page-c4hm.onrender.com');
    
    ws.onmessage = (e) => {
        const res = JSON.parse(e.data);
        const list = res.type === "history" ? res.data : [res.data];
        list.forEach(m => {
            const div = document.createElement('div');
            div.className = 'msg-row' + (String(m.from) === myId ? ' me' : ' visitor');
            div.innerHTML = `<div class="avatar"></div><div class="bubble-txt">${m.text}</div>`;
            chatInner.appendChild(div);
        });
        chatContainer.scrollTop = chatContainer.scrollHeight;
    };

    function sendMsg() {
        const text = iptBox.value.trim();
        if(!text) return;
        ws.send(JSON.stringify({ from: myId, to: 'admin', text: text, type: 'text' }));
        iptBox.value = '';
        iptBox.style.height = '38px';
    }

    iptBox.oninput = function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    };
</script>
</body>
</html>
