<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>Chat System</title>
<style>
/* ... (保留你原来的所有 CSS 布局不变) ... */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; overflow: hidden; background: #ededed; font-family: -apple-system, BlinkMacSystemFont; -webkit-text-size-adjust: 100%; }
#top { position: fixed; top: 0; left: 0; right: 0; height: 44px; padding-top: env(safe-area-inset-top); background: #ededed; border-bottom: 0.5px solid rgba(0,0,0,0.06); z-index: 999; backdrop-filter: blur(10px); }
#top-inner { height: 44px; display: flex; align-items: center; justify-content: center; position: relative; }
.top-btn { position: absolute; top: 0; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
#title { font-size: 17px; font-weight: 500; }
#chat { position: fixed; left: 0; right: 0; top: calc(44px + env(safe-area-inset-top)); bottom: calc(60px + env(safe-area-inset-bottom)); overflow-y: auto; padding: 10px 8px; }
.row { display: flex; margin: 10px 0; align-items: flex-start; }
.left { justify-content: flex-start; }
.right { justify-content: flex-end; }
.avatar { width: 42px; height: 42px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: #eee; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.left .avatar { margin-right: 6px; }
.right .avatar { margin-left: 6px; }
.bubble { position: relative; max-width: 70%; padding: 10px 12px; border-radius: 10px; font-size: 15px; line-height: 1.4; word-break: break-word; }
.left .bubble { background: #fff; }
.right .bubble { background: #95ec69; }
#bar { position: fixed; left: 0; right: 0; bottom: 0; display: flex; align-items: center; padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); background: #f7f7f7; border-top: 1px solid rgba(0,0,0,0.08); z-index: 1000; }
#text { flex: 1; height: 36px; border: none; border-radius: 6px; padding: 0 10px; font-size: 15px; outline: none; }
button { margin-left: 6px; background: #07c160; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; }
.msg-img img { max-width: 180px; border-radius: 10px; }
#imgPreview { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 9999; }
#imgPreview img { max-width: 95%; max-height: 95%; }
</style>
</head>
<body>

<div id="top">
  <div id="top-inner">
    <div id="title">连接中...</div>
  </div>
</div>

<div id="chat"></div>

<div id="bar">
  <input id="text" placeholder="输入消息..." />
  <input type="file" id="file" accept="image/*" hidden>
  <button onclick="pickImg()">+</button>
  <button onclick="send()">发送</button>
</div>

<div id="imgPreview" onclick="this.style.display='none'"><img id="previewImg"></div>

<script>
/* --- 配置 --- */
const chatBox = document.getElementById("chat");
const titleNode = document.getElementById("title");
const myAvatar = "https://i.pravatar.cc/100?img=12";
const otherAvatar = "https://i.pravatar.cc/100?img=3";

const urlParams = new URLSearchParams(window.location.search);
const isAdmin = urlParams.get('admin') === '1';
const myId = isAdmin ? 'admin' : (localStorage.getItem('chat_uid') || 'user_' + Math.random().toString(36).substr(2, 7));
localStorage.setItem('chat_uid', myId);

let targetId = isAdmin ? "" : "admin"; // 访客永远发给admin
let allMessages = []; // 本地存储收到的所有相关消息

/* --- WebSocket 连接 --- */
let socket;
function connect() {
    socket = new WebSocket('wss://page-c4hm.onrender.com');
    
    socket.onopen = () => {
        titleNode.innerText = isAdmin ? "客服模式 (待接入)" : "联系客服 (在线)";
        socket.send(JSON.stringify({ type: "init", userId: myId }));
        socket.send(JSON.stringify({ type: "history", userId: myId }));
    };

    socket.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === "history") {
            allMessages = data.list;
            renderChat();
        } else if (data.type === "msg" || data.type === "img") {
            allMessages.push(data);
            // 如果客服没选人，且收到新消息，自动锁定该人
            if (isAdmin && !targetId) targetId = data.from;
            renderChat();
        }
    };

    socket.onclose = () => {
        titleNode.innerText = "连接已断开，尝试重连...";
        setTimeout(connect, 3000);
    };
}
connect();

/* --- 渲染逻辑 (关键：过滤消息) --- */
function renderChat() {
    chatBox.innerHTML = "";
    // 过滤规则：
    // 1. 如果我是访客，只看与 admin 的对话
    // 2. 如果我是客服，只看与当前 targetId 的对话
    const filtered = allMessages.filter(m => {
        if (isAdmin) {
            return (m.from === targetId || m.to === targetId);
        } else {
            return (m.from === 'admin' || m.to === 'admin');
        }
    });

    filtered.forEach(msg => {
        const isMe = msg.from === myId;
        if (msg.type === "msg") addMsgDOM(msg.text, isMe ? "right" : "left");
        if (msg.type === "img") addImgDOM(msg.src, isMe ? "right" : "left");
    });
    scrollBottom();
    
    if (isAdmin && targetId) {
        titleNode.innerText = "正在接入: " + targetId;
    }
}

function addMsgDOM(text, side) {
    const row = document.createElement("div");
    row.className = "row " + side;
    row.innerHTML = `
        ${side==='left' ? `<div class="avatar"><img src="${otherAvatar}"></div>` : ''}
        <div class="bubble">${text}</div>
        ${side==='right' ? `<div class="avatar"><img src="${myAvatar}"></div>` : ''}
    `;
    chatBox.appendChild(row);
}

function addImgDOM(src, side) {
    const row = document.createElement("div");
    row.className = "row " + side;
    row.innerHTML = `
        ${side==='left' ? `<div class="avatar"><img src="${otherAvatar}"></div>` : ''}
        <div class="msg-img"><img src="${src}" onclick="openPreview('${src}')"></div>
        ${side==='right' ? `<div class="avatar"><img src="${myAvatar}"></div>` : ''}
    `;
    chatBox.appendChild(row);
}

/* --- 发送逻辑 --- */
function send() {
    const textNode = document.getElementById("text");
    const val = textNode.value.trim();
    if (!val || !targetId) return;

    const data = { from: myId, to: targetId, type: "msg", text: val };
    socket.send(JSON.stringify(data));
    textNode.value = "";
    // 注意：不需要手动 addMsg，因为后端会转发这条消息回来触发 onmessage 渲染
}

function pickImg() { document.getElementById("file").click(); }
document.getElementById("file").onchange = function() {
    const file = this.files[0];
    if (!file || !targetId) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        socket.send(JSON.stringify({ from: myId, to: targetId, type: "img", src: e.target.result }));
    };
    reader.readAsDataURL(file);
};

function scrollBottom() { setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 50); }
function openPreview(src) { document.getElementById("previewImg").src = src; document.getElementById("imgPreview").style.display = "flex"; }
function goBack() { history.back(); }
</script>
</body>
</html>
