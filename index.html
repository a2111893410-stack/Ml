<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>联系客服</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #ededed; font-family: sans-serif; }
        #status { font-size: 12px; padding: 5px; text-align: center; background: #ddd; color: #666; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .row { display: flex; margin-bottom: 10px; }
        .row.me { justify-content: flex-end; }
        .bubble { padding: 10px; border-radius: 8px; max-width: 70%; font-size: 15px; word-break: break-all; }
        .other .bubble { background: #fff; }
        .me .bubble { background: #95ec69; }
        #bar { display: flex; padding: 10px; background: #fff; border-top: 1px solid #ccc; padding-bottom: env(safe-area-inset-bottom); }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 5px; outline: none; font-size: 16px; }
        button { margin-left: 10px; padding: 0 15px; background: #07c160; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="status">正在连接服务器...</div>
    <div id="chat"></div>
    <div id="bar">
        <input id="ipt" placeholder="输入消息..." autocomplete="off">
        <button onclick="send()">发送</button>
    </div>

<script>
    const myId = localStorage.getItem('cid') || 'U' + Math.random().toString(36).substr(2,4).toUpperCase();
    localStorage.setItem('cid', myId);

    let ws;
    const chatBox = document.getElementById('chat');
    const statusBox = document.getElementById('status');
    const seenIds = new Set();

    function connect() {
        // 重要：请将此地址替换为你 Render 的真实地址
        ws = new WebSocket('wss://page-c4hm.onrender.com');

        ws.onopen = () => { statusBox.innerText = "在线 (ID: " + myId + ")"; statusBox.style.background = "#d4edda"; };
        ws.onclose = () => { statusBox.innerText = "连接已断开，正在尝试重连..."; statusBox.style.background = "#f8d7da"; setTimeout(connect, 3000); };
        ws.onerror = () => { statusBox.innerText = "连接错误，请检查网络"; };

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === "history") {
                chatBox.innerHTML = ""; seenIds.clear();
                res.data.forEach(m => processMsg(m));
            } else if (res.type === "new_msg") {
                processMsg(res.data);
            }
        };
    }

    function processMsg(m) {
        if (m.to === myId || m.from === myId) {
            if (seenIds.has(m.id)) return;
            seenIds.add(m.id);
            const isMe = m.from === myId;
            const div = document.createElement('div');
            div.className = `row ${isMe ? 'me' : 'other'}`;
            div.innerHTML = `<div class="bubble">${m.text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function send() {
        const i = document.getElementById('ipt');
        if (!i.value.trim() || ws.readyState !== 1) return;
        ws.send(JSON.stringify({ type: 'msg', from: myId, to: 'admin', text: i.value }));
        i.value = '';
    }
    connect();
</script>
</body>
</html>
