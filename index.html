<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>WeChat 5.0 System</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; overflow: hidden; background: #ededed; font-family: -apple-system, BlinkMacSystemFont; -webkit-text-size-adjust: 100%; }
#top { position: fixed; top: 0; left: 0; right: 0; height: 44px; padding-top: env(safe-area-inset-top); background: #ededed; border-bottom: 0.5px solid rgba(0,0,0,0.06); z-index: 999; backdrop-filter: blur(10px); }
#top-inner { height: 44px; display: flex; align-items: center; justify-content: center; position: relative; }
.top-btn { position: absolute; top: 0; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; border-radius: 12px; }
.top-btn:active { background: rgba(0,0,0,0.06); transform: scale(0.92); }
#back { left: 2px; }
#more { right: 2px; }
#title { font-size: 17px; font-weight: 500; }
#chat { position: fixed; left: 0; right: 0; top: calc(44px + env(safe-area-inset-top)); bottom: calc(60px + env(safe-area-inset-bottom)); overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 8px; }
.row { display: flex; margin: 10px 0; align-items: flex-start; }
.left { justify-content: flex-start; }
.right { justify-content: flex-end; }
.avatar { width: 42px; height: 42px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: #eee; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.left .avatar { margin-right: 6px; }
.right .avatar { margin-left: 6px; }
.bubble { position: relative; max-width: 70%; padding: 10px 12px; border-radius: 10px; font-size: 15px; line-height: 1.4; word-break: break-word; }
.left .bubble { background: #fff; }
.right .bubble { background: #95ec69; }
.left .bubble::before { content: ""; position: absolute; left: -6px; top: 12px; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-right: 6px solid #fff; }
.right .bubble::before { content: ""; position: absolute; right: -6px; top: 12px; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 6px solid #95ec69; }
#bar { position: fixed; left: 0; right: 0; bottom: 0; display: flex; align-items: center; padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); background: #f7f7f7; border-top: 1px solid rgba(0,0,0,0.08); width: 100%; z-index: 1000; }
#text { flex: 1; min-width: 0; height: 36px; border: none; border-radius: 6px; padding: 0 10px; font-size: 15px; outline: none; }
button { margin-left: 6px; background: #07c160; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-size: 15px; }
.msg-img img { max-width: 180px; border-radius: 10px; }
#imgPreview { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 99999; }
#imgPreview img { max-width: 95%; max-height: 95%; }
</style>
</head>
<body>

<div id="top">
  <div id="top-inner">
    <div id="back" class="top-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15.5 19l-7-7 7-7" fill="none" stroke="black" stroke-width="2.2" stroke-linecap="round"/></svg>
    </div>
    <div id="title">连接中...</div>
    <div id="more" class="top-btn">
      <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="5" cy="12" r="1.8" fill="black"/><circle cx="12" cy="12" r="1.8" fill="black"/><circle cx="19" cy="12" r="1.8" fill="black"/></svg>
    </div>
  </div>
</div>

<div id="chat"></div>

<div id="bar">
  <input id="text" placeholder="输入消息..." />
  <input type="file" id="file" accept="image/*" hidden>
  <button onclick="pickImg()">+</button>
  <button onclick="send()">发送</button>
</div>

<div id="imgPreview" onclick="closePreview()">
  <img id="previewImg">
</div>

<script>
const chat = document.getElementById("chat");
const myAvatar = "https://i.pravatar.cc/100?img=12";
const otherAvatar = "https://i.pravatar.cc/100?img=3";

// --- 核心逻辑 ---
const urlParams = new URLSearchParams(window.location.search);
const isAdmin = urlParams.get('admin') === '1';
// 生成/获取身份：如果是客服则固定ID为admin，否则随机生成
const myId = isAdmin ? 'admin' : (localStorage.getItem('chat_uid') || 'user_' + Math.random().toString(36).substr(2, 9));
localStorage.setItem('chat_uid', myId);

// 目标ID：用户始终发给admin，客服发给当前选中的人(初始为空)
let targetId = isAdmin ? "" : "admin";
document.getElementById("title").innerText = isAdmin ? "客服后台 (就绪)" : "联系客服";

// 建立连接
const socket = new WebSocket('wss://page-c4hm.onrender.com');

socket.onopen = () => {
    socket.send(JSON.stringify({ type: "init", userId: myId }));
    socket.send(JSON.stringify({ type: "history", userId: myId }));
};

socket.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === "history") {
        chat.innerHTML = "";
        data.list.forEach(m => renderMsg(m));
    } else if (data.type === "msg" || data.type === "img") {
        renderMsg(data);
        // 如果是客服收到消息，自动切换回复目标为发送者
        if (isAdmin && data.from !== myId) {
            targetId = data.from;
            document.getElementById("title").innerText = "正在回复: " + targetId;
        }
    }
};

function renderMsg(data) {
    const isMe = data.from === myId;
    const side = isMe ? "right" : "left";
    if (data.type === "msg") addMsg(data.text, side);
    if (data.type === "img") addImage(data.src, side);
}

function addMsg(text, type) {
    const row = document.createElement("div");
    row.className = "row " + type;
    row.innerHTML = `
        ${type==='left' ? `<div class="avatar"><img src="${otherAvatar}"></div>` : ''}
        <div class="bubble">${text}</div>
        ${type==='right' ? `<div class="avatar"><img src="${myAvatar}"></div>` : ''}
    `;
    chat.appendChild(row);
    scrollBottom();
}

function addImage(src, type) {
    const row = document.createElement("div");
    row.className = "row " + type;
    row.innerHTML = `
        ${type==='left' ? `<div class="avatar"><img src="${otherAvatar}"></div>` : ''}
        <div class="msg-img"><img src="${src}" onclick="openPreview('${src}')"></div>
        ${type==='right' ? `<div class="avatar"><img src="${myAvatar}"></div>` : ''}
    `;
    chat.appendChild(row);
    scrollBottom();
}

function send() {
    const input = document.getElementById("text");
    const v = input.value.trim();
    if (!v || !targetId) return;
    socket.send(JSON.stringify({ from: myId, to: targetId, type: "msg", text: v }));
    input.value = "";
}

function pickImg() { document.getElementById("file").click(); }
document.getElementById("file").onchange = function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        socket.send(JSON.stringify({ from: myId, to: targetId, type: "img", src: e.target.result }));
    };
    reader.readAsDataURL(file);
};

function scrollBottom() { setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 30); }
function openPreview(src) { document.getElementById("previewImg").src = src; document.getElementById("imgPreview").style.display = "flex"; }
function closePreview() { document.getElementById("imgPreview").style.display = "none"; }
function goBack() { history.length > 1 ? history.back() : window.location.href = "/"; }
</script>
</body>
</html>
