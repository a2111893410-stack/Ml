<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <title>联系客服</title>
    <style>
        /* 复用你第一版最喜欢的微信风格 CSS */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; height: 100%; overflow: hidden; background: #ededed; font-family: -apple-system, system-ui, sans-serif; }
        #top { position: fixed; top: 0; left: 0; right: 0; height: 44px; padding-top: env(safe-area-inset-top); background: #ededed; border-bottom: 0.5px solid rgba(0,0,0,0.1); z-index: 999; }
        #top-inner { height: 44px; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 17px; }
        #chat { position: fixed; left: 0; right: 0; top: calc(44px + env(safe-area-inset-top)); bottom: calc(60px + env(safe-area-inset-bottom)); overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
        .row { display: flex; margin: 12px 0; align-items: flex-start; }
        .left { justify-content: flex-start; }
        .right { justify-content: flex-end; }
        .avatar { width: 40px; height: 40px; border-radius: 6px; background: #ccc; flex-shrink: 0; }
        .bubble { max-width: 70%; padding: 10px 12px; border-radius: 8px; font-size: 15px; line-height: 1.4; word-break: break-all; position: relative; }
        .left .bubble { background: #fff; margin-left: 10px; }
        .right .bubble { background: #95ec69; margin-right: 10px; }
        #bar { position: fixed; left: 0; right: 0; bottom: 0; padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); background: #f7f7f7; display: flex; align-items: center; border-top: 0.5px solid #ddd; }
        #text { flex: 1; height: 38px; border: none; border-radius: 6px; padding: 0 10px; font-size: 16px; outline: none; }
        button { margin-left: 8px; background: #07c160; color: #fff; border: none; padding: 8px 15px; border-radius: 6px; font-size: 15px; font-weight: 500; }
    </style>
</head>
<body>
    <div id="top"><div id="top-inner">在线客服</div></div>
    <div id="chat"></div>
    <div id="bar">
        <input id="text" placeholder="请输入消息..." autocomplete="off">
        <button onclick="sendMsg()">发送</button>
    </div>

<script>
    const chatBox = document.getElementById("chat");
    const input = document.getElementById("text");

    // 1. 生成固定识别码 (刷新不改变身份)
    let myId = localStorage.getItem('chat_uid');
    if (!myId) {
        myId = 'U' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('chat_uid', myId);
    }

    let socket;
    function connect() {
        // 换成你的 Render 地址
        socket = new WebSocket('wss://page-c4hm.onrender.com');

        socket.onopen = () => {
            console.log("连接成功");
            // 【关键】告知后端我是谁，并请求历史记录
            socket.send(JSON.stringify({ type: "init", userId: myId }));
        };

        socket.onmessage = (e) => {
            const res = JSON.parse(e.data);

            // 情况A：收到的是历史同步包 (刷新后触发)
            if (res.type === "history") {
                chatBox.innerHTML = ""; // 清空旧显示
                res.list.forEach(m => renderMsg(m));
                return;
            }

            // 情况B：收到实时单条消息
            if (res.from === myId || res.to === myId) {
                renderMsg(res);
            }
        };

        socket.onclose = () => setTimeout(connect, 3000); // 自动重连
    }

    function renderMsg(m) {
        const isMe = m.from === myId;
        const div = document.createElement("div");
        div.className = "row " + (isMe ? "right" : "left");
        
        div.innerHTML = isMe ? 
            `<div class="bubble">${m.text}</div><div class="avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" width="40"></div>` :
            `<div class="avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" width="40"></div><div class="bubble">${m.text}</div>`;
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMsg() {
        const val = input.value.trim();
        if (!val) return;
        const data = { from: myId, to: "admin", text: val, type: "msg" };
        socket.send(JSON.stringify(data));
        input.value = "";
    }

    // 回车发送
    input.onkeydown = (e) => { if (e.key === 'Enter') sendMsg(); };

    connect();
</script>
</body>
</html>
