<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>微信级IM</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden; /* ⭐关键 */
  background: #ededed;
  font-family: -apple-system, BlinkMacSystemFont;
}

/* ================= 顶部 ================= */
#top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;

  height: 44px;
  padding-top: env(safe-area-inset-top);

  background: #ededed;
  border-bottom: 0.5px solid rgba(0,0,0,0.05);
  z-index: 999;
}

#top-inner {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

#back, #more {
  color: rgba(0,0,0,0.85);
}

#back {
  position: absolute;
  left: 10px;
}

#more {
  position: absolute;
  right: 12px;
}

#title {
  font-size: 17px;
  font-weight: 500;
}

/* ================= 聊天区（核心优化） ================= */
#chat {
  position: fixed;
  top: calc(44px + env(safe-area-inset-top));
  left: 0;
  right: 0;

  /* ⭐关键：动态高度（JS控制） */
  bottom: 60px;

  overflow-y: auto;
  -webkit-overflow-scrolling: touch;

  padding: 12px;
}

/* 消息 */
.row { display:flex; margin:8px 0; }
.left { justify-content:flex-start; }
.right { justify-content:flex-end; }

.avatar {
  width:34px;
  height:34px;
  background:#ccc;
  border-radius:4px;
  margin:0 6px;
}

.bubble {
  max-width:70%;
  padding:10px;
  border-radius:10px;
  font-size:15px;
}

.left .bubble { background:#fff; }
.right .bubble { background:#95ec69; }

.msg-img img {
  max-width:180px;
  border-radius:10px;
}

/* ================= 输入栏（WebView核心） ================= */
#bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  height: 60px;
  background: #f7f7f7;

  display: flex;
  align-items: center;
  padding: 8px;

  border-top: 1px solid #ddd;
  z-index: 1000;

  /* ⭐关键：防止iOS抖动 */
  transform: translateZ(0);
}

#text {
  flex: 1;
  height: 36px;
  border: none;
  border-radius: 6px;
  padding: 0 10px;
  font-size: 16px;

  outline: none;
  -webkit-appearance: none;
}

button {
  margin-left: 6px;
  background: #07c160;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
}

/* ================= 图片预览 ================= */
#imgPreview {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#imgPreview img {
  max-width: 95%;
  max-height: 95%;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div id="top">
  <div id="top-inner">
    <div id="back">‹</div>
    <div id="title">管理员</div>
    <div id="more">···</div>
  </div>
</div>

<!-- 聊天 -->
<div id="chat"></div>

<!-- 输入 -->
<div id="bar">
  <input id="text" placeholder="输入消息..." />
  <input type="file" id="file" accept="image/*" hidden>
  <button onclick="pickImg()">📷</button>
  <button onclick="send()">发送</button>
</div>

<!-- 图片预览 -->
<div id="imgPreview" onclick="closePreview()">
  <img id="previewImg">
</div>

<script>
const chat = document.getElementById("chat");
const text = document.getElementById("text");
const bar = document.getElementById("bar");

const ws = new WebSocket("ws://localhost:3000");

/* ================= iOS WebView核心修复 ================= */
function setLayout(){
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;

  const topH = document.getElementById("top").offsetHeight;
  const barH = bar.offsetHeight;

  chat.style.height = (vh - topH - barH) + "px";
}

window.addEventListener("resize", setLayout);
window.visualViewport && window.visualViewport.addEventListener("resize", setLayout);
setLayout();

/* ================= 滚动 ================= */
function scrollBottom(){
  requestAnimationFrame(()=>{
    chat.scrollTop = chat.scrollHeight;
  });
}

/* ================= 图片预览 ================= */
function openPreview(src){
  document.getElementById("previewImg").src = src;
  document.getElementById("imgPreview").style.display = "flex";
}

function closePreview(){
  document.getElementById("imgPreview").style.display = "none";
}

/* ================= 消息 ================= */
function addMsg(content,type,isImg=false){
  const row=document.createElement("div");
  row.className="row "+type;

  const avatar=document.createElement("div");
  avatar.className="avatar";

  let box;

  if(isImg){
    box=document.createElement("div");
    box.className="msg-img";

    const img=document.createElement("img");
    img.src = content;

    img.onclick = () => openPreview(content);
    img.onload = scrollBottom;

    box.appendChild(img);

  } else {
    box=document.createElement("div");
    box.className="bubble";
    box.innerText=content;
  }

  if(type==="left"){
    row.appendChild(avatar);
    row.appendChild(box);
  } else {
    row.appendChild(box);
    row.appendChild(avatar);
  }

  chat.appendChild(row);
  scrollBottom();
}

/* ================= WebSocket ================= */
ws.onopen=()=>{
  ws.send(JSON.stringify({type:"join",room:"1"}));
};

ws.onmessage=(e)=>{
  const d=JSON.parse(e.data);
  if(d.type==="msg") addMsg(d.text,"left");
  if(d.type==="img") addMsg(d.img,"left",true);
};

/* ================= 发送 ================= */
function send(){
  const v=text.value.trim();
  if(!v) return;

  addMsg(v,"right");

  ws.send(JSON.stringify({type:"msg",text:v}));

  text.value="";
  text.blur();
}

/* ================= 图片 ================= */
function pickImg(){
  document.getElementById("file").click();
}

document.getElementById("file").onchange=function(){
  const file=this.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=(e)=>{
    addMsg(e.target.result,"right",true);

    ws.send(JSON.stringify({
      type:"img",
      img:e.target.result
    }));
  };
  reader.readAsDataURL(file);
};
</script>

</body>
</html>
